		<script>
			var url = new URL(window.location.href)
			var searchParams = url.searchParams
			// 防止重定向页面后，debug状态丢失
			if (searchParams.get("debug") === "true") {
				sessionStorage.setItem("debug", "true")
			}
			if (searchParams.get("debug") === "true" || sessionStorage.getItem("debug")) {
				// 动态加载 vconsole.min.js
				const script = document.createElement("script")
				script.src = "/vconsole.min.js"
				script.onload = function () {
					new VConsole()
				}
				script.onerror = function () {
					console.error("加载VConsole失败")
				}
				document.head.appendChild(script)
			}
		</script>

		<script>
			// Load TSIcon sprite async to avoid blocking render
			;(function loadTsIcon() {
				const script = document.createElement("script")
				script.src = "/icons_12224_357.933fa41cd89163c9985c27baa8f99a43.js"
				script.async = true
				script.crossOrigin = "anonymous"
				script.onerror = function () {
