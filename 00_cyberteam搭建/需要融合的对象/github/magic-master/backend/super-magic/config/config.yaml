bing:
  search_api_key: "${BING_SUBSCRIPTION_KEY}"
  search_endpoint: "${BING_SUBSCRIPTION_ENDPOINT:-https://api.bing.microsoft.com/v7.0}"

# Tavily 搜索 API 配置
tavily:
  api_key: "${TAVILY_API_KEY}"
  api_endpoint: "${TAVILY_API_ENDPOINT:-https://api.tavily.com}"
  search_endpoint: "${TAVILY_SEARCH_ENDPOINT:-/search}"

# Metaso 搜索 API 配置
metaso:
  api_key: "${METASO_API_KEY}"
  api_endpoint: "${METASO_API_ENDPOINT:-https://metaso.cn}"
  search_endpoint: "${METASO_SEARCH_ENDPOINT:-/api/v1/search}"

# SerpApi 配置（用于 Google 搜索）
serpapi:
  api_key: "${SERPAPI_API_KEY}"
  api_endpoint: "${SERPAPI_API_ENDPOINT:-https://serpapi.com}"

# Magic 图片搜索服务配置
magic_image_search:
  api_key: "${MAGIC_IMAGE_SEARCH_API_KEY}"
  api_endpoint: "${MAGIC_IMAGE_SEARCH_ENDPOINT}"

# 搜索引擎选择
web_search:
  # 默认搜索引擎: bing, tavily, magic 或 metaso
  default_engine: "${WEB_SEARCH_DEFAULT_ENGINE:-magic}"

# 图片搜索引擎选择
image_search:
  # 默认图片搜索引擎: bing, serpapi 或 magic
  default_engine: "${IMAGE_SEARCH_DEFAULT_ENGINE:-magic}"

filebase:
  embedding_model_id: "${FILEBASE_EMBEDDING_MODEL_ID:-magic-embedding}"
  collection_prefix: "${FILEBASE_COLLECTION_PREFIX:-SUPERMAGIC-FILEBASE}"
  max_vectorization_concurrency: "${FILEBASE_MAX_VECTORIZATION_CONCURRENCY:-20}"
  max_embedding_retry_attempts: "${FILEBASE_MAX_EMBEDDING_RETRY_ATTEMPTS:-5}"

token_service:
  address: "${TOKEN_SERVICE_ADDRESS}"
  redis_uri: "${REDIS_URI}"
  app_id: "${APP_ID}"
  app_secret: "${APP_SECRET}"

qdrant:
  base_uri: "${QDRANT_BASE_URI}"
  api_key: "${QDRANT_API_KEY}"
  collection_prefix: "${QDRANT_COLLECTION_PREFIX:-SUPERMAGIC-}"
  filebase_prefix: "${QDRANT_FILEBASE_PREFIX:-SUPERMAGIC-FILEBASE-}"

# TikHub配置
tikhub:
  api_key: "${TIKHUB_API_KEY}"

# 存储服务配置
storage:
  # 火山引擎TOS配置
  tos:
    host: "${TOS_HOST}"
    policy: "${TOS_POLICY}"
    algorithm: "${TOS_ALGORITHM}"
    date: "${TOS_DATE}"
    credential: "${TOS_CREDENTIAL}"
    signature: "${TOS_SIGNATURE}"
    dir: "${TOS_DIR}"
    content_type: "${TOS_CONTENT_TYPE}"

sandbox:
  id: "${SANDBOX_ID:-}"
  app_env: "${APP_ENV:-dev}"
  magic_authorization: "${MAGIC_AUTHORIZATION}"
  fetch_workspace: "${FETCH_WORKSPACE:-True}"
  agent_idle_timeout: "${AGENT_IDLE_TIMEOUT:-1200}"
  idle_monitor_interval: "${IDLE_MONITOR_INTERVAL:-60}"
  # 是否将 init_client_message 中的 authorization 转发为额外的 USER-Authorization header
  # true: API Key 使用 config.yaml 的 api_key，额外添加 USER-Authorization header（值为 authorization）
  # false: 标准 LLM 认证流程，只使用 config.yaml 的 api_key，不转发 USER-Authorization header
  forward_user_authorization: "${FORWARD_USER_AUTHORIZATION:-true}"

# 火山引擎语音配置
asr:
  app_id: "${ASR_VKE_APP_ID}"
  token: "${ASR_VKE_TOKEN}"
  cluster: "${ASR_VKE_CLUSTER}"
  secret_key: "${ASR_VKE_SECRET_KEY}"

# Magic-Space 配置
magic_space:
  api_key: "${MAGIC_SPACE_API_KEY}"
  api_base_url: "${MAGIC_SPACE_API_BASE_URL}"

# PDF 理解服务配置
pdf_understanding:
  api_key: "${PDF_UNDERSTANDING_API_KEY}"
  api_url: "${PDF_UNDERSTANDING_API_URL}"

# 语音理解服务配置
audio_understanding:
  api_key: "${VOICE_UNDERSTANDING_API_KEY}"
  api_base_url: "${VOICE_UNDERSTANDING_API_BASE_URL}"

# Checkpoint管理配置
checkpoint:
  # 最大保留的checkpoint数量
  max_count: ${CHECKPOINT_MAX_COUNT:-10}

  # 是否启用自动清理功能
  auto_cleanup: ${CHECKPOINT_AUTO_CLEANUP:-true}

# =====================================================
# AI Ability Configuration (AI能力配置)
# =====================================================
# AI能力配置管理各种AI能力（如视觉理解、信息精炼等）使用的模型和参数
# 支持环境变量占位符: ${ENV_VAR:-default_value}
# 配置优先级: dynamic_config.yaml > config.yaml > 环境变量 > 代码默认值
# =====================================================
ai_abilities:
  # Visual Understanding Ability (视觉理解能力)
  # Used for image analysis and visual content understanding
  visual_understanding:
    model_id: "${VISUAL_UNDERSTANDING_MODEL_ID:-qwen3.5-flash}"
    timeout: 120
    max_images: 10
    enabled: true

  # Summarize Ability (信息精炼能力)
  # Used for text summarization and information extraction
  summarize:
    model_id: "${SUMMARIZE_MODEL_ID:-qwen-flash}"
    default_target_length: 500
    enabled: true

  # Smart Filename Ability (智能文件名生成能力)
  # Used for generating smart filenames from webpage titles
  smart_filename:
    model_id: "${SMART_FILENAME_MODEL_ID:-deepseek-chat}"
    timeout: 60
    enabled: true

  # Purify Ability (内容净化能力)
  # Used for content purification and cleaning
  purify:
    model_id: "${PURIFY_MODEL_ID:-deepseek-chat}"
    max_tokens: 24000
    enabled: true

  # Deep Write Ability (深度写作能力)
  # Used for deep content writing with references
  deep_write:
    model_id: "${DEEP_WRITE_MODEL_ID:-deepseek-reasoner}"
    temperature: 0.7
    min_reference_files: 3
    enabled: true

  # Analysis Audio Ability (音频分析能力)
  # Used for analyzing audio project content
  analysis_audio:
    model_id: "${ANALYSIS_AUDIO_MODEL_ID:-qwen3.5-flash}"
    enabled: true

  # Analysis Slide Ability (网页/幻灯片分析能力)
  # Used for analyzing webpage/slide content
  analysis_slide:
    model_id: "${ANALYSIS_SLIDE_MODEL_ID:-deepseek-chat}"
    timeout: 60
    enabled: true

  # Compact Ability (上下文压缩能力)
  # 压缩触发时临时切换到此模型，压缩完成后恢复原模型
  # 不配置 model_id（或设为空）时，沿用主 Agent 当前模型，行为与之前一致
  compact:
    model_id: "${COMPACT_MODEL_ID:-}"

# =====================================================
# Web Scraping 网页爬取配置
# =====================================================
web_scraping:
  # 是否启用 SearchAPI 作为降级方案 (当无头浏览器遇到反爬虫时使用)
  enable_search_api_fallback: ${WEB_SCRAPING_ENABLE_API_FALLBACK:-true}

  # SearchAPI 配置 (第三方网页爬取服务)
  search_api:
    # API 端点地址
#    endpoint: ${SEARCH_API_ENDPOINT:-https://searchapi.cloudsway.net/search/HcAMcybqJTnDtGiJ/read}
    # API Token (必须通过环境变量 MAGIC_API_KEY 设置, 走magic-service代理)
    token: ${MAGIC_API_KEY}
    # 爬取模式: quality (质量优先) 或 speed (速度优先)
    mode: ${SEARCH_API_MODE:-quality}
    # 请求超时时间(秒)
    timeout: ${SEARCH_API_TIMEOUT:-30}

  # 内容验证配置 (用于检测反爬虫/无效内容)
  content_validation:
    # 是否启用反爬虫关键词检测
    enable_anti_crawler_detection: ${WEB_SCRAPING_ENABLE_ANTI_CRAWLER_DETECTION:-true}
    # 最小有效内容长度 (字符)
    min_content_length: ${WEB_SCRAPING_MIN_CONTENT_LENGTH:-50}
    # 最小有效文本长度 (去除HTML后, 字符)
    min_text_length: ${WEB_SCRAPING_MIN_TEXT_LENGTH:-100}
