# =====================================================
# Super Magic 配置文件
# =====================================================
# 重要安全提示:
# 1. 敏感的模型ID（如 ep-xxxxxxxxxx 格式的ID）应该只在 .env 文件中定义
# 2. 配置文件中应该使用人类可读的默认值（如 doubao-pro-32k）
# 3. 真实的模型ID应该通过环境变量在运行时注入
# 4. 此文件会被提交到Git，不要在此文件中暴露任何敏感信息
# =====================================================

browser:
  headless: ${BROWSER_HEADLESS:-false}
  cookies_file: ${BROWSER_COOKIES_FILE:-.browser/cookies.json}
  storage_state_template_url: ${BROWSER_STORAGE_STATE_TEMPLATE_URL:-None}

  # ========== 浏览器服务端模式配置 ==========
  # 是否使用服务端模式（连接远程浏览器服务器）
  # 注意：如果不配置此项，系统会根据环境自动选择：
  #   - dev 环境（sandbox.app_env=dev 或 APP_ENV=dev）：自动使用本地模式（use_server_mode=false）
  #   - 非 dev 环境：自动使用服务端模式（use_server_mode=true）
  # 如果明确配置此项，则使用配置的值，不进行自动选择
  # 环境变量: BROWSER_USE_SERVER_MODE
  # use_server_mode: ${BROWSER_USE_SERVER_MODE:-None}  # 注释掉，让系统根据环境自动选择

  # 浏览器服务端 WebSocket URL
  # 仅在 use_server_mode=true 时生效
  # 示例: ws://127.0.0.1:3000 (本地服务端)
  # 示例: ws://browser-server.example.com:3000 (远程服务端)
  # 环境变量: BROWSER_SERVER_URL
  browser_server_url: ${BROWSER_SERVER_URL:-ws://127.0.0.1:3000}

  # 服务端健康检查超时时间（秒）
  # 默认: 60
  # 环境变量: BROWSER_SERVER_HEALTH_CHECK_TIMEOUT
  server_health_check_timeout: ${BROWSER_SERVER_HEALTH_CHECK_TIMEOUT:-60}

  # 服务端健康检查重试间隔（秒）
  # 默认: 1.0
  # 环境变量: BROWSER_SERVER_HEALTH_CHECK_INTERVAL
  server_health_check_interval: ${BROWSER_SERVER_HEALTH_CHECK_INTERVAL:-1.0}

  # 服务端连接超时时间（毫秒）
  # 默认: 30000 (30秒)
  # 环境变量: BROWSER_SERVER_CONNECT_TIMEOUT
  server_connect_timeout: ${BROWSER_SERVER_CONNECT_TIMEOUT:-30000}
  # ========== 服务端模式配置结束 ==========

# LLM API 通用配置
llm:
  api_timeout: ${LLM_API_TIMEOUT:-600}
  api_max_retries: ${LLM_API_MAX_RETRIES:-3}
  # 自定义API请求头配置 - 所有请求头都从环境变量读取
  custom_api_headers: ${LLM_CUSTOM_API_HEADERS:-None}

# 当前活动的 Agent 模式 (可通过 ACTIVE_AGENT_MODE 环境变量覆盖)
# 可选值: apex(至强模式), efficient(高性价比模式), flash(极速模式)
active_agent_mode: ${ACTIVE_AGENT_MODE:-apex} # 默认为 'apex' 至强模式

# Agent 模式定义
agent_modes:
  # apex - 至强模式：全部使用高性能模型
  apex:
    model_aliases:
      main_llm: claude-3.7-cache
      coder_llm: claude-3.7-cache
      writer_llm: claude-3.7-cache
      browser_llm: gpt-4.1
      worker_llm: gpt-4.1

  # efficient - 高性价比模式：部分次要角色使用更经济的模型
  efficient:
    model_aliases:
      main_llm: gpt-4.1 # 主控使用性价比
      coder_llm: claude-3.7-cache # 编码保持高性能
      writer_llm: qwen-max # 写作使用经济型
      browser_llm: qwen-max # 浏览器使用经济型
      worker_llm: qwen-max # 部署使用经济型

  # flash - 极速模式：优先考虑响应速度，使用最快的模型
  flash:
    model_aliases:
      main_llm: deepseek-chat # 主控使用高速模型
      coder_llm: deepseek-chat # 编码使用高速模型
      writer_llm: deepseek-chat # 写作使用高速模型
      browser_llm: deepseek-chat # 浏览器使用高速模型
      worker_llm: deepseek-chat # 部署使用高速模型

agent:
  # Allow LLM to call multiple tools in a single response
  enable_multi_tool_calls: ${AGENT_ENABLE_MULTI_TOOL_CALLS:-false}
  # Execute multiple tool calls in parallel vs sequential (only applies when multi_tool_calls is enabled)
  enable_parallel_tool_calls: ${AGENT_ENABLE_PARALLEL_TOOL_CALLS:-false}
  # Timeout for parallel tool execution in seconds (None = no timeout)
  parallel_tool_calls_timeout: ${AGENT_PARALLEL_TOOL_CALLS_TIMEOUT:-None}
  # Model used for safety checking and content filtering
  safety_checker_model_id: ${AGENT_SAFETY_MODEL_ID:-gpt-4.1}

# 图片生成服务配置
image_generator:
  text_to_image_platform: ${TEXT_TO_IMAGE_PLATFORM}
  text_to_image_api_base_url: ${TEXT_TO_IMAGE_API_BASE_URL}
  text_to_image_access_key: ${TEXT_TO_IMAGE_ACCESS_KEY}
  text_to_image_secret_key: ${TEXT_TO_IMAGE_SECRET_KEY}
  image_to_image_model: ${IMAGE_TO_IMAGE_MODEL:-doubao-seedream-4-0-250828}
  text_to_image_model: ${TEXT_TO_IMAGE_MODEL:-doubao-seedream-4-0-250828}

# 模型别名映射
# 允许在 .agent 文件中使用别名，实际模型可通过环境变量指定
# 例如，WRITER_LLM 环境变量可以覆盖 writer_llm 的默认值
model_aliases:
  main_llm: ${MAIN_LLM:-claude-3.7-cache} # 主控 Agent (super-magic, magic) 使用
  coder_llm: ${CODER_LLM:-claude-3.7-cache} # 编程组 Agent (coder, data-analyst) 使用
  writer_llm: ${WRITER_LLM:-claude-3.7-cache} # 写作组 Agent (writer, slide) 使用
  browser_llm: ${BROWSER_LLM:-claude-3.7-cache} # 浏览器 Agent (web-browser) 使用
  worker_llm: ${WORKER_LLM:-claude-3.7-cache} # 部署 Agent (deployer) 使用

