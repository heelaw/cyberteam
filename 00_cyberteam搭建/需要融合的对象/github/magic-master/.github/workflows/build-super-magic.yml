name: Build and push super-magic image

on:
  workflow_dispatch:
  push:
    paths:
      - 'backend/super-magic/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build and push super-magic image
    uses: ./.github/workflows/image-build.yml
    secrets: inherit
    permissions:
      contents: write
      packages: write
      id-token: write
      attestations: write
    with:
      imageName: super-magic
