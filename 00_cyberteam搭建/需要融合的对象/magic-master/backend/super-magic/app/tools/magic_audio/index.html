      }

      // ==================== 搜索功能 ====================
      /**
       * 高亮搜索文本
       * @param {string} text - 原始文本
       * @param {string} query - 搜索关键词
       * @returns {string} 包含高亮标记的 HTML 字符串
       */
      function highlightText(text, query) {
        if (!query) return text;
        const regex = new RegExp(`(${query})`, "gi");
        return text.replace(regex, "<mark>$1</mark>");
      }

      /**
       * 渲染时间轴对话内容
       * 显示所有对话项，支持说话人筛选和搜索高亮
       */
      function renderTimeline() {
        if (!timelineContent) {
          console.error("renderTimeline: timelineContent element not found");
          return;
        }

        timelineContent.innerHTML = "";
        const query = searchInput.value.trim();

        meetingData.forEach((item, index) => {
          // 说话人筛选
          if (filteredSpeaker && item.speaker !== filteredSpeaker) {
            return;
          }

          const div = document.createElement("div");
          div.className = "timeline-item";
          div.id = `timeline-${index}`;

          // 添加书签标记
          if (bookmarks.has(index)) {
            div.classList.add("bookmarked");
          }

          // 添加笔记标记
          if (notes[index]) {
            div.classList.add("has-note");
          }

          // 构建HTML
          const text = highlightText(item.text, query);

          // 创建头部容器（第一行：时间 + 说话人）
          const headerDiv = document.createElement("div");
          headerDiv.className = "timeline-item-header";

          // 时间
          const timeSpan = document.createElement("span");
          timeSpan.className = "timeline-time";
          timeSpan.innerHTML = `<span class="material-icons">mic</span><span>${formatTime(item.time)}</span>`;

          // 说话人（带背景颜色的标签）
          const speakerSpan = document.createElement("span");
          const speakerSwatch = speakerColors[item.speaker];
          speakerSpan.className = "timeline-speaker";
          speakerSpan.textContent = getSpeakerName(item.speaker);
          if (speakerSwatch) {
            speakerSpan.style.setProperty("--timeline-speaker-bg", speakerSwatch.badge);
            speakerSpan.style.setProperty("--timeline-speaker-border", hexToRgba(speakerSwatch.hex, 0.35));
            speakerSpan.style.setProperty("--timeline-speaker-text", "#333");
          } else {
            speakerSpan.style.removeProperty("--timeline-speaker-bg");
            speakerSpan.style.removeProperty("--timeline-speaker-border");
            speakerSpan.style.removeProperty("--timeline-speaker-text");
          }

          headerDiv.appendChild(timeSpan);
          headerDiv.appendChild(speakerSpan);

          // 文本内容（第二行）
          const textDiv = document.createElement("div");
          textDiv.className = "timeline-text";
          textDiv.innerHTML = text;

          div.appendChild(headerDiv);
          div.appendChild(textDiv);

          // 添加笔记显示
          if (notes[index]) {
            const noteDiv = document.createElement("div");
            noteDiv.className = "item-note";
            noteDiv.textContent = `📝 ${notes[index]}`;
            div.appendChild(noteDiv);
          }

          // 点击跳转
          div.onclick = () => {
            seekTo(item.time, {
              autoplay: true,
              triggeredByUser: true,
            });
          };

          // 书签按钮
          const bookmarkToggle = document.createElement("button");
          bookmarkToggle.className = "bookmark-toggle";
          const bookmarkSVG = `<svg viewBox="0 0 24 24"><path d="M17 3H7c-1.1 0-1.99.9-1.99 2L5 21l7-3 7 3V5c0-1.1-.9-2-2-2zm0 15l-5-2.18L7 18V5h10v13z"/></svg>`;
          const bookmarkFilledSVG = `<svg viewBox="0 0 24 24"><path d="M17 3H7c-1.1 0-1.99.9-1.99 2L5 21l7-3 7 3V5c0-1.1-.9-2-2-2z"/></svg>`;
          bookmarkToggle.innerHTML = bookmarks.has(index) ? bookmarkFilledSVG : bookmarkSVG;

          bookmarkToggle.addEventListener("click", (e) => {
            e.stopPropagation();
            if (bookmarks.has(index)) {
              bookmarks.delete(index);
            } else {
              bookmarks.add(index);
            }
            renderTimeline();
            renderBookmarkMarkers();
            saveToStorage();
          });
          div.appendChild(bookmarkToggle);

          timelineContent.appendChild(div);
        });
      }

      // 监听时间轴滚动事件
      timelineContent.addEventListener("scroll", () => {
        userScrolling = true;

        // 清除之前的定时器
        if (scrollTimeout) {
          clearTimeout(scrollTimeout);
        }

        // 5秒后恢复自动滚动
        scrollTimeout = setTimeout(() => {
          userScrolling = false;
        }, 3000);
      });

      // 使用 requestAnimationFrame 实现平滑的进度更新
      let lastActiveIndex = -1;

      function updatePlaybackProgress() {
        if (!mediaPlayer || isDragging || (mediaPlayer.paused && mediaPlayer.currentTime === 0)) {
          requestAnimationFrame(updatePlaybackProgress);
          return;
        }

        const currentTime = mediaPlayer.currentTime;
        const durationForProgress = getMediaDuration();
        if (durationForProgress > 0) {
          setProgressUI(currentTime / durationForProgress);
        }

        // 找到当前时间对应的时间轴项
        let activeIndex = -1;
        for (let i = meetingData.length - 1; i >= 0; i--) {
          if (currentTime >= meetingData[i].time) {
            activeIndex = i;
            break;
          }
        }

        // 如果切换到新的句子，需要滚动
        const shouldScroll = activeIndex !== lastActiveIndex && activeIndex !== -1;
        lastActiveIndex = activeIndex;

        // 更新对话内容的高亮（timeline-item）
        // Use timeline-${activeIndex} ID to find the correct element, not forEach index
        // because when speaker filter is active, DOM index != meetingData index
        document.querySelectorAll(".timeline-item").forEach((item) => {
          item.classList.remove("active");
        });

        if (activeIndex !== -1) {
          const activeItem = document.getElementById(`timeline-${activeIndex}`);
          if (activeItem) {
            activeItem.classList.add("active");

            // 只在初始化完成、音频正在播放、用户未滚动且切换到新句子时才自动滚动
            // 使用自定义滚动函数，只在容器内滚动，避免触发整个页面滚动
            if (isInitialized && mediaPlayer.isPlaying && !userScrolling && shouldScroll) {
              scrollTimelineToElement(activeItem, "center");
            }
          }
        }

        // 更新主题项的高亮（topic-item）- 只高亮，不滚动
        document.querySelectorAll(".topic-item").forEach((item) => {
          const itemStartTime = parseFloat(item.dataset.time);
          const itemEndTime = item.dataset.timeEnd ? parseFloat(item.dataset.timeEnd) : null;

          // Check if current time is within the item's time range
          let isActive = false;
          if (itemEndTime !== null) {
            // Use half-open interval [start, end) to avoid double highlighting at boundaries
            // When currentTime equals the boundary, only the next chapter will be highlighted
            isActive = currentTime >= itemStartTime && currentTime < itemEndTime;
          } else {
            // No time range: check if currentTime matches start time (with small tolerance)
            isActive = Math.abs(currentTime - itemStartTime) < 1;
          }

          if (isActive) {
            item.classList.add("active");
          } else {
            item.classList.remove("active");
          }
        });

        // Auto-switch topic tab during playback (only when switching to new sentence to avoid too frequent updates)
        if (isInitialized && mediaPlayer.isPlaying && shouldScroll) {
          switchToTopicAtTime(currentTime);
        }

        requestAnimationFrame(updatePlaybackProgress);
      }

      // 启动动画循环
      updatePlaybackProgress();

      /**
       * 初始化标签切换功能
       * 统一处理所有分析面板的切换逻辑
       * 使用事件委托，支持动态创建的 tab
       */
      function initializeTabSwitching() {
        const tabsContainer = document.getElementById("analysis-tabs");
        const transcriptPanel = document.getElementById("transcript-panel");

        if (!tabsContainer || !transcriptPanel) return;

        // Use event delegation to handle dynamically created tabs
        tabsContainer.addEventListener("click", (e) => {
          const tab = e.target.closest(".timeline-tab");
          if (!tab) return;

          const tabType = tab.dataset.tab;

          // Update tab status
          document.querySelectorAll(".timeline-tab").forEach((t) => t.classList.remove("active"));
          tab.classList.add("active");

          // Hide transcript panel
          transcriptPanel.style.display = "none";

          // Hide all content panels
          document.querySelectorAll(".content-panel").forEach((panel) => {
            panel.classList.remove("active");
          });

          // Show corresponding panel
          if (tabType === "transcript") {
            transcriptPanel.style.display = "grid";

            // CRITICAL FIX: Sync timeline position when switching to transcript tab
            // This ensures timeline scrolls to current playback position
            if (mediaPlayer && isInitialized) {
              // Small delay to ensure panel is fully visible and rendered
              setTimeout(() => {
                const currentTime = mediaPlayer.currentTime;
                updateTimelineProgress(currentTime);

          } else {
            const panel = document.getElementById(`${tabType}-panel`);
            if (panel) {
              panel.classList.add("active");
              renderAnalysisPanel(tabType);
            } else {
              console.warn(`Panel not found: ${tabType}-panel`);

          // Adjust panel height after switching tabs
          setTimeout(() => adjustContentPanelHeight(), 0);

          saveToStorage();

      /**
       * 渲染分析面板内容
       *
       * 状态判断：undefined → 加载中 | null → 失败 | string → 成功
       *
       * @param {string} panelId - 面板 ID
       */
      function renderAnalysisPanel(panelId) {
        const panelConfig = ANALYSIS_PANELS_CONFIG.find((p) => p.id === panelId);
        if (!panelConfig) return;

        const contentElement = document.getElementById(`${panelId}-content`);
        if (!contentElement) return;

        // 已渲染过，跳过
        if (contentElement.dataset.rendered === "true") return;

        const content = analysisContent[panelId];

        // ===== 状态1: 加载中（undefined） =====
        if (content === undefined) {
          contentElement.innerHTML = `
                    <div style="
                        display: flex;
                        flex-direction: column;
                        align-items: center;
                        justify-content: center;
                        min-height: 300px;
                        padding: 60px 40px;
                        color: #999;
                    ">
                        <div class="loading-spinner" style="margin-bottom: 16px;"></div>
                        <div style="font-size: 14px;">加载中...</div>
                    </div>
                `;
          // 不标记为已渲染，等内容加载完后重新渲染
          return;
        }

        // ===== 状态2: 加载失败（null） =====
        if (content === null) {
          // 笔记是用户手动编写的，不是 AI 生成的，显示简单提示
          if (panelId === "notes") {
            contentElement.innerHTML = '<div class="empty-state">暂无内容</div>';
          } else {
            showPanelErrorMessage(contentElement, panelConfig.title, "文件加载失败，请检查网络连接或文件是否存在");
          }
          contentElement.dataset.rendered = "true";
          return;
        }

        // ===== 状态3: 内容为空（string 但为空） =====
        if (panelConfig.type !== "iframe" && (!content || content.trim() === "")) {
          // 笔记是用户手动编写的，不是 AI 生成的，显示简单提示
          if (panelId === "notes") {
            contentElement.innerHTML = '<div class="empty-state">暂无内容</div>';
          } else {
            showPanelErrorMessage(contentElement, panelConfig.title, "内容为空，可能尚未生成");
          }
          contentElement.dataset.rendered = "true";
          return;
        }

        // ===== 状态4: 加载成功（string 且有内容） =====

        try {
          if (panelConfig.type === "markdown") {
            // Render markdown content with heading IDs for TOC
            const html = markdownToHTML(content, true);
            // Double check rendered HTML is not empty
            if (!html || html.trim() === "") {
              showPanelErrorMessage(contentElement, panelConfig.title, "内容解析失败");
              contentElement.dataset.rendered = "true";
              return;
            }

            // Generate table of contents
            const { tocHTML, insertPosition, h1Count } = generateTableOfContents(html);

            // Insert TOC into HTML
            if (tocHTML) {
              if (insertPosition === "top") {
                // Multiple H1 or no H1: insert at top
                contentElement.innerHTML = tocHTML + html;
              } else {
                // Single H1: insert after H1
                const tempDiv = document.createElement("div");
                tempDiv.innerHTML = html;
                const firstH1 = tempDiv.querySelector("h1");
                if (firstH1) {
                  firstH1.insertAdjacentHTML("afterend", tocHTML);
                  contentElement.innerHTML = tempDiv.innerHTML;
                } else {
                  // Fallback: insert at top if H1 not found
                  contentElement.innerHTML = tocHTML + html;
                }
              }
            } else {
              contentElement.innerHTML = html;
            }
          } else if (panelConfig.type === "mindmap") {
            // Render mindmap using simple-mind-map
            renderMindmap(content, contentElement);
          } else if (panelConfig.type === "iframe") {
            // Render iframe for external HTML files (e.g., metrics)
            const filePath = projectConfig?.files?.[panelConfig.fileKey];
            if (!filePath) {
              showPanelErrorMessage(contentElement, panelConfig.title, "文件路径未配置");
              contentElement.dataset.rendered = "true";
              return;
            }

            // Show loading state
            contentElement.innerHTML = '<div style="display: flex; align-items: center; justify-content: center; height: 100%; color: #999;">加载中...</div>';

            // Fetch HTML content and replace speaker names
            fetch(filePath)
              .then((response) => {
                if (!response.ok) {
                  throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                return response.text();
              })
              .then((htmlContent) => {
                // Check if content is empty
                if (!htmlContent || htmlContent.trim() === "") {
                  throw new Error("文件内容为空");
                }

                // Replace speaker names in HTML content
                const processedHtml = replaceSpeakerNames(htmlContent);

                // Create a blob URL with the processed HTML
                const blob = new Blob([processedHtml], { type: "text/html" });
                const blobUrl = URL.createObjectURL(blob);

                const iframe = document.createElement("iframe");
                iframe.src = blobUrl;
                iframe.style.cssText = "width: 100%; height: 100%; border: none;";
                contentElement.innerHTML = "";
                contentElement.appendChild(iframe);

                // Mark as successfully rendered
                contentElement.dataset.rendered = "true";

                // Clean up blob URL when iframe is removed
                iframe.addEventListener("load", () => {
                  // Keep the blob URL alive while iframe is using it
                });
              })
              .catch((error) => {
                console.error("Error loading iframe content:", error);
                showPanelErrorMessage(contentElement, panelConfig.title, error.message || "加载失败");
                contentElement.dataset.rendered = "true";
              });

            // Don't mark as rendered yet for iframe - wait for fetch to complete
            return;
          }

          contentElement.dataset.rendered = "true";

          // Setup controls after rendering
          setupPanelControls(panelId, panelConfig, content);

          // Re-bind scroll listener for back-to-top button
          if (window.bindBackToTopScroll) {
            window.bindBackToTopScroll(contentElement);
          }
        } catch (error) {
          console.error(`Error rendering ${panelConfig.title}:`, error);
          showPanelErrorMessage(contentElement, panelConfig.title, error.message || "渲染失败");
          contentElement.dataset.rendered = "true";
        }
      }

      /**
       * Clean markdown inline formatting from text
       * Remove bold, italic, code, and other inline markdown syntax
       * @param {string} text - Text with markdown formatting
       * @returns {string} Plain text without markdown formatting
       */
      function cleanMarkdownFormatting(text) {
        if (!text) return text;

        return (
          text
            // Replace speaker names first (without HTML)
            .replace(/Speaker-(\d+)/g, (match, number) => {
              const speakerId = `Speaker-${number}`;
              return getSpeakerName(speakerId);
            })
            // Remove bold: **text** or __text__
            .replace(/\*\*(.+?)\*\*/g, "$1")
            .replace(/__(.+?)__/g, "$1")
            // Remove italic: *text* or _text_
            .replace(/\*(.+?)\*/g, "$1")
            .replace(/_(.+?)_/g, "$1")
            // Remove inline code: `text`
            .replace(/`(.+?)`/g, "$1")
            // Remove links: [text](url)
            .replace(/\[(.+?)\]\(.+?\)/g, "$1")
            // Remove images: ![alt](url)
            .replace(/!\[(.+?)\]\(.+?\)/g, "$1")
            // Clean up any remaining formatting
            .trim()
        );
      }

      /**
       * Convert markdown list to Mind-Elixir data structure
       * @param {string} markdown - Markdown list content
       * @returns {Object} Mind-Elixir data
       */
      function markdownToSimpleMindMap(markdown) {
        // Parse markdown list structure
        // Speaker names will be replaced in cleanMarkdownFormatting()
        const lines = markdown.split("\n").filter((line) => line.trim());

        // Find root node (first level-0 item)
        let rootText = "录音内容";
        const contentLines = [];

        lines.forEach((line) => {
          if (line.trim().startsWith("#")) return;

          const match = line.match(/^(\s*)-\s+(.+)$/);
          if (match) {
            const indent = match[1].length;
            if (indent === 0) {
              rootText = cleanMarkdownFormatting(match[2].trim());
            } else {
              contentLines.push(line);
            }
          }
        });

        // Parse children recursively
        const parseChildren = (lines, startLevel) => {
          const children = [];
          const stack = [];

          lines.forEach((line) => {
            const match = line.match(/^(\s*)-\s+(.+)$/);
            if (!match) return;

            const indent = match[1].length;
            const level = Math.floor(indent / 2);
            const text = cleanMarkdownFormatting(match[2].trim());

            if (level === startLevel) {
              const node = {
                data: { text },
                children: [],
              };
              children.push(node);
              stack.length = 0;
              stack.push({ level, node });
            } else if (level > startLevel && stack.length > 0) {
              // Find parent
              while (stack.length > 0 && stack[stack.length - 1].level >= level) {
                stack.pop();
              }

              if (stack.length > 0) {
                const parent = stack[stack.length - 1].node;
                const node = {
                  data: { text },
                  children: [],
                };
                if (!parent.children) parent.children = [];
                parent.children.push(node);
                stack.push({ level, node });
              }
            }
          });

          return children;
        };

        const children = parseChildren(contentLines, 1);

        return {
          data: {
            text: cleanMarkdownFormatting(rootText),
          },
          children: children,
        };
      }

      /**
       * 渲染思维导图（使用 simple-mind-map）
       * Tab is only created when markdown content exists, so markdown parameter is always valid
       * @param {string} markdown - Markdown 内容
       * @param {HTMLElement} container - 容器元素
       */
      function renderMindmap(markdown, container) {
        try {
          // Check if simpleMindMap is loaded
          if (!window.simpleMindMap || !window.simpleMindMap.default) {
            console.error("simple-mind-map library not loaded");
            container.innerHTML = '<div class="empty-state">思维导图库未加载，请检查网络连接</div>';
            return;
          }

          // Convert markdown to simple-mind-map data
          const mindData = markdownToSimpleMindMap(markdown);

          // Create container
          container.innerHTML = '<div id="mindmap-container"></div>';
          const mindmapDiv = container.querySelector("#mindmap-container");

          // Get MindMap constructor
          const MindMap = window.simpleMindMap.default;

          // Wait for layout to complete before initializing
          // This ensures the container has proper dimensions
          setTimeout(() => {
            // Verify container has dimensions
            const rect = mindmapDiv.getBoundingClientRect();

            if (rect.width === 0 || rect.height === 0) {
              console.error("Mindmap container has zero dimensions");
              container.innerHTML = '<div class="empty-state">容器尺寸错误，请刷新页面重试</div>';
              return;
            }

            // Initialize simple-mind-map
            const mindMap = new MindMap({
              el: mindmapDiv,
              data: mindData,
              layout: "logicalStructure", // Logical structure layout
              theme: "classic", // Use classic theme for better customization
              themeConfig: {
                // Background
                backgroundColor: "#ffffff",
                backgroundImage: "none",
                backgroundRepeat: "no-repeat",
                // Root node colors (black and white)
                root: {
                  fillColor: "#2c2c2c",
                  color: "#ffffff",
                  borderColor: "#1a1a1a",
                  borderWidth: 2,
                  fontSize: 16,
                },
                // Second level nodes
                second: {
                  fillColor: "#f5f5f5",
                  color: "#2c2c2c",
                  borderColor: "#999999",
                  borderWidth: 1,
                  fontSize: 14,
                },
                // Third level and below nodes
                node: {
                  fillColor: "#ffffff",
                  color: "#3c3c3c",
                  borderColor: "#cccccc",
                  borderWidth: 1,
                  fontSize: 13,
                },
                // Generalization node colors
                generalization: {
                  fillColor: "#f9f9f9",
                  color: "#666666",
                  borderColor: "#999999",
                  borderWidth: 1,
                  fontSize: 12,
                },
                // Line colors
                lineColor: "#666666",
                lineWidth: 1.5,
              },
              scaleRatio: 0.02,
              readonly: true, // Set to read-only to prevent accidental edits
              enableFreeDrag: true,
              mousewheelAction: "zoom",
              mousewheelZoomActionReverse: true,
              moveSensitivity: 0.3,
              backgroundColor: "#ffffff",
              watermarkConfig: {
                show: false,
              },
            });

            // Store instance for cleanup
            container._simpleMindMapInstance = mindMap;

            // Fit view to center after mindmap initialization completes
            // Wait for mindmap to fully render before calling fit()
            const fitView = () => {
              if (mindMap && mindMap.view && typeof mindMap.view.fit === "function") {
                try {
                  mindMap.view.fit();
                } catch (e) {
                  console.warn("Failed to fit mindmap view:", e);
                }
              }
            };

            // Force set background color to white
            const setBackgroundWhite = () => {
              // Set container background
              if (mindmapDiv) {
                mindmapDiv.style.backgroundColor = "#ffffff";
              }
              // Find and set SVG/canvas background
              const svg = mindmapDiv.querySelector("svg");
              if (svg) {
                svg.style.backgroundColor = "#ffffff";
              }
              const canvas = mindmapDiv.querySelector("canvas");
              if (canvas) {
                canvas.style.backgroundColor = "#ffffff";
              }
              // Set any child divs
              const childDivs = mindmapDiv.querySelectorAll("div");
              childDivs.forEach((div) => {
                if (div.style.backgroundColor && div.style.backgroundColor !== "transparent") {
                  div.style.backgroundColor = "#ffffff";
                }
              });
            };

            // Delay to ensure rendering is complete
            setTimeout(() => {
              fitView();
              setBackgroundWhite();
            }, 150);

            // Also set immediately in case library renders sync
            setTimeout(setBackgroundWhite, 50);
          }, 100); // End of setTimeout for layout completion
        } catch (error) {
          console.error("Error rendering mindmap:", error);
          container.innerHTML = `<div class="empty-state">思维导图渲染失败: ${error.message}</div>`;

      /**
       * 设置面板控件（搜索、导出等）
       * @param {string} panelId - 面板 ID
       * @param {Object} panelConfig - 面板配置
       * @param {string} markdown - Markdown 内容
       */
      function setupPanelControls(panelId, panelConfig, markdown) {
        const contentElement = document.getElementById(`${panelId}-content`);

        // Setup search functionality
        if (panelConfig.hasSearch) {
          const searchInput = document.getElementById(`${panelId}-search-input`);
          const searchCount = document.getElementById(`${panelId}-search-count`);
          const searchPrev = document.getElementById(`${panelId}-search-prev`);
          const searchNext = document.getElementById(`${panelId}-search-next`);

          let searchResults = [];
          let currentSearchIndex = -1;

          if (searchInput) {
            const performPanelSearch = () => {
              const query = searchInput.value.trim();
              if (!query) {
                searchResults = [];
                currentSearchIndex = -1;
                if (searchCount) searchCount.textContent = "";
                // Re-render without highlighting
                const html = markdownToHTML(markdown);
                contentElement.innerHTML = html;
                return;
              }

              // Re-render and apply highlighting
              const html = markdownToHTML(markdown);
              contentElement.innerHTML = html;

              // Find and highlight matches
              const walker = document.createTreeWalker(contentElement, NodeFilter.SHOW_TEXT, null);

              const textNodes = [];
              let node;
              while ((node = walker.nextNode())) {
                if (node.textContent.toLowerCase().includes(query.toLowerCase())) {
                  textNodes.push(node);
                }
              }

              textNodes.forEach((textNode) => {
                const parent = textNode.parentNode;
                const text = textNode.textContent;
                const queryLower = query.toLowerCase();
                const textLower = text.toLowerCase();
                let lastIndex = 0;
                const fragment = document.createDocumentFragment();

                let index = textLower.indexOf(queryLower);
                while (index !== -1) {
                  if (index > lastIndex) {
                    fragment.appendChild(document.createTextNode(text.substring(lastIndex, index)));
                  }
                  const highlight = document.createElement("mark");
                  highlight.textContent = text.substring(index, index + query.length);
                  fragment.appendChild(highlight);
                  lastIndex = index + query.length;
                  index = textLower.indexOf(queryLower, lastIndex);
                }

                if (lastIndex < text.length) {
                  fragment.appendChild(document.createTextNode(text.substring(lastIndex)));
                }

                parent.replaceChild(fragment, textNode);
              });

              const highlights = contentElement.querySelectorAll("mark");
              searchResults = Array.from(highlights);
              currentSearchIndex = searchResults.length > 0 ? 0 : -1;

              if (searchCount) {
                searchCount.textContent = searchResults.length > 0 ? `${currentSearchIndex + 1}/${searchResults.length}` : "无结果";
              }

              if (searchResults.length > 0) {
                searchResults[0].scrollIntoView({ behavior: "smooth", block: "center" });
              }
            };

            searchInput.addEventListener("input", performPanelSearch);

            // Support Enter key to jump to next result
            searchInput.addEventListener("keydown", (e) => {
              if (e.key === "Enter") {
                e.preventDefault();
                if (searchNext) {
                  searchNext.click();
                }
              }
            });
          }

          if (searchPrev) {
            searchPrev.addEventListener("click", () => {
              if (searchResults.length === 0) return;
              currentSearchIndex = (currentSearchIndex - 1 + searchResults.length) % searchResults.length;
              if (searchCount) searchCount.textContent = `${currentSearchIndex + 1}/${searchResults.length}`;
              searchResults[currentSearchIndex].scrollIntoView({ behavior: "smooth", block: "center" });
            });
          }

          if (searchNext) {
            searchNext.addEventListener("click", () => {
              if (searchResults.length === 0) return;
              currentSearchIndex = (currentSearchIndex + 1) % searchResults.length;
              if (searchCount) searchCount.textContent = `${currentSearchIndex + 1}/${searchResults.length}`;
              searchResults[currentSearchIndex].scrollIntoView({ behavior: "smooth", block: "center" });
            });
          }
        }

        // Setup copy functionality
        if (panelConfig.hasExport) {
          const exportBtn = document.getElementById(`${panelId}-export-btn`);
          if (exportBtn && !exportBtn.dataset.initialized) {
            exportBtn.addEventListener("click", async () => {
              // Tab is only created when content exists, so markdown always exists
              try {
                await navigator.clipboard.writeText(markdown);

                // Visual feedback
                const originalText = exportBtn.innerHTML;
                exportBtn.innerHTML = '<span class="material-icons">check</span> 已复制';
                exportBtn.style.background = "#10b981";
                exportBtn.style.color = "white";
                exportBtn.style.borderColor = "#10b981";

                setTimeout(() => {
                  exportBtn.innerHTML = originalText;
                  exportBtn.style.background = "";
                  exportBtn.style.color = "";
                  exportBtn.style.borderColor = "";
                }, 2000);
              } catch (err) {
                console.error(`Failed to copy ${panelConfig.title}:`, err);

                // Fallback: try older API
                try {
                  const textarea = document.createElement("textarea");
                  textarea.value = markdown;
                  textarea.style.position = "fixed";
                  textarea.style.opacity = "0";
                  document.body.appendChild(textarea);
                  textarea.select();
                  document.execCommand("copy");
                  document.body.removeChild(textarea);

                  // Visual feedback
                  const originalText = exportBtn.innerHTML;
                  exportBtn.innerHTML = '<span class="material-icons">check</span> 已复制';
                  exportBtn.style.background = "#10b981";
                  exportBtn.style.color = "white";
                  exportBtn.style.borderColor = "#10b981";

                  setTimeout(() => {
                    exportBtn.innerHTML = originalText;
                    exportBtn.style.background = "";
                    exportBtn.style.color = "";
                    exportBtn.style.borderColor = "";
                  }, 2000);
                } catch (err2) {
                  console.error(`Fallback copy failed for ${panelConfig.title}:`, err2);
                  alert("复制失败，请手动复制内容");
                }
              }
            });
            exportBtn.dataset.initialized = "true";
          }
        }

        // Setup edit button for all panels with hasEdit
        if (panelConfig.hasEdit) {
          const editBtn = document.getElementById(`${panelId}-edit-btn`);
          if (editBtn) {
            // Tab is only created when content exists, so filePath always exists
            const filePath = projectConfig?.files?.[panelConfig.fileKey];
            editBtn.href = filePath;
            editBtn.dataset.autoEdit = "true"; //  TODO(@lizhiqi): 在超级麦吉前端打开tab会自动进入编辑状态
            editBtn.style.display = "";
          }
        }

        // Setup table of contents for markdown panels
        if (panelConfig.type === "markdown") {
          setupTableOfContents(contentElement);
        }
      }

      /**
       * 设置目录功能（展开/收起、链接跳转）
       * @param {HTMLElement} container - 内容容器元素
       */
      function setupTableOfContents(container) {
        if (!container) return;

        // Setup TOC toggle buttons (expand/collapse individual items)
        container.querySelectorAll(".toc-toggle").forEach((toggle) => {
          // Skip placeholders
          if (toggle.classList.contains("toc-toggle-placeholder")) return;

          toggle.addEventListener("click", (e) => {
            e.stopPropagation();
            const isExpanded = toggle.classList.contains("expanded");
            const tocItem = toggle.closest(".toc-item");
            const subList = tocItem.querySelector(":scope > .toc-list");

            if (subList) {
              if (isExpanded) {
                toggle.classList.remove("expanded");
                subList.style.display = "none";
              } else {
                toggle.classList.add("expanded");
                subList.style.display = "block";
              }
            }
          });
        });

        // Setup smart toggle all button
        const toggleAllBtn = container.querySelector(".toc-toggle-all-btn");
        if (toggleAllBtn) {
          const toggleText = toggleAllBtn.querySelector(".toc-toggle-text");
          const toggleIcon = toggleAllBtn.querySelector(".material-icons");

          // Check if all items are expanded
          const updateToggleState = () => {
            const allToggles = container.querySelectorAll(".toc-toggle");
            const expandedToggles = container.querySelectorAll(".toc-toggle.expanded");
            const allExpanded = allToggles.length === expandedToggles.length;

            if (allExpanded) {
              toggleAllBtn.classList.remove("collapsed");
              toggleText.textContent = "收起";
              toggleIcon.textContent = "unfold_less";
              toggleAllBtn.title = "全部收起";
            } else {
              toggleAllBtn.classList.add("collapsed");
              toggleText.textContent = "展开";
              toggleIcon.textContent = "unfold_more";
              toggleAllBtn.title = "全部展开";
            }
          };

          toggleAllBtn.addEventListener("click", () => {
            const allToggles = container.querySelectorAll(".toc-toggle");
            const expandedToggles = container.querySelectorAll(".toc-toggle.expanded");
            const shouldCollapse = allToggles.length === expandedToggles.length;

            if (shouldCollapse) {
              // Collapse all
              allToggles.forEach((toggle) => toggle.classList.remove("expanded"));
              container.querySelectorAll(".toc-list .toc-list").forEach((list) => {
                list.style.display = "none";
              });
            } else {
              // Expand all
              allToggles.forEach((toggle) => toggle.classList.add("expanded"));
              container.querySelectorAll(".toc-list .toc-list").forEach((list) => {
                list.style.display = "block";
              });
            }

            updateToggleState();
          });

          // Initial state check
          updateToggleState();

          // Update state when individual toggles are clicked
          container.querySelectorAll(".toc-toggle").forEach((toggle) => {
            toggle.addEventListener("click", () => {
              setTimeout(updateToggleState, 50);
            });
          });
        }

        // Setup TOC link smooth scrolling
        container.querySelectorAll(".toc-link").forEach((link) => {
          link.addEventListener("click", (e) => {
            e.preventDefault();
            const headingId = link.dataset.headingId;
            const heading = container.querySelector(`#${headingId}`);

            if (heading) {
              // Calculate scroll position with top offset (留出顶部空间)
              const headingRect = heading.getBoundingClientRect();
              const containerRect = container.getBoundingClientRect();
              const currentScrollTop = container.scrollTop;

              // 标题相对于容器滚动区域的位置
              const headingOffsetTop = currentScrollTop + (headingRect.top - containerRect.top);

              // 减去偏移量（45px 的顶部留白，实践最佳值，勿改）
              const topOffset = 45;
              const targetScrollTop = Math.max(0, headingOffsetTop - topOffset);

              // 恒定的动画时长：120ms
              const duration = 120;
              const startScroll = currentScrollTop;
              const scrollDelta = targetScrollTop - startScroll;
              const startTime = performance.now();

              const animateScroll = (currentTime) => {
                const elapsed = currentTime - startTime;
                const progress = Math.min(elapsed / duration, 1);

                // Ease out cubic for smooth deceleration
                const easeProgress = 1 - Math.pow(1 - progress, 3);

                container.scrollTop = startScroll + scrollDelta * easeProgress;

                if (progress < 1) {
                  requestAnimationFrame(animateScroll);
                } else {
                  // 滚动完成后显示高亮效果
                  showHeadingHighlight(heading);
                }
              };

              requestAnimationFrame(animateScroll);
            }
          });
        });

        // 标题高亮效果（独立函数，更快的动画）
        function showHeadingHighlight(heading) {
          heading.style.transition = "background-color 0.15s ease";
          const originalBg = heading.style.backgroundColor;
          heading.style.backgroundColor = "rgba(74, 158, 255, 0.15)";

          setTimeout(() => {
            heading.style.backgroundColor = originalBg;
            setTimeout(() => {
              heading.style.transition = "";
            }, 150);
          }, 300);
        }
      }

      // ==================== 兼容性函数 ====================
      /**
       * 渲染录音纪要内容（兼容性接口，内部调用统一的渲染逻辑）

      /**
       * 执行对话内容搜索
       * 搜索对话文本和说话人名字，并跳转到第一个结果
       * 如果当前有说话人筛选，则只在该说话人的对话中搜索
       */
      function performSearch() {
        const query = searchInput.value.trim().toLowerCase();
        if (!query) {
          searchResults = [];
          currentSearchIndex = -1;
          searchCount.textContent = "";
          renderTimeline();
          return;
        }

        // Apply speaker filter first if active
        searchResults = meetingData
          .map((item, index) => ({ ...item, index }))
          .filter((item) => {
            // If speaker filter is active, only search in that speaker's content
            if (filteredSpeaker && item.speaker !== filteredSpeaker) {
              return false;
            }
            // Then apply text search
            return item.text.toLowerCase().includes(query) || getSpeakerName(item.speaker).toLowerCase().includes(query);
          });

        currentSearchIndex = searchResults.length > 0 ? 0 : -1;
        searchCount.textContent = searchResults.length > 0 ? `${currentSearchIndex + 1}/${searchResults.length}` : "无结果";

        renderTimeline();

        if (searchResults.length > 0) {
          const item = searchResults[0];
          const shouldAutoplay = mediaPlayer && mediaPlayer.isPlaying;
          seekTo(item.time, {
            autoplay: shouldAutoplay,
            triggeredByUser: true,
          });
          const timelineItem = document.getElementById(`timeline-${item.index}`);
          if (timelineItem) {
            scrollTimelineToElement(timelineItem, "center");
          }
        }
      }

      /**
       * 处理搜索导航（上一个/下一个结果）
       * @param {Array} results - 搜索结果数组
       * @param {number} currentIndex - 当前结果索引
       * @param {Function} updateIndex - 更新索引的回调函数
       * @param {Function} updateCount - 更新计数显示的回调函数
       * @param {number} direction - 方向：-1 为上一个，1 为下一个
       * @param {Function} scrollToResult - 滚动到结果的回调函数
       */
      function handleSearchNavigation(results, currentIndex, updateIndex, updateCount, direction, scrollToResult) {
        if (results.length === 0) return;
        const newIndex = direction === -1 ? (currentIndex - 1 + results.length) % results.length : (currentIndex + 1) % results.length;
        updateIndex(newIndex);
        updateCount(`${newIndex + 1}/${results.length}`);
        scrollToResult(newIndex);
      }

      // 对话内容搜索事件监听
      searchInput.addEventListener("input", performSearch);

      // Support Enter key to jump to next result
      searchInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter") {
          e.preventDefault();
          searchNext.click();
        }
      });

      searchPrev.addEventListener("click", () => {
        if (searchResults.length === 0) return;

        // Always validate current result before navigation
        if (currentSearchIndex >= 0 && currentSearchIndex < searchResults.length) {
          const currentItem = searchResults[currentSearchIndex];
          // Check if current result still matches filter
          if (filteredSpeaker && currentItem.speaker !== filteredSpeaker) {
            // Current result doesn't match filter, re-search
            performSearch();
            return;
          }
        }

        currentSearchIndex = (currentSearchIndex - 1 + searchResults.length) % searchResults.length;
        searchCount.textContent = `${currentSearchIndex + 1}/${searchResults.length}`;

        const item = searchResults[currentSearchIndex];
        const shouldAutoplay = mediaPlayer && mediaPlayer.isPlaying;
        seekTo(item.time, {
          autoplay: shouldAutoplay,
          triggeredByUser: true,
        });
        const timelineItem = document.getElementById(`timeline-${item.index}`);
        if (timelineItem) {
          scrollTimelineToElement(timelineItem, "center");
        }
      });

      searchNext.addEventListener("click", () => {
        if (searchResults.length === 0) return;

        // Always validate current result before navigation
        if (currentSearchIndex >= 0 && currentSearchIndex < searchResults.length) {
          const currentItem = searchResults[currentSearchIndex];
          // Check if current result still matches filter
          if (filteredSpeaker && currentItem.speaker !== filteredSpeaker) {
            // Current result doesn't match filter, re-search
            performSearch();
            return;
          }
        }

        currentSearchIndex = (currentSearchIndex + 1) % searchResults.length;
        searchCount.textContent = `${currentSearchIndex + 1}/${searchResults.length}`;

        const item = searchResults[currentSearchIndex];
        const shouldAutoplay = mediaPlayer && mediaPlayer.isPlaying;
        seekTo(item.time, {
          autoplay: shouldAutoplay,
          triggeredByUser: true,
        });
        const timelineItem = document.getElementById(`timeline-${item.index}`);
        if (timelineItem) {
          scrollTimelineToElement(timelineItem, "center");
        }
      });

      // 定位到当前播放位置按钮
      if (locateCurrentBtn) {
        locateCurrentBtn.addEventListener("click", () => {
          if (!mediaPlayer || !isInitialized) return;

          const currentTime = mediaPlayer.currentTime;

          // Find the current active timeline item
          let activeIndex = -1;
          for (let i = meetingData.length - 1; i >= 0; i--) {
            if (currentTime >= meetingData[i].time) {
              activeIndex = i;
              break;
            }
          }

          if (activeIndex !== -1) {
            const activeItem = document.getElementById(`timeline-${activeIndex}`);
            if (activeItem) {
              // Use smart fast scroll (same as progress bar click)

              // Add a brief highlight effect after scroll

                activeItem.style.transition = "background-color 0.3s ease";

                activeItem.style.backgroundColor = "#e3f2fd";

                setTimeout(() => {
                  activeItem.style.backgroundColor = originalBg;
                  setTimeout(() => {

                  }, 300);

              }, 50);

          }

      /**
       * 更新速度按钮的激活状态
       * @param {number} speed - 当前播放速度
       */
      function updateSpeedButtons(speed) {
        // 更新桌面端的速度按钮
        document.querySelectorAll(".speed-button").forEach((b) => {
          b.classList.toggle("active", parseFloat(b.dataset.speed) === speed);
        });
        // 更新更多菜单中的速度按钮
        document.querySelectorAll(".more-menu-speed-button").forEach((b) => {
          b.classList.toggle("active", parseFloat(b.dataset.speed) === speed);
        });
      }

      /**
       * 设置播放速度
       * @param {number} speed - 播放速度
       */
      function setPlaybackSpeed(speed) {
        if (mediaPlayer) {
          mediaPlayer.playbackRate = speed;
        }
        currentSpeed = speed;
        updateSpeedButtons(speed);
      }

      // 速度控制 - 桌面端按钮
      document.querySelectorAll(".speed-button").forEach((btn) => {
        btn.addEventListener("click", () => {
          const speed = parseFloat(btn.dataset.speed);
          setPlaybackSpeed(speed);
        });
      });

      // 速度控制 - 更多菜单中的按钮
      document.querySelectorAll(".more-menu-speed-button").forEach((btn) => {
        btn.addEventListener("click", () => {
          const speed = parseFloat(btn.dataset.speed);
          setPlaybackSpeed(speed);
          // 关闭菜单
          moreMenuDropdown.classList.remove("show");
        });
      });

      // 更多菜单按钮点击事件
      if (moreMenuButton && moreMenuDropdown) {
        moreMenuButton.addEventListener("click", (e) => {
          e.stopPropagation();
          moreMenuDropdown.classList.toggle("show");
        });

        // 点击外部关闭菜单
        document.addEventListener("click", (e) => {
          if (!moreMenuButton.contains(e.target) && !moreMenuDropdown.contains(e.target)) {
            moreMenuDropdown.classList.remove("show");
          }
        });
      }

      // 快捷键支持
      document.addEventListener("keydown", (e) => {
        // 如果正在输入框中，不处理快捷键
        if (e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA") return;

        switch (e.key) {
          case " ": // 空格 - 播放/暂停
            e.preventDefault();
            playButton.click();
            break;
          case "ArrowLeft": // 左箭头 - 后退5秒
            e.preventDefault();
            if (mediaPlayer) {
              mediaPlayer.backward(5);
            }
            break;
          case "ArrowRight": // 右箭头 - 前进5秒
            e.preventDefault();
            if (mediaPlayer) {
              mediaPlayer.forward(5);
            }
            break;
          case "ArrowUp": // 上箭头 - 加速
            e.preventDefault();
            const newSpeed = Math.min(2, currentSpeed + 0.25);
            setPlaybackSpeed(newSpeed);
            break;
          case "ArrowDown": // 下箭头 - 减速
            e.preventDefault();
            const slowSpeed = Math.max(0.5, currentSpeed - 0.25);
            setPlaybackSpeed(slowSpeed);
            break;
          case "m":
          case "M": // M - 静音
            if (mediaPlayer) {
              mediaPlayer.muted = !mediaPlayer.muted;
            }
            break;
          case "/": // / - 聚焦搜索
            e.preventDefault();
            searchInput.focus();
            break;
        }
      });

      // 保存录音标题
      meetingTitle.addEventListener("input", saveToStorage);

      // 卸载页面前保存状态
      window.addEventListener("beforeunload", () => {
        if (mediaPlayer && getMediaDuration() > 0) {
          saveToStorage();
        }
      });

      // ==================== 分隔条拖动调整 ====================
      /**
       * Initialize resizer for topics/timeline sections
       * Allows users to drag the divider to adjust panel widths
       * Saves the width preference to localStorage
       */
      function initializeResizer() {
        const resizer = document.getElementById("main-resizer");
        const mainContent = document.querySelector(".main-content");
        const topicsSection = document.querySelector(".topics-section");

        if (!resizer || !mainContent || !topicsSection) return;

        if (!getInitialTopicsCollapsedState()) {
          const expandedWidth = getSavedTopicsExpandedWidth();
          mainContent.style.gridTemplateColumns = `${expandedWidth}px 6px 1fr`;
        }

        resizer.addEventListener("mousedown", (e) => {
          e.preventDefault();
          isResizing = true;
          startX = e.clientX;
          startWidth = topicsSection.offsetWidth;
          resizeStartExpandedWidth = startWidth;

          // Add visual feedback
          resizer.style.background = "rgba(0, 0, 0, 0.05)";
          document.body.style.cursor = "col-resize";
          document.body.style.userSelect = "none";
        });

        document.addEventListener("mousemove", (e) => {
          if (!isResizing) return;

          const deltaX = e.clientX - startX;
          const newWidth = startWidth + deltaX;

          // 拖动到足够窄时自动收起
          if (newWidth < TOPICS_SECTION_COLLAPSE_THRESHOLD) {
            isResizing = false;
            resizer.style.background = "transparent";
            document.body.style.cursor = "";
            document.body.style.userSelect = "";

            saveTopicsExpandedWidth(resizeStartExpandedWidth);
            setTopicsSectionCollapsed(true);

            setTimeout(() => {
              if (typeof adjustMainContentHeight === 'function') adjustMainContentHeight();
              if (typeof adjustContentPanelHeight === 'function') adjustContentPanelHeight();
            }, 0);

            return;
          }

          // Set reasonable bounds: min 200px, max 800px
          const constrainedWidth = Math.max(
            TOPICS_SECTION_MIN_WIDTH,
            Math.min(TOPICS_SECTION_MAX_WIDTH, newWidth),
          );

          // Update grid layout
          mainContent.style.gridTemplateColumns = `${constrainedWidth}px 6px 1fr`;
        });

        document.addEventListener("mouseup", () => {
          if (!isResizing) return;

          isResizing = false;
          resizer.style.background = "transparent";
          document.body.style.cursor = "";
          document.body.style.userSelect = "";

          const currentWidth = topicsSection.offsetWidth;
          saveTopicsExpandedWidth(currentWidth);
          saveTopicsCollapsed(false);

          // Trigger panel height adjustment after resize
          setTimeout(() => {
            adjustMainContentHeight();
            adjustContentPanelHeight();
          }, 0);
        });
      }

      // Initialize resizer after DOM is ready
      if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", initializeResizer);
      } else {
        initializeResizer();
      }

      // Note: Initialization is called by initializeUI() after data loaded from magic.project.js

      /**
       * 设置进度条 UI
       * 更新进度条宽度和进度手柄位置
       * @param {number} percentage - 进度百分比（0-1）
       */
      function setProgressUI(percentage) {
        if (!progressBar || !progressHandle || !progressContainer) {
          return;
        }
        const value = Number.isFinite(percentage) ? percentage : 0;
        const clamped = Math.max(0, Math.min(1, value));
        const percentText = `${(clamped * 100).toFixed(4)}%`;
        progressBar.style.width = percentText;
        progressHandle.style.left = percentText;

        // Ensure cursor is always pointer
        if (progressContainer.style.cursor !== "pointer") {
          progressContainer.style.cursor = "pointer";
        }
      }

      /**
       * 获取鼠标/触摸点在进度条上的百分比位置
       * @param {Event} event - 鼠标或触摸事件
       * @returns {number} 百分比（0-1）
       */
      function getPointerPercentage(event) {
        if (!progressContainer) {
          return 0;
        }
        const rect = progressContainer.getBoundingClientRect();
        const clientX = event.clientX ?? event.touches?.[0]?.clientX ?? rect.left;
        const offsetX = Math.max(0, Math.min(rect.width, clientX - rect.left));
        return rect.width > 0 ? offsetX / rect.width : 0;
      }

      /**
       * 跳转到指定时间位置
       * @param {number} targetTime - 目标时间（秒）
       * @param {Object} options - 选项对象
       * @param {boolean} options.autoplay - 是否自动播放
       * @param {boolean} options.triggeredByUser - 是否由用户触发
       * @param {boolean} options.clampToDuration - 是否限制在音频时长内
       * @param {boolean} options.updateTimeline - 是否更新时间轴高亮
       */
      async function seekTo(targetTime, options = {}) {
        if (!mediaPlayer) {
          return;
        }

        const { autoplay = false, triggeredByUser = false, clampToDuration = true, updateTimeline = true } = options;

        // 使用 MediaPlayer 的 seekTo 方法
        await mediaPlayer.seekTo(targetTime, {
          autoplay,
          clampToDuration,
        });

        // 更新 UI
        updatePlayerUI();
        if (updateTimeline) {
          updateTimelineProgress(mediaPlayer.currentTime);
        }

        // Switch to the topic at the target time when user manually seeks
        if (triggeredByUser) {
          switchToTopicAtTime(mediaPlayer.currentTime);

          userScrolling = true;
          if (scrollTimeout) {
            clearTimeout(scrollTimeout);
          }
          scrollTimeout = setTimeout(() => {
            userScrolling = false;
          }, 3000);
        }
      }

      /**
       * 全局函数：供 HTML 中的时间链接调用
       * 跳转到指定时间位置并自动播放
       * @param {number} time - 目标时间（秒）
       */
      window.seekToTime = function (time) {
        seekTo(time, {
          autoplay: true,
          triggeredByUser: true,
          updateTimeline: true,
        });
      };

      // ==================== 布局高度动态调整 ====================
      /**
       * 动态调整主内容区域的高度以适应视口
       * 解决 CSS 高度约束失效导致内部无法滚动的问题
       */
      function adjustMainContentHeight() {
        const container = document.querySelector(".container");
        const mainContent = document.querySelector(".main-content");
        if (!container || !mainContent) return;

        const mainContentTop = mainContent.getBoundingClientRect().top;
        const containerStyles = getComputedStyle(container);
        const containerPaddingBottom = parseFloat(containerStyles.paddingBottom);

        // Calculate available height: viewport height - element's top offset - container's bottom padding
        const availableHeight = window.innerHeight - mainContentTop - containerPaddingBottom;
        mainContent.style.height = `${availableHeight}px`;
      }

      /**
       * 动态调整内容面板的高度以适应时间轴区域
       * 确保 iframe 和 mindmap 等内容能够正确填充
       */
      function adjustContentPanelHeight() {
        const timelineSection = document.querySelector(".timeline-section");
        if (!timelineSection) return;

        const timelineSectionRect = timelineSection.getBoundingClientRect();
        const timelineTabs = document.querySelector(".timeline-tabs");

        if (!timelineTabs) return;

        const tabsHeight = timelineTabs.offsetHeight;
        const availableHeight = timelineSectionRect.height - tabsHeight;

        // Apply height to all content panels
        document.querySelectorAll(".content-panel").forEach((panel) => {
          panel.style.height = `${availableHeight}px`;
        });

        // Also apply to transcript panel
        const transcriptPanel = document.getElementById("transcript-panel");
        if (transcriptPanel) {
          transcriptPanel.style.height = `${availableHeight}px`;
        }
      }

      // 将函数暴露到全局，供 video 场景的布局切换逻辑复用
      window.adjustMainContentHeight = adjustMainContentHeight;
      window.adjustContentPanelHeight = adjustContentPanelHeight;

      // 页面加载和窗口大小调整时执行
      window.addEventListener("DOMContentLoaded", () => {
        requestAnimationFrame(() => {
          adjustMainContentHeight();
          adjustContentPanelHeight();
        });
      });

      window.addEventListener("resize", () => {
        adjustMainContentHeight();
        adjustContentPanelHeight();
      });

      // ==================== 回到顶部按钮 ====================
      /**
       * 为滚动容器创建回顶按钮
       * 注意：wrapper必须在文档流首位，sticky才能让按钮跟随可视区域顶部
       * 副作用：会影响真实首元素的:first-child选择器（已在CSS中特殊处理）
       */
      function createBackToTopButton(scrollContainer) {
        if (!scrollContainer || scrollContainer.querySelector(".back-to-top-wrapper")) {
          return;
        }

        // 创建sticky包装器和按钮
        const wrapper = document.createElement("div");
        wrapper.className = "back-to-top-wrapper";

        const btn = document.createElement("button");
        btn.className = "back-to-top";
        btn.title = "回到顶部";
        btn.innerHTML = '<span class="material-icons">expand_less</span><span>回到顶部</span>';

        wrapper.appendChild(btn);
        scrollContainer.insertBefore(wrapper, scrollContainer.firstChild);

        // 滚动300px后显示
        const handleScroll = () => {
          if (scrollContainer.scrollTop > 300) {
            btn.classList.add("show");
          } else {
            btn.classList.remove("show");
          }
        };

        scrollContainer.addEventListener("scroll", handleScroll);

        // 点击：120ms ease-out cubic回顶
        btn.addEventListener("click", () => {
          const duration = 120;
          const startScroll = scrollContainer.scrollTop;
          const scrollDelta = -startScroll;
          const startTime = performance.now();

          const animateScroll = (currentTime) => {
            const elapsed = currentTime - startTime;
            const progress = Math.min(elapsed / duration, 1);
            const easeProgress = 1 - Math.pow(1 - progress, 3);

            scrollContainer.scrollTop = startScroll + scrollDelta * easeProgress;

            if (progress < 1) {
              requestAnimationFrame(animateScroll);
            }
          };

          requestAnimationFrame(animateScroll);
        });
      }

      /**
       * 为所有滚动容器初始化回顶按钮
       */
      function initializeBackToTop() {
        const timelineContent = document.getElementById("timeline-content");
        if (timelineContent) createBackToTopButton(timelineContent);

        const topicsContent = document.getElementById("topics-content");
        if (topicsContent) createBackToTopButton(topicsContent);

        document.querySelectorAll(".content-panel-content").forEach((panel) => {
          createBackToTopButton(panel);
        });
      }

      // 暴露给动态渲染面板使用
      window.bindBackToTopScroll = (element) => {
        if (element) createBackToTopButton(element);
      };

      // DOM就绪后初始化
      if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", () => {
          initializeBackToTop();
          initializeTopicsToggle();
        });
      } else {
        initializeBackToTop();
        initializeTopicsToggle();
      }

      function initializeTopicsToggle() {
        const topicsHeader = document.getElementById('topics-header');
        const topicsSection = document.querySelector('.topics-section');
        if (topicsHeader && topicsSection) {
          setTopicsSectionCollapsed(getInitialTopicsCollapsedState(), { persist: false });

          topicsHeader.addEventListener('click', () => {
            const nextCollapsed = !topicsSection.classList.contains('collapsed');
            if (nextCollapsed) {
              saveTopicsExpandedWidth(topicsSection.offsetWidth);
            }
            setTopicsSectionCollapsed(nextCollapsed);

            setTimeout(() => {
              if (typeof adjustMainContentHeight === 'function') adjustMainContentHeight();
              if (typeof adjustContentPanelHeight === 'function') adjustContentPanelHeight();
            }, 0);
          });
        }
      }
    </script>

    <!-- Load project configuration after all functions are defined -->
    <script src="magic.project.js"></script>
  </body>
