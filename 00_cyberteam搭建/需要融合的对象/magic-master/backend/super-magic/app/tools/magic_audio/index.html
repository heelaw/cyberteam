      /**
       * Fetch with retry mechanism
       * @param {string} url - URL to fetch
       * @param {number} maxRetries - Maximum number of retries
       * @param {number} retryDelay - Delay between retries in ms
       * @returns {Promise<Response>}
       */
      async function fetchWithRetry(url, maxRetries = 3, retryDelay = 1000) {
        let lastError;
        const filename = decodeURIComponent(url.split("/").pop());

        for (let i = 0; i < maxRetries; i++) {
          try {
            const response = await fetch(url);

            if (!response.ok) {
              throw new Error(`HTTP ${response.status}: ${response.statusText}`);
            }

            return response;
          } catch (error) {
            lastError = error;

            if (i < maxRetries - 1) {
              // Exponential backoff: 1s, 2s, 4s
              const delay = retryDelay * Math.pow(2, i);
              await new Promise((resolve) => setTimeout(resolve, delay));
            } else {
              console.warn(`Failed to load ${filename} after ${maxRetries} attempts:`, error.message);
            }
          }
        }
        throw lastError;
      }

      /**
       * 异步加载分析内容（不阻塞主界面）
       *
       * 流程：先占位 → 并行加载 → 自动更新
       * 优点：tab 顺序固定 + 加载完就能用 + 单个失败不阻塞
       */
      async function loadAnalysisContent(config) {
        // 筛选需要加载的面板（元数据中配置的）
        const panelsToLoad = ANALYSIS_PANELS_CONFIG.filter((p) => p.type !== "external" && config.files[p.fileKey]);

        if (panelsToLoad.length === 0) {
          return;
        }

        showGlobalLoading();

        // ===== 阶段1: 先创建所有 tab（占位，保持顺序） =====
        panelsToLoad.forEach((panelConfig) => {
          createAnalysisPanelTab(panelConfig);
        });

        // 尝试恢复上次激活的 tab
        tryRestoreLastActiveTab();
        setTimeout(() => tryRestoreLastActiveTab(), 100);

        // ===== 阶段2: 并行加载内容（不等待，谁快谁先好） =====
        let loadedCount = 0;
        const totalCount = panelsToLoad.length;

        const loadPromises = panelsToLoad.map(async (panelConfig) => {
          const fileKey = panelConfig.fileKey;
          const filePath = config.files[fileKey];

          try {
            // 加载内容
            const response = await fetchWithRetry(filePath);
            const content = await response.text();

            // 存储内容（string = 成功）
            analysisContent[panelConfig.id] = content;

            // 兼容旧变量名
            if (panelConfig.id === "minutes") {
              summaryMarkdown = content;
              summaryFilePath = filePath;
            }
          } catch (e) {
            console.warn(`${panelConfig.title} loading failed:`, e);
            // 存储失败标记（null = 失败）
            analysisContent[panelConfig.id] = null;
          }

          loadedCount++;

          // 如果用户正在查看这个面板，自动刷新显示内容
          const panel = document.getElementById(`${panelConfig.id}-panel`);
          if (panel && panel.classList.contains("active")) {
            const contentElement = document.getElementById(`${panelConfig.id}-content`);
            if (contentElement) {
              contentElement.dataset.rendered = "false"; // 清除渲染标记
              renderAnalysisPanel(panelConfig.id); // 重新渲染
            }
          }

          // 全部加载完成，隐藏 loading
          if (loadedCount === totalCount) {
            hideGlobalLoading();
          }
        });

        // 不阻塞主流程，让 Promise 在后台运行
        Promise.allSettled(loadPromises).catch((err) => {
          console.error("Error in loadAnalysisContent:", err);
          hideGlobalLoading();
        });
      }

      /**
       * 确保所有实际出现的说话人都有映射（兜底逻辑）
       * 从 meetingData 中提取所有 Speaker-N，补充缺失的映射
       */
      function ensureCompleteSpeakerMapping() {
        if (!meetingData || meetingData.length === 0) return;

        // Extract all speakers from transcript
        const actualSpeakers = [...new Set(meetingData.map((item) => item.speaker))];

        // Ensure all actual speakers have mapping
        actualSpeakers.forEach((speakerId) => {
          if (!speakerMapping[speakerId]) {
            // Auto-fill with default name (same as speakerId for now)
            // Frontend will use this as fallback
            speakerMapping[speakerId] = speakerId;

        });

       */
      function initializeProject(config) {
        // Initialize MediaPlayer
        if (!mediaPlayer && mediaElement) {
          mediaPlayer = createMediaPlayer("media-player", config, {
            onMetadataLoaded: () => {
              updateMeetingInfo();
              renderTopicMarkers();
              renderBookmarkMarkers();
              updatePlayerUI();
              ensureSpeakerColors();
              renderSpeakerTags();
              renderTimeline();
              updateSpeedButtons(currentSpeed);

              // 恢复上次播放位置
              if (initialPlaybackPosition !== null) {
                seekTo(initialPlaybackPosition, {
                  autoplay: false,
                  triggeredByUser: false,
                  updateTimeline: true,
                });
                initialPlaybackPosition = null;
              }

              // 视频/音频加载后重新调整布局高度，解决 video 场景下视频元素加载导致 player-section 高度变化的问题
              requestAnimationFrame(() => {
                adjustMainContentHeight();
                adjustContentPanelHeight();
              });

              // 标记初始化完成
              isInitialized = true;
            },
            onTimeUpdate: (currentTime) => {
              updatePlayerUI();
            },
            onPlayStateChange: (isPlaying) => {
              const icon = playButton.querySelector(".material-icons");
              if (icon) {
                icon.textContent = isPlaying ? "pause" : "play_arrow";
              }

              // 暂停时保存状态
              if (!isPlaying) {
                saveToStorage();
              }
            },
            onMetadataLoadTimeout: () => {
              // 音频加载超时，但仍然初始化 UI
              isInitialized = true;
              updateMeetingInfo();
              ensureSpeakerColors();
              renderSpeakerTags();
              renderTimeline();
              updateSpeedButtons(currentSpeed);
            },
          });
        }

        // Initialize speaker mapping from metadata (only defined speakers)
        if (metadata.speakers) {
          // Clear existing mapping and only keep speakers defined in metadata
          const newMapping = {};
          Object.keys(metadata.speakers).forEach((speakerId) => {
            newMapping[speakerId] = metadata.speakers[speakerId];
          });
          speakerMapping = newMapping;
        }

        // Ensure all actual speakers from transcript have mapping (fallback)
        ensureCompleteSpeakerMapping();

        // Update meeting title and page title
        if (metadata.title) {
          if (meetingTitle) {

          document.title = metadata.title;

        // Initialize UI
        initializeUI();
        updatePlayerUI();
      }

      /**
       * 初始化 UI 界面（核心部分）
       * 在核心数据加载完成后调用，渲染播放器和时间轴
       */
      function initializeUI() {
        // Remove player skeleton and show player UI
        removeSkeleton("player");
        const customPlayer = document.querySelector(".custom-player");
        if (customPlayer) {
          customPlayer.style.display = "";
        }

        // Remove timeline skeleton and show timeline UI
        removeSkeleton("timeline");
        const analysisTabs = document.getElementById("analysis-tabs");
        if (analysisTabs) {
          analysisTabs.style.display = "flex"; // Show tabs with flex layout
        }
        const transcriptPanel = document.getElementById("transcript-panel");
        if (transcriptPanel) {
          transcriptPanel.style.display = "grid"; // Show panel with grid layout
        }

        // Load saved data (including currentTopic) and get last active tab
        savedLastActiveTab = loadFromStorage();

        // After loading from storage, ensure metadata.speakers values are applied
        if (metadata && metadata.speakers) {
          Object.keys(metadata.speakers).forEach((speakerId) => {
            speakerMapping[speakerId] = metadata.speakers[speakerId];
          });
        }

        ensureSpeakerColors();
        renderSpeakerTags();
        renderTimeline();
        updateMeetingInfo();

        // Initialize tab switching for transcript tab (analysis tabs will be added dynamically)
        initializeTabSwitching();

        // CRITICAL FIX: Force layout adjustment after initial render
        //
        // Problem: When renderTimeline() is called, the parent containers may not have
        // their final heights calculated yet, resulting in timelineContent having 0 height.
        // Even though 478 timeline-item elements are rendered, they are invisible because
        // their container has no height.
        //
        // Solution: Use double requestAnimationFrame + polling mechanism to ensure layout succeeds.
        // - Double RAF waits for browser to complete layout calculations
        // - Polling checks every 100ms until height > 0 or max attempts reached
        // - This handles edge cases where layout takes longer than expected
        //
        // Without this fix: timeline-content height = 0px (invisible)
        // With this fix: timeline-content gets proper height from parent containers
        requestAnimationFrame(() => {
          requestAnimationFrame(() => {
            adjustMainContentHeight();
            adjustContentPanelHeight();

            // Polling mechanism: Keep checking until layout succeeds
            let retryCount = 0;
            const maxRetries = 20; // 20 attempts × 100ms = 2 seconds max
            const checkInterval = 100; // Check every 100ms

            const layoutCheckTimer = setInterval(() => {
              const tc = document.getElementById("timeline-content");
              retryCount++;

              // Success condition: timeline-content has non-zero height
              if (tc && tc.clientHeight > 0) {
                clearInterval(layoutCheckTimer);
                return; // Layout adjustment succeeded
              }

              // Keep retrying until max attempts
              if (retryCount < maxRetries) {
                adjustMainContentHeight();
                adjustContentPanelHeight();
              } else {
                // Safety limit reached - stop trying and log warning
                clearInterval(layoutCheckTimer);
                console.warn("Layout adjustment failed after", maxRetries, "attempts. Container may still be invisible.");
                console.warn("timeline-content height:", tc?.clientHeight, "px");
              }
            }, checkInterval);
          });
        });

        // Setup unified progress bar tooltip (shows time + topic name on hover)
        setupProgressBarTooltip();

        // Setup event delegation for time links in markdown content
        setupTimeLinksHandler();

        // Setup image lightbox for viewing full-size images
        setupImageLightbox();

        // Note: Topics will be rendered separately when data is loaded
        // Note: Analysis panels will be created dynamically as content loads
      }

      /**
       * 尝试恢复上次激活的 Tab

      function tryRestoreLastActiveTab() {

      // ==================== 媒体播放器初始化 ====================
      const mediaElement = document.getElementById("media-player");
      let mediaPlayer = null; // 将在 initializeProject 中初始化

      const playButton = document.getElementById("play-button");
      const timeDisplay = document.getElementById("time-display");

      const topicsContent = document.getElementById("topics-content");
      const timelineContent = document.getElementById("timeline-content");
      const searchInput = document.getElementById("search-input");
      const searchCount = document.getElementById("search-count");
      const searchPrev = document.getElementById("search-prev");
      const searchNext = document.getElementById("search-next");
      const locateCurrentBtn = document.getElementById("locate-current-btn");
      const exportBtn = document.getElementById("export-btn");
      const meetingTitle = document.getElementById("meeting-title");
      const meetingDate = document.getElementById("meeting-date");
      const meetingDuration = document.getElementById("meeting-duration");
      const meetingParticipants = document.getElementById("meeting-participants");

      let currentTopic = null;
      let userScrolling = false;
      let scrollTimeout = null;
      let isDragging = false;
      let isInitialized = false;
      let bookmarks = new Set();
      let notes = {};
      let currentSpeed = 1;
      let searchResults = [];
      let currentSearchIndex = -1;
      let filteredSpeaker = null;
      let wasPlayingBeforeDrag = false;
      let lastDragTime = null;
      let suppressNextClick = false;
      let dragMoved = false;
      let isResizing = false;
      let startX = 0;
      let startWidth = 0;
      let resizeStartExpandedWidth = 0;
      let savedLastActiveTab = null; // Store last active tab for restoration
      const TOPICS_SECTION_WIDTH_KEY = "topicsSectionWidth";
      const TOPICS_SECTION_EXPANDED_WIDTH_KEY = "topicsExpandedWidth";
      const TOPICS_SECTION_COLLAPSED_KEY = "topicsCollapsed";
      const TOPICS_SECTION_MIN_WIDTH = 200;
      const TOPICS_SECTION_MAX_WIDTH = 800;
      const TOPICS_SECTION_COLLAPSE_THRESHOLD = 150;

      // 说话人映射
      let speakerMapping = {
        "Speaker-1": "Speaker-1",
        "Speaker-2": "Speaker-2",
        "Speaker-3": "Speaker-3",
        "Speaker-4": "Speaker-4",
        "Speaker-5": "Speaker-5",
      };

      // 说话人编辑状态
      let isEditingMode = false; // 是否处于编辑模式
      let originalSpeakerMapping = {}; // 保存原始映射用于取消

      // ==================== 说话人编辑自定义事件 API ====================
      /**
       * 自定义事件名称
       */
      const SPEAKER_EDITED_EVENT = "speakerEdited";

      /**
       * 触发说话人编辑完成自定义事件
       */
      function triggerSpeakerEditedEvent() {
        // 只返回实际存在的说话人（在 metadata.speakers 中定义或实际出现在数据中的）
        const validSpeakers = new Set();
        if (metadata && metadata.speakers) {
          Object.keys(metadata.speakers).forEach((speakerId) => {
            validSpeakers.add(speakerId);
          });
        }
        if (meetingData && meetingData.length > 0) {
          meetingData.forEach((item) => {
            if (item.speaker) {
              validSpeakers.add(item.speaker);
            }
          });
        }

        // 只包含有效的说话人
        const eventData = {};
        validSpeakers.forEach((speakerId) => {
          if (speakerMapping[speakerId]) {
            eventData[speakerId] = speakerMapping[speakerId];
          }
        });

        // 创建自定义事件
        const event = new CustomEvent(SPEAKER_EDITED_EVENT, {
          detail: eventData,
          bubbles: true,
          cancelable: false,
        });

        console.log("Dispatching speaker edited event:", eventData);

        // 在 window 对象上触发事件
        window.dispatchEvent(event);
      }

      /**
       * 添加说话人编辑事件监听器（便捷方法）
       * @param {Function} callback - 回调函数，参数为 event.detail
       * @returns {Function} 取消注册的函数
       */
      window.addSpeakerEditListener = function (callback) {
        if (typeof callback !== "function") {
          console.error("addSpeakerEditListener: callback must be a function");
          return () => {};
        }

        // 包装回调函数以提取 detail
        const wrappedCallback = (event) => {
          try {
            callback(event.detail);
          } catch (error) {
            console.error("Error in speaker edit listener:", error);
          }
        };

        // 添加事件监听器
        window.addEventListener(SPEAKER_EDITED_EVENT, wrappedCallback);

        // 返回取消注册的函数
        return function unregister() {
          window.removeEventListener(SPEAKER_EDITED_EVENT, wrappedCallback);
        };
      };

      // ==================== 数据持久化 ====================
      /**
       * 从 localStorage 加载保存的数据
       * 包括说话人映射、书签、笔记、标题、上次播放位置、上次所在的 Tab 和上次选择的主题
       */
      function loadFromStorage() {
        const saved = localStorage.getItem("meetingData");
        if (saved) {
          const data = JSON.parse(saved);
          speakerMapping = data.speakerMapping || speakerMapping;
          bookmarks = new Set(data.bookmarks || []);
          notes = data.notes || {};
          if (data.title) {
            meetingTitle.value = data.title;
          }
          if (typeof data.lastPosition === "number" && !Number.isNaN(data.lastPosition)) {
            initialPlaybackPosition = data.lastPosition;
          }
          // Restore last selected topic
          if (data.currentTopic) {
            currentTopic = data.currentTopic;
          }
          // Restore last active tab
          if (data.lastActiveTab) {
            return data.lastActiveTab;
          }
        }
        return "transcript"; // Default to transcript tab
      }

      /**
       * 保存数据到 localStorage
       * 包括说话人映射、书签、笔记、标题、当前播放位置、当前激活的 Tab 和当前选择的主题
       */
      function saveToStorage() {
        // Find currently active tab
        const activeTab = document.querySelector(".timeline-tab.active");
        const lastActiveTab = activeTab ? activeTab.dataset.tab : "transcript";

        const data = {
          speakerMapping,
          bookmarks: Array.from(bookmarks),
          notes,
          title: meetingTitle.value,
          lastPosition: mediaPlayer ? mediaPlayer.currentTime : 0,
          lastActiveTab,
          currentTopic,
        };
        localStorage.setItem("meetingData", JSON.stringify(data));
      }

      function parseTopicsSectionWidth(rawWidth) {
        const width = parseInt(rawWidth ?? "", 10);
        if (Number.isNaN(width)) {
          return null;
        }
        if (width < TOPICS_SECTION_MIN_WIDTH || width > TOPICS_SECTION_MAX_WIDTH) {
          return null;
        }
        return width;
      }

      function getSavedTopicsExpandedWidth() {
        return (
          parseTopicsSectionWidth(localStorage.getItem(TOPICS_SECTION_EXPANDED_WIDTH_KEY)) ??
          parseTopicsSectionWidth(localStorage.getItem(TOPICS_SECTION_WIDTH_KEY)) ??
          TOPICS_SECTION_MIN_WIDTH
        );
      }

      function saveTopicsExpandedWidth(width) {
        const constrainedWidth = Math.max(
          TOPICS_SECTION_MIN_WIDTH,
          Math.min(TOPICS_SECTION_MAX_WIDTH, Math.round(width)),
        );
        const value = constrainedWidth.toString();
        localStorage.setItem(TOPICS_SECTION_EXPANDED_WIDTH_KEY, value);
        localStorage.setItem(TOPICS_SECTION_WIDTH_KEY, value);
        return constrainedWidth;
      }

      function hasSavedTopicsCollapsedState() {
        return localStorage.getItem(TOPICS_SECTION_COLLAPSED_KEY) !== null;
      }

      function getSavedTopicsCollapsed() {
        return localStorage.getItem(TOPICS_SECTION_COLLAPSED_KEY) === "true";
      }

      function saveTopicsCollapsed(collapsed) {
        localStorage.setItem(TOPICS_SECTION_COLLAPSED_KEY, collapsed ? "true" : "false");
      }

      function setTopicsSectionCollapsed(collapsed, options = {}) {
        const { persist = true, restoreWidth = true } = options;
        const topicsSection = document.querySelector(".topics-section");
        const mainContent = document.querySelector(".main-content");

        if (!topicsSection) {
          return;
        }

        topicsSection.classList.toggle("collapsed", collapsed);
        if (mainContent) {
          mainContent.classList.toggle("topics-collapsed", collapsed);
          if (!collapsed && restoreWidth) {
            const expandedWidth = getSavedTopicsExpandedWidth();
            mainContent.style.gridTemplateColumns = `${expandedWidth}px 6px 1fr`;
          }
        }

        if (persist) {
          saveTopicsCollapsed(collapsed);
        }
      }

      function getInitialTopicsCollapsedState() {
        if (hasSavedTopicsCollapsedState()) {
          return getSavedTopicsCollapsed();
        }
        return window.innerWidth <= 768;
      }

      // ==================== 时间处理 ====================
      /**
       * 将秒数格式化为时间字符串（MM:SS）
       * @param {number} seconds - 总秒数
       * @returns {string} 格式化的时间字符串，如 "02:30"
       */
      function formatTime(seconds) {
        const mins = Math.floor(seconds / 60);
        const secs = Math.floor(seconds % 60);
        return `${String(mins).padStart(2, "0")}:${String(secs).padStart(2, "0")}`;
      }

      /**
       * 安全地获取音频时长
       * 使用 MediaPlayer 的 duration 属性（已内置优先级逻辑）
       * @returns {number} 媒体时长（秒），如果无法获取则返回 0
       */
      function getMediaDuration() {
        return mediaPlayer ? mediaPlayer.duration : 0;
      }

      // ==================== 说话人管理 ====================
      /**
       * 获取映射后的说话人名字
       * 如果存在映射则返回映射后的名字，否则返回原始 ID
       * @param {string} speaker - 说话人 ID
       * @returns {string} 说话人名字
       */
      function getSpeakerName(speaker) {
        return speakerMapping[speaker] || speaker;
      }

      /**
       * 更新录音元信息显示
       * 包括日期、时长和参与人数
       */
      function updateMeetingInfo() {
        if (metadata.date) {
          const dateStr = metadata.date.split(" ")[0].replace(/-/g, "/");
          meetingDate.textContent = `日期: ${dateStr}`;
        }
        meetingDuration.textContent = `时长: ${formatTime(getMediaDuration())}`;
        const speakers = [...new Set(meetingData.map((item) => item.speaker))];
        meetingParticipants.textContent = `参与人: ${speakers.length}人`;
      }

      /**
       * 计算说话人统计信息
       * @param {string} speakerId - 说话人 ID
       * @returns {{count: number, duration: number}} 统计信息对象
       */
      function getSpeakerStats(speakerId) {
        const items = meetingData.filter((item) => item.speaker === speakerId);
        return { count: items.length, duration: 0 };
      }

      /**
       * 渲染说话人标签列表
       * 只渲染在 metadata.speakers 中定义或实际出现在数据中的说话人
       */
      function renderSpeakerTags() {
        if (!speakerTags) {
          console.error("renderSpeakerTags: speakerTags element not found");
          return;
        }

        speakerTags.innerHTML = "";

        // Only render speakers that are defined in metadata.speakers or appear in meetingData
        const validSpeakers = new Set();
        if (metadata && metadata.speakers) {
          Object.keys(metadata.speakers).forEach((speakerId) => {
            validSpeakers.add(speakerId);
          });
        }
        // Also include speakers that actually appear in the data
        if (meetingData && meetingData.length > 0) {
          meetingData.forEach((item) => {
            if (item.speaker) {
              validSpeakers.add(item.speaker);
            }
          });
        }

        // Filter speakerMapping to only include valid speakers
        const speakersToRender = Object.keys(speakerMapping).filter((speakerId) => validSpeakers.has(speakerId));

        speakersToRender.forEach((speakerId) => {
          const stats = getSpeakerStats(speakerId);
          const tag = document.createElement("div");
          tag.className = `speaker-tag ${filteredSpeaker === speakerId ? "filtered" : ""}`;

          const swatch = speakerColors[speakerId];
          if (swatch) {
            tag.style.setProperty("--speaker-chip-bg", swatch.chip);
            tag.style.setProperty("--speaker-chip-border", hexToRgba(swatch.hex, 0.45));
            tag.style.setProperty("--speaker-chip-hover-bg", hexToRgba(swatch.hex, 0.28));
            tag.style.setProperty("--speaker-chip-hover-border", hexToRgba(swatch.hex, 0.55));
            tag.style.setProperty("--speaker-chip-active-bg", hexToRgba(swatch.hex, 0.35));
            tag.style.setProperty("--speaker-chip-active-border", swatch.hex);
            tag.style.color = "#333";
          } else {
            tag.style.removeProperty("--speaker-chip-bg");
            tag.style.removeProperty("--speaker-chip-border");
            tag.style.removeProperty("--speaker-chip-hover-bg");
            tag.style.removeProperty("--speaker-chip-hover-border");
            tag.style.removeProperty("--speaker-chip-active-bg");
            tag.style.removeProperty("--speaker-chip-active-border");
            tag.style.color = "#666";
          }

          // 颜色色块
          const colorDot = document.createElement("span");
          colorDot.className = "speaker-color-dot";
          colorDot.style.backgroundColor = swatch ? swatch.hex : "#ccc";

          const idSpan = document.createElement("span");
          idSpan.className = "speaker-tag-id";
          idSpan.textContent = speakerId;

          const arrow = document.createElement("span");
          arrow.className = "speaker-tag-arrow";
          arrow.textContent = "→";

          // 统计信息
          const statsSpan = document.createElement("span");
          statsSpan.className = "speaker-stats";
          statsSpan.textContent = `(${stats.count})`;

          tag.appendChild(colorDot);
          tag.appendChild(idSpan);
          tag.appendChild(arrow);

          if (isEditingMode) {
            // 编辑模式：显示输入框
            const nameInput = document.createElement("input");
            nameInput.className = "speaker-tag-name editable";
            nameInput.type = "text";
            nameInput.value = speakerMapping[speakerId];
            nameInput.size = Math.max(6, Math.min(12, nameInput.value.length || speakerId.length));
            nameInput.placeholder = "输入名字";
            if (swatch) {
              nameInput.style.backgroundColor = "rgba(255, 255, 255, 0.92)";
              nameInput.style.borderColor = hexToRgba(swatch.hex, 0.45);
            }

            // 实时更新映射
            nameInput.addEventListener("input", () => {
              speakerMapping[speakerId] = nameInput.value.trim() || speakerId;
            });

            ["mousedown", "click", "focus"].forEach((eventName) => {
              nameInput.addEventListener(eventName, (event) => {
                event.stopPropagation();
              });
            });

            tag.appendChild(nameInput);
          } else {
            // 非编辑模式：显示只读名字
            const nameSpan = document.createElement("span");
            nameSpan.className = "speaker-tag-name readonly";
            nameSpan.textContent = speakerMapping[speakerId];
            tag.appendChild(nameSpan);
          }

          tag.appendChild(statsSpan);

          // 点击标签任意非输入区域都可筛选，编辑模式下也保留该能力
          tag.addEventListener("click", () => {
            filteredSpeaker = filteredSpeaker === speakerId ? null : speakerId;
            renderSpeakerTags();
            renderTimeline();

            // If search is active, re-run search to update results based on new filter
            if (searchInput.value.trim()) {
              performSearch();
            }

          speakerTags.appendChild(tag);

        // 在列表后面添加统一的编辑控制按钮
        const editControlsDiv = document.createElement("div");
        editControlsDiv.className = "speaker-edit-controls";

        if (isEditingMode) {
          // 编辑模式：显示保存和取消按钮
          const saveBtn = document.createElement("button");
          saveBtn.className = "speaker-action-btn primary";
          saveBtn.innerHTML = '<span class="material-icons">check</span> 保存';

          const cancelBtn = document.createElement("button");
          cancelBtn.className = "speaker-action-btn";
          cancelBtn.innerHTML = '<span class="material-icons">close</span> 取消';

          saveBtn.addEventListener("click", () => {
            // 检查所有输入框，如果名字为空则使用原始名称
            const nameInputs = document.querySelectorAll(".speaker-tag-name.editable");
            nameInputs.forEach((input) => {
              const speakerId = input.closest(".speaker-tag")?.querySelector(".speaker-tag-id")?.textContent;
              if (speakerId && input.value.trim() === "") {
                // 如果名字为空，使用原始名称
                speakerMapping[speakerId] = originalSpeakerMapping[speakerId] || speakerId;
              }
            });

            // 保存：触发事件并退出编辑模式
            triggerSpeakerEditedEvent();

            // 更新原始映射为当前保存后的映射
            originalSpeakerMapping = { ...speakerMapping };

            isEditingMode = false;
            renderTimeline();
            renderTopicContent(); // 重新渲染主题内容以应用新的说话人名字
            saveToStorage();
            reRenderAllAnalysisPanels();
            renderSpeakerTags();
          });

          cancelBtn.addEventListener("click", () => {
            // 取消：恢复原始映射并退出编辑模式
            speakerMapping = { ...originalSpeakerMapping };
            isEditingMode = false;
            renderSpeakerTags();
          });

          editControlsDiv.appendChild(saveBtn);
          editControlsDiv.appendChild(cancelBtn);
        } else {
          // 非编辑模式：显示编辑按钮
          const editBtn = document.createElement("button");
          editBtn.className = "speaker-action-btn primary";
          editBtn.innerHTML = '<span class="material-icons">edit</span> 编辑';

          editBtn.addEventListener("click", () => {
            // 进入编辑模式：保存当前映射
            originalSpeakerMapping = { ...speakerMapping };
            isEditingMode = true;
            renderSpeakerTags();
          });

          editControlsDiv.appendChild(editBtn);
        }

        speakerTags.appendChild(editControlsDiv);
      }

      // ==================== 书签管理 ====================
      /**
       * 在进度条上渲染书签标记
       * 根据书签的时间位置在进度条上显示星形图标
       */
      function renderBookmarkMarkers() {
        const duration = getMediaDuration();
        if (!duration || duration <= 0) {
          bookmarkMarkers.innerHTML = "";
          return;
        }
        bookmarkMarkers.innerHTML = "";
        const starSVG = `<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <linearGradient id="star-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:#ffd700;stop-opacity:1" />
                        <stop offset="50%" style="stop-color:#ffed4e;stop-opacity:1" />
                        <stop offset="100%" style="stop-color:#ffd700;stop-opacity:1" />
                    </linearGradient>
                </defs>
                <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"
                      fill="url(#star-gradient)"
                      stroke="#ff8c00"
                      stroke-width="0.8"
                      stroke-linejoin="round"/>
            </svg>`;

        bookmarks.forEach((index) => {
          const item = meetingData[index];
          if (item) {
            const marker = document.createElement("div");
            marker.className = "bookmark-marker";
            marker.style.left = `${(item.time / duration) * 100}%`;
            marker.title = `书签: ${item.text.substring(0, 20)}...`;
            marker.innerHTML = starSVG;
            marker.onclick = (e) => {
              e.stopPropagation();
              seekTo(item.time, { autoplay: true, triggeredByUser: true });
            };
            bookmarkMarkers.appendChild(marker);
          }
        });
      }

      /**
       * 简单的 Markdown 渲染（用于主题摘要）
       * 注意：完整的 Markdown 渲染使用 markdownToHTML 函数
       * @param {string} text - Markdown 文本
       * @returns {string} HTML 字符串
       */
      function renderMarkdown(text) {
        return text
          .replace(/### (.*)/g, "<h4>$1</h4>")
          .replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>")
          .replace(/`(.*?)`/g, "<code>$1</code>")
          .replace(/^- (.*)/gm, "<li>$1</li>")
          .replace(/(<li>.*<\/li>\n?)+/g, "<ul>$&</ul>")
          .replace(/\n\n/g, "</p><p>")
          .replace(/^\s+/gm, "");
      }

      // ==================== 主题/章节管理 ====================
      /**
       * 计算主题时间区间
       * @param {number} durationLimitOverride - 可选的时长限制覆盖值
       * @returns {Array<{topic: Object, startTime: number, endTime: number, color: string}>} 主题区间数组
       */
      function calculateTopicIntervals(durationLimitOverride) {
        if (!topics || Object.keys(topics).length === 0) {
          return [];
        }

        const entries = Object.entries(topics)
          .map(([id, topic]) => ({ id, topic, startTime: topic.items?.[0]?.time ?? null }))
          .filter((entry) => typeof entry.startTime === "number")
          .sort((a, b) => a.startTime - b.startTime);

        if (entries.length === 0) {
          return [];
        }

        const lastTranscriptTime = meetingData.length ? meetingData[meetingData.length - 1].time : 0;
        const inferredTopicEnd = entries.reduce((maxTime, entry) => {
          const items = entry.topic.items || [];
          const lastItem = items[items.length - 1];
          return Math.max(maxTime, lastItem ? lastItem.time : 0);
        }, 0);

        const durationLimit = Number.isFinite(durationLimitOverride) && durationLimitOverride > 0 ? durationLimitOverride : Math.max(lastTranscriptTime, inferredTopicEnd);

        if (durationLimit <= 0) return []; // Guard against zero duration

        const result = entries.map((entry, index) => {
          const { topic, startTime } = entry;
          const items = topic.items || [];
          const nextEntry = entries[index + 1];

          // Use the last item's end time (timeEnd) if available, otherwise use its start time (time)
          const lastItem = items.length ? items[items.length - 1] : null;
          const lastItemTime = lastItem ? (lastItem.timeEnd !== null && lastItem.timeEnd > lastItem.time ? lastItem.timeEnd : lastItem.time) : startTime;

          let endTime = lastItemTime;

          // For topics with a next topic, always end at the next topic's start
          // This prevents overlaps and fills gaps naturally
          if (nextEntry && typeof nextEntry.startTime === "number") {
            // Always use next topic's start time as the end time
            // This ensures no overlaps in the timeline
            endTime = nextEntry.startTime;
          }
          // For the last topic, use its last item's end time (already set in lastItemTime)
          // Gap will be added by renderTopicMarkers() if needed

          const normalizedStart = Math.max(0, Number.isFinite(startTime) ? startTime : 0);
          const normalizedEnd = Math.max(normalizedStart, Number.isFinite(endTime) ? endTime : normalizedStart);
          // Ensure endTime doesn't exceed totalDuration
          const clampedEnd = Math.min(normalizedEnd, durationLimit);

          return {
            topic,
            startTime: normalizedStart,
            endTime: clampedEnd,
            color: topic.color,
          };
        });

        return result;
      }

      /**
       * Global tooltip element for displaying topic names and time
       */
      let globalTopicTooltip = null;

      /**
       * Store topic intervals for hover detection
       * Format: [{ topic, startTime, endTime, color }, ...]
       */
      let topicIntervals = [];

      /**
       * Flag to track if progress bar tooltip has been initialized
       */
      let progressBarTooltipInitialized = false;

      /**
       * 在进度条上渲染主题标记
       * 显示每个主题的时间段，并在主题之间显示空白区域
       */
      function renderTopicMarkers() {
        const totalDuration = getMediaDuration();
        const intervals = calculateTopicIntervals(totalDuration);
        if (!intervals.length || totalDuration <= 0) {
          topicMarkers.innerHTML = "";
          topicIntervals = [];
          return;
        }

        topicMarkers.innerHTML = "";

        // Store intervals for hover detection
        topicIntervals = intervals;

        // Create global tooltip if it doesn't exist
        if (!globalTopicTooltip) {
          globalTopicTooltip = document.createElement("div");
          globalTopicTooltip.className = "topic-tooltip";
          document.body.appendChild(globalTopicTooltip);
        }

        let lastEndTime = 0;

        intervals.forEach(({ topic, startTime, endTime, color }, index) => {
          // Add gap before first topic or between topics
          if (startTime > lastEndTime) {
            const gapDuration = startTime - lastEndTime;
            const gapPercent = (gapDuration / totalDuration) * 100;

            const gapMarker = document.createElement("div");
            gapMarker.className = "topic-marker";
            gapMarker.style.width = `${gapPercent}%`;
            gapMarker.style.backgroundColor = "#979797";
            // First gap (before first topic) is "开头", others are "未分类内容"
            const gapName = lastEndTime === 0 ? "开头" : "未分类内容";
            gapMarker.setAttribute("data-topic-name", gapName);

            topicMarkers.appendChild(gapMarker);
          }

          // Add topic marker
          const duration = endTime - startTime;
          if (duration > 0) {
            const marker = document.createElement("div");
            marker.className = "topic-marker";
            marker.style.backgroundColor = color;
            marker.setAttribute("data-topic-name", topic.name);
            // Calculate width as percentage of total duration
            const widthPercent = (duration / totalDuration) * 100;
            marker.style.width = `${widthPercent}%`;

            topicMarkers.appendChild(marker);
          }

          lastEndTime = endTime;
        });

        // Add gap after last topic if needed
        if (lastEndTime < totalDuration) {
          const gapDuration = totalDuration - lastEndTime;
          const gapPercent = (gapDuration / totalDuration) * 100;

          const gapMarker = document.createElement("div");
          gapMarker.className = "topic-marker";
          gapMarker.style.width = `${gapPercent}%`;
          gapMarker.style.backgroundColor = "#979797";
          // Last gap (after last topic) is "尾声"
          gapMarker.setAttribute("data-topic-name", "尾声");

          topicMarkers.appendChild(gapMarker);
        }
      }

      /**
       * Find topic name at a given time
       * @param {number} time - Time in seconds
       * @returns {string} Topic name or gap name (开头/尾声/未分类内容)
       */
      function getTopicAtTime(time) {
        if (!topicIntervals || topicIntervals.length === 0) {
          return "未分类内容";
        }

        // Check if time is within any topic interval
        for (const { topic, startTime, endTime } of topicIntervals) {
          if (time >= startTime && time < endTime) {
            return topic.name;
          }
        }

        // Not in any topic - determine which gap it's in
        const firstTopic = topicIntervals[0];
        const lastTopic = topicIntervals[topicIntervals.length - 1];

        if (time < firstTopic.startTime) {
          return "开头";
        } else if (time >= lastTopic.endTime) {
          return "尾声";
        } else {
          return "未分类内容";
        }
      }

      /**
       * Find topic ID at a given time and switch to that topic
       * @param {number} time - Time in seconds
       * @returns {string|null} Topic ID or null if not found
       */
      function getTopicIdAtTime(time) {
        if (!topics || Object.keys(topics).length === 0) {
          return null;
        }

        // Calculate intervals if not already calculated
        const totalDuration = getMediaDuration();
        const intervals = calculateTopicIntervals(totalDuration);

        if (!intervals || intervals.length === 0) {
          return null;
        }

        // Find the topic that contains this time
        for (let i = 0; i < intervals.length; i++) {
          const interval = intervals[i];
          if (time >= interval.startTime && time < interval.endTime) {
            // Find the topic ID by matching the topic object
            for (const [id, topic] of Object.entries(topics)) {
              if (topic === interval.topic) {
                return id;
              }
            }
          }
        }

        return null;
      }

      /**
       * Switch to the topic at the given time
       * @param {number} time - Time in seconds
       * @param {boolean} force - Force switch even if already on correct topic
       */
      function switchToTopicAtTime(time, force = false) {
        const topicId = getTopicIdAtTime(time);

        if (!topicId) {
          return; // No topic found for this time
        }

        // Only switch if different from current topic (unless forced)
        if (force || currentTopic !== topicId) {
          currentTopic = topicId;
          renderTopicTabs();
          renderTopicContent();
          saveToStorage();
        }
      }

      /**
       * Setup unified hover tooltip for the entire progress bar
       * Shows time and topic name on hover
       */
      function setupProgressBarTooltip() {
        // Only initialize once
        if (progressBarTooltipInitialized) {
          return;
        }

        if (!progressContainer) {
          console.error("setupProgressBarTooltip: progressContainer not found");
          return;
        }

        // Create global tooltip if it doesn't exist
        if (!globalTopicTooltip) {
          globalTopicTooltip = document.createElement("div");
          globalTopicTooltip.className = "topic-tooltip";
          document.body.appendChild(globalTopicTooltip);
        }

        // Mark as initialized before adding event listeners
        progressBarTooltipInitialized = true;

        // Show tooltip on mouse move
        progressContainer.addEventListener("mousemove", (e) => {
          const duration = getMediaDuration();
          if (!(duration > 0)) return;

          // Calculate time at mouse position
          const rect = progressContainer.getBoundingClientRect();
          const offsetX = Math.max(0, Math.min(rect.width, e.clientX - rect.left));
          const percentage = rect.width > 0 ? offsetX / rect.width : 0;
          const time = percentage * duration;

          // Get topic at this time (only if topics are loaded)
          const timeStr = formatTime(time);
          let tooltipText = timeStr;

          // Add topic name if available
          if (topicIntervals && topicIntervals.length > 0) {
            const topicName = getTopicAtTime(time);
            if (topicName) {
              tooltipText = `${timeStr} • ${topicName}`;
            }
          }

          // Update tooltip content
          globalTopicTooltip.textContent = tooltipText;
          globalTopicTooltip.style.opacity = "1";

          // Position tooltip
          const cursorY = e.clientY;
          const tooltipOffset = 10;
          const showAbove = cursorY >= 40;

          if (showAbove) {
            globalTopicTooltip.setAttribute("data-position", "top");
            globalTopicTooltip.style.left = `${e.clientX}px`;
            globalTopicTooltip.style.top = `${cursorY - tooltipOffset}px`;
            globalTopicTooltip.style.transform = "translate(-50%, -100%)";
          } else {
            globalTopicTooltip.setAttribute("data-position", "bottom");
            globalTopicTooltip.style.left = `${e.clientX}px`;
            globalTopicTooltip.style.top = `${cursorY + tooltipOffset}px`;
            globalTopicTooltip.style.transform = "translateX(-50%)";
          }
        });

        // Hide tooltip on mouse leave
        progressContainer.addEventListener("mouseleave", () => {
          globalTopicTooltip.style.opacity = "0";
        });
      }

      /**
       * Setup event delegation for time links in markdown content
       * Handles clicks on time links (e.g., [05:30] or [05:30-10:45])
       */
      function setupTimeLinksHandler() {
        // Use event delegation on document body to handle dynamically created links
        document.addEventListener("click", (e) => {
          const timeLink = e.target.closest(".time-link");
          if (!timeLink) return;

          e.preventDefault();

          const time = parseFloat(timeLink.dataset.time);
          if (Number.isFinite(time) && time >= 0) {
            seekTo(time, {
              autoplay: true,
              triggeredByUser: true,
              updateTimeline: true,
            });
          }
        });

        // Add hover styles via CSS (handled inline in convertTimeLinks)
        // But we can enhance with additional styles if needed
      }

      /**
       * Setup image lightbox for viewing full-size images
       * Supports zoom, pan, and keyboard shortcuts
       */
      function setupImageLightbox() {
        // Create lightbox element if it doesn't exist
        let lightbox = document.getElementById("image-lightbox");
        if (!lightbox) {
          lightbox = document.createElement("div");
          lightbox.id = "image-lightbox";
          lightbox.className = "image-lightbox";
          lightbox.innerHTML = `
                    <div class="image-lightbox-container">
                        <img alt="Full size image">
                    </div>
                    <div class="image-lightbox-controls">
                        <button class="image-lightbox-btn" id="lightbox-zoom-in" title="放大 (+)">
                            <span class="material-icons">zoom_in</span>
                        </button>
                        <button class="image-lightbox-btn" id="lightbox-zoom-out" title="缩小 (-)">
                            <span class="material-icons">zoom_out</span>
                        </button>
                        <button class="image-lightbox-btn" id="lightbox-reset" title="重置 (0)">
                            <span class="material-icons">fit_screen</span>
                        </button>
                        <button class="image-lightbox-btn" id="lightbox-close" title="关闭 (Esc)">
                            <span class="material-icons">close</span>
                        </button>
                    </div>
                    <div class="image-lightbox-info" id="lightbox-info">100%</div>
                `;
          document.body.appendChild(lightbox);
        }

        const lightboxContainer = lightbox.querySelector(".image-lightbox-container");
        const lightboxImg = lightbox.querySelector("img");
        const closeBtn = document.getElementById("lightbox-close");
        const zoomInBtn = document.getElementById("lightbox-zoom-in");
        const zoomOutBtn = document.getElementById("lightbox-zoom-out");
        const resetBtn = document.getElementById("lightbox-reset");
        const infoDiv = document.getElementById("lightbox-info");

        // 禁用图片的默认拖拽和选择行为
        lightboxImg.draggable = false;
        lightboxImg.addEventListener("dragstart", (e) => {
          e.preventDefault();
          return false;
        });
        lightboxImg.addEventListener("contextmenu", (e) => {
          e.preventDefault(); // 禁用右键菜单
          return false;
        });

        // ==================== 状态管理 ====================
        // 核心状态：缩放比例和平移距离
        let state = {
          scale: 1,
          translateX: 0,
          translateY: 0,
        };

        // 拖拽状态
        let dragState = {
          isDragging: false,
          startX: 0,
          startY: 0,
          startTranslateX: 0,
          startTranslateY: 0,
        };

        // ==================== 核心渲染函数 ====================
        /**
         * 更新图片的 transform
         * 统一的渲染入口，确保状态一致性
         */
        const render = () => {
          // 使用 translate + scale 的顺序，translate 在原始坐标系中
          lightboxImg.style.transform = `translate(${state.translateX}px, ${state.translateY}px) scale(${state.scale})`;

          // 更新缩放信息显示
          const percentage = Math.round(state.scale * 100);
          infoDiv.textContent = `${percentage}%`;

          // 短暂显示缩放信息
          infoDiv.classList.remove("hide");
          clearTimeout(infoDiv._hideTimer);
          infoDiv._hideTimer = setTimeout(() => {
            infoDiv.classList.add("hide");
          }, 1500);

          // 更新光标样式
          if (dragState.isDragging) {
            lightboxImg.style.cursor = "grabbing";
          } else {
            // 只要不是在拖拽中，就显示 grab 手型（暗示可拖拽）
            // 因为现在允许任意缩放比例下拖拽
            lightboxImg.style.cursor = "grab";
          }
        };

        // ==================== 缩放操作 ====================
        /**
         * 重置到初始状态
         */
        const resetZoom = () => {
          state.scale = 1;
          state.translateX = 0;
          state.translateY = 0;
          render();
        };

        /**
         * 围绕指定点缩放（核心修复算法）
         * @param {number} newScale - 新的缩放比例
         * @param {number} centerClientX - 缩放中心点 X（视口坐标）
         * @param {number} centerClientY - 缩放中心点 Y（视口坐标）
         */
        const zoomToPoint = (newScale, centerClientX, centerClientY) => {
          // 限制缩放范围
          newScale = Math.max(0.1, Math.min(10, newScale));

          if (newScale === state.scale) return;

          // 计算缩放比例的变化率
          const ratio = newScale / state.scale;

          // 获取图片当前的矩形位置（包含当前的 translate 和 scale）
          const rect = lightboxImg.getBoundingClientRect();

          // 核心公式：计算位移补偿
          // 原理：为了让鼠标下的点保持不动，需要调整 translate
          // 新 translate = 旧 translate + (鼠标位置 - 图片左上角) * (1 - 缩放变化率)
          // 只有当 transform-origin 为 0 0 时，此公式才精确成立
          state.translateX += (centerClientX - rect.left) * (1 - ratio);
          state.translateY += (centerClientY - rect.top) * (1 - ratio);

          state.scale = newScale;

          render();
        };

        /**
         * 围绕容器中心缩放（用于按钮控制）
         * @param {number} delta - 缩放方向（正数放大，负数缩小）
         */
        const zoomStep = (delta) => {
          // 使用容器中心作为缩放点
          const rect = lightboxContainer.getBoundingClientRect();
          const centerX = rect.left + rect.width / 2;
          const centerY = rect.top + rect.height / 2;

          // 缩放步进：每次 15%
          const factor = delta > 0 ? 1.15 : 1 / 1.15;
          const newScale = state.scale * factor;

          zoomToPoint(newScale, centerX, centerY);
        };

        // ==================== 拖拽操作 ====================
        /**
         * 开始拖拽
         */
        const startDrag = (clientX, clientY) => {
          // 移除 scale > 1 的限制，允许任意状态下拖拽
          dragState.isDragging = true;
          dragState.startX = clientX;
          dragState.startY = clientY;
          dragState.startTranslateX = state.translateX;
          dragState.startTranslateY = state.translateY;

          lightboxImg.style.cursor = "grabbing";
          return true;
        };

        /**
         * 拖拽中
         */
        const drag = (clientX, clientY) => {
          if (!dragState.isDragging) return;

          // 计算拖拽距离
          const dx = clientX - dragState.startX;
          const dy = clientY - dragState.startY;

          // 更新平移量
          state.translateX = dragState.startTranslateX + dx;
          state.translateY = dragState.startTranslateY + dy;

          render();
        };

        /**
         * 结束拖拽
         */
        const endDrag = () => {
          if (!dragState.isDragging) return;

          dragState.isDragging = false;
          render();
        };

        // ==================== 关闭操作 ====================
        const closeLightbox = () => {
          lightbox.classList.remove("show");
          lightboxImg.src = "";
          dragState.isDragging = false;
          resetZoom();
        };

        // ==================== 鼠标事件 ====================
        /**
         * 鼠标滚轮/触摸板缩放
         * 使用指数平滑算法，兼容鼠标滚轮和触摸板惯性滑动
         */
        lightbox.addEventListener(
          "wheel",
          (e) => {
            e.preventDefault();
            e.stopPropagation();

            // 灵敏度系数：值越小越平滑
            // 0.003 适合触摸板的像素级滚动（微调提升响应速度）
            const SENSITIVITY = 0.003;

            // 计算缩放因子
            // deltaY > 0 (向下滚动) -> 缩小 (factor < 1)
            // deltaY < 0 (向上滚动) -> 放大 (factor > 1)
            let delta = e.deltaY;

            // 针对普通鼠标滚轮（deltaMode === 1）进行标准化
            // 普通滚轮每次 delta 约为 100，触摸板为 1-10
            if (e.deltaMode === 1) {
              delta *= 40;
            }

            // 使用自然指数实现平滑缩放
            // Math.exp(-x) 使得变化是乘性的，保证缩放手感线性均匀
            const factor = Math.exp(-delta * SENSITIVITY);

            // 限制单帧最大变化率，防止快速滚动时飞出
            // 限制在 [0.8, 1.25] 之间
            const safeFactor = Math.max(0.8, Math.min(1.25, factor));

            const newScale = state.scale * safeFactor;

            zoomToPoint(newScale, e.clientX, e.clientY);
          },
          { passive: false }
        );

        /**
         * 双击切换缩放
         * 双击放大到 2 倍或重置
         */
        lightboxImg.addEventListener("dblclick", (e) => {
          e.preventDefault();
          e.stopPropagation();

          if (state.scale === 1) {
            zoomToPoint(2, e.clientX, e.clientY);
          } else {
            resetZoom();
          }
        });

        /**
         * 鼠标拖拽
         */
        lightboxImg.addEventListener("mousedown", (e) => {
          // 只响应左键
          if (e.button !== 0) return;

          e.preventDefault();
          e.stopPropagation();

          if (startDrag(e.clientX, e.clientY)) {
            // 拖拽成功开始
          }
        });

        document.addEventListener("mousemove", (e) => {
          if (!dragState.isDragging) return;
          e.preventDefault();
          drag(e.clientX, e.clientY);
        });

        document.addEventListener("mouseup", (e) => {
          if (!dragState.isDragging) return;
          e.preventDefault();
          endDrag();
        });

        // ==================== 触摸事件（移动端） ====================
        let touchState = {
          startDistance: 0,
          startScale: 1,
          pinchCenterX: 0,
          pinchCenterY: 0,
        };

        /**
         * 触摸开始
         */
        lightboxImg.addEventListener(
          "touchstart",
          (e) => {
            if (e.touches.length === 1) {
              // 单指触摸：开始拖拽（仅在放大时）
              const touch = e.touches[0];
              startDrag(touch.clientX, touch.clientY);
            } else if (e.touches.length === 2) {
              // 双指触摸：准备捏合缩放
              e.preventDefault();

              const touch1 = e.touches[0];
              const touch2 = e.touches[1];

              // 计算两指距离
              touchState.startDistance = Math.hypot(touch2.clientX - touch1.clientX, touch2.clientY - touch1.clientY);

              // 记录初始缩放比例
              touchState.startScale = state.scale;

              // 计算捏合中心点
              touchState.pinchCenterX = (touch1.clientX + touch2.clientX) / 2;
              touchState.pinchCenterY = (touch1.clientY + touch2.clientY) / 2;

              // 停止拖拽（如果正在拖拽）
              endDrag();
            }
          },
          { passive: false }
        );

        /**
         * 触摸移动
         */
        lightboxImg.addEventListener(
          "touchmove",
          (e) => {
            if (e.touches.length === 1) {
              // 单指拖拽
              const touch = e.touches[0];
              drag(touch.clientX, touch.clientY);
            } else if (e.touches.length === 2) {
              // 双指捏合缩放
              e.preventDefault();

              const touch1 = e.touches[0];
              const touch2 = e.touches[1];

              // 计算当前两指距离
              const currentDistance = Math.hypot(touch2.clientX - touch1.clientX, touch2.clientY - touch1.clientY);

              // 计算新的缩放比例
              const scale = touchState.startScale * (currentDistance / touchState.startDistance);

              // 围绕捏合中心点缩放
              zoomToPoint(scale, touchState.pinchCenterX, touchState.pinchCenterY);
            }
          },
          { passive: false }
        );

        /**
         * 触摸结束
         */
        lightboxImg.addEventListener("touchend", (e) => {
          if (e.touches.length === 0) {
            // 所有手指离开，结束拖拽
            endDrag();
          } else if (e.touches.length === 1) {
            // 从双指变为单指，重新开始拖拽
            const touch = e.touches[0];
            startDrag(touch.clientX, touch.clientY);
          }
        });

        // ==================== UI 交互 ====================
        /**
         * 点击背景关闭
         */
        lightboxContainer.addEventListener("click", (e) => {
          if (e.target === lightboxContainer) {
            closeLightbox();
          }
        });

        /**
         * 控制按钮
         */
        closeBtn.addEventListener("click", (e) => {
          e.preventDefault();
          e.stopPropagation();
          closeLightbox();
        });

        zoomInBtn.addEventListener("click", (e) => {
          e.preventDefault();
          e.stopPropagation();
          zoomStep(1);
        });

        zoomOutBtn.addEventListener("click", (e) => {
          e.preventDefault();
          e.stopPropagation();
          zoomStep(-1);
        });

        resetBtn.addEventListener("click", (e) => {
          e.preventDefault();
          e.stopPropagation();
          resetZoom();
        });

        /**
         * 键盘快捷键
         */
        document.addEventListener("keydown", (e) => {
          if (!lightbox.classList.contains("show")) return;

          switch (e.key) {
            case "Escape":
              e.preventDefault();
              closeLightbox();
              break;
            case "+":
            case "=":
              e.preventDefault();
              zoomStep(1);
              break;
            case "-":
            case "_":
              e.preventDefault();
              zoomStep(-1);
              break;
            case "0":
              e.preventDefault();
              resetZoom();
              break;
          }
        });

        // ==================== 打开 Lightbox ====================
        /**
         * 事件委托：点击内容面板中的图片打开 lightbox
         */
        document.addEventListener("click", (e) => {
          // 检查是否点击了内容面板中的图片
          if (e.target.tagName === "IMG" && e.target.closest(".content-panel-content")) {
            e.preventDefault();
            e.stopPropagation();

            // 加载图片到 lightbox
            lightboxImg.src = e.target.src;
            lightboxImg.alt = e.target.alt || "Full size image";
            lightboxImg.draggable = false; // 确保禁用浏览器默认拖拽

            // 显示 lightbox
            lightbox.classList.add("show");

            // 重置状态
            resetZoom();
          }
        });
      }

      // ==================== 播放器控制 ====================
      /**
       * 更新播放器 UI
       * 更新时间显示和进度条位置
       */
      function updatePlayerUI() {
        if (!mediaPlayer || isDragging) {
          return;
        }

        const duration = getMediaDuration();
        const current = mediaPlayer.currentTime;

        if (timeDisplay) {
          const durationText = duration > 0 ? formatTime(duration) : "--:--";
          timeDisplay.textContent = `${formatTime(current)} / ${durationText}`;
        }

        if (duration > 0) {
          setProgressUI(current / duration);
        } else {
          setProgressUI(0);
        }
      }

      // ==================== 播放控制方法 ====================
      /**
       * 播放媒体
       * @returns {Promise<void>}
       */
      function playMedia() {
        if (!mediaPlayer) {
          console.warn("Media player not initialized");
          return Promise.resolve();
        }
        return mediaPlayer.play().catch((err) => {
          console.error("Failed to play media:", err);
        });
      }

      /**
       * 暂停媒体
       */
      function pauseMedia() {
        if (!mediaPlayer) {
          console.warn("Media player not initialized");
          return;
        }
        mediaPlayer.pause();
      }

      /**
       * 切换播放/暂停状态
       * @returns {Promise<void>}
       */
      function togglePlayPause() {
        if (!mediaPlayer) {
          console.warn("Media player not initialized");
          return Promise.resolve();
        }
        return mediaPlayer.toggle();
      }

      // 将方法暴露到 window 对象，供外部调用
      window.mediaControls = {
        play: playMedia,
        pause: pauseMedia,
        toggle: togglePlayPause,
        isPlaying: () => mediaPlayer && mediaPlayer.isPlaying,
        isPaused: () => !mediaPlayer || mediaPlayer.paused,
        getCurrentTime: () => (mediaPlayer ? mediaPlayer.currentTime : 0),
        getDuration: () => getMediaDuration(),
        setCurrentTime: (time) => {
          if (mediaPlayer && typeof time === "number" && time >= 0) {
            seekTo(time, { autoplay: mediaPlayer.isPlaying, triggeredByUser: true });
          }
        },
      };

      // 播放/暂停切换
      playButton.addEventListener("click", () => {
        togglePlayPause().then(() => {
          const icon = playButton.querySelector(".material-icons");
          icon.textContent = mediaPlayer && mediaPlayer.paused ? "play_arrow" : "pause";
        });
      });

      // 进度条拖拽与点击
      if (progressContainer) {
        progressContainer.addEventListener("mousedown", (e) => {
          if (!mediaPlayer || e.button !== 0) return;
          e.preventDefault();
          dragMoved = false;
          isDragging = true;
          wasPlayingBeforeDrag = mediaPlayer.isPlaying;
          progressContainer.classList.add("dragging");
        });

        progressContainer.addEventListener("click", (e) => {
          if (!mediaPlayer || dragMoved) return;

          const duration = getMediaDuration();
          if (!(duration > 0)) return;

          const percentage = getPointerPercentage(e);
          seekTo(percentage * duration, {
            autoplay: wasPlayingBeforeDrag || mediaPlayer.isPlaying,
            triggeredByUser: true,
          });

          // Ensure cursor remains pointer after click
          if (progressContainer) {
            progressContainer.style.cursor = "pointer";
          }
        });
      }

      document.addEventListener("mousemove", (e) => {
        if (!isDragging) return;
        dragMoved = true;
        const percentage = getPointerPercentage(e);
        const duration = getMediaDuration();
        if (!(duration > 0)) return;

        const newTime = percentage * duration;
        setProgressUI(percentage);
        timeDisplay.textContent = `${formatTime(newTime)} / ${formatTime(duration)}`;
      });

      document.addEventListener("mouseup", (e) => {
        if (!isDragging) return;
        isDragging = false;
        progressContainer.classList.remove("dragging");

        // Ensure cursor is always pointer after drag
        if (progressContainer) {
          progressContainer.style.cursor = "pointer";
        }

        if (dragMoved) {
          const percentage = getPointerPercentage(e);
          const duration = getMediaDuration();
          if (!(duration > 0)) return;
          seekTo(percentage * duration, {
            autoplay: wasPlayingBeforeDrag,
            triggeredByUser: true,
          });
        }
        wasPlayingBeforeDrag = false;
      });

      // ==================== 进度控制 ====================
      /**
       * 在时间轴容器内滚动到指定元素
       * 只在 .timeline-content 容器内滚动，避免触发整个页面滚动
       * @param {HTMLElement} element - 要滚动到的元素
       * @param {string} block - 垂直对齐方式：'start', 'center', 'end', 'nearest'
       */
      function scrollTimelineToElement(element, block = "center") {
        if (!element || !timelineContent) return;

        const containerRect = timelineContent.getBoundingClientRect();
        const elementRect = element.getBoundingClientRect();
        const containerScrollTop = timelineContent.scrollTop;
        const elementHeight = element.offsetHeight || elementRect.height;
        const containerHeight = timelineContent.clientHeight;

        // Calculate element's position relative to container's scroll position
        // element.offsetTop gives position relative to offsetParent, but we need relative to container
        // So we calculate: current scroll + (element's viewport position - container's viewport position)
        const elementTopRelativeToContainer = containerScrollTop + (elementRect.top - containerRect.top);

        let targetScrollTop = 0;

        switch (block) {
          case "start":
            targetScrollTop = elementTopRelativeToContainer;
            break;
          case "center":
            targetScrollTop = elementTopRelativeToContainer - containerHeight / 2 + elementHeight / 2;
            break;
          case "end":
            targetScrollTop = elementTopRelativeToContainer - containerHeight + elementHeight;
            break;
          case "nearest":
            // If element is above viewport, scroll to start
            if (elementRect.top < containerRect.top) {
              targetScrollTop = elementTopRelativeToContainer;
            }
            // If element is below viewport, scroll to end
            else if (elementRect.bottom > containerRect.bottom) {
              targetScrollTop = elementTopRelativeToContainer - containerHeight + elementHeight;
            }
            // Otherwise, don't scroll
            else {
              return;
            }
            break;
          default:
            targetScrollTop = elementTopRelativeToContainer - containerHeight / 2 + elementHeight / 2;
        }

        // Clamp scroll position to valid range
        const maxScrollTop = timelineContent.scrollHeight - containerHeight;
        targetScrollTop = Math.max(0, Math.min(targetScrollTop, maxScrollTop));

        // Smart scroll: fast animation for long distance, smooth for short distance
        const currentScrollTop = timelineContent.scrollTop;
        const distance = Math.abs(targetScrollTop - currentScrollTop);

        // For very short distances (< 100px), use instant scroll
        if (distance < 100) {
          timelineContent.scrollTop = targetScrollTop;
        }
        // For medium distances (< 500px), use smooth scroll (native)
        else if (distance < 500) {
          timelineContent.scrollTo({
            top: targetScrollTop,
            behavior: "smooth",
          });
        }
        // For long distances, use custom fast animation
        else {
          // Fast scroll animation with easing
          const duration = 300; // 300ms for any distance
          const startTime = performance.now();
          const startScroll = currentScrollTop;
          const scrollDelta = targetScrollTop - startScroll;

          function animateScroll(currentTime) {
            const elapsed = currentTime - startTime;
            const progress = Math.min(elapsed / duration, 1);

            // Ease out cubic for smooth deceleration
            const easeProgress = 1 - Math.pow(1 - progress, 3);

            timelineContent.scrollTop = startScroll + scrollDelta * easeProgress;

            if (progress < 1) {
              requestAnimationFrame(animateScroll);
            }
          }

          requestAnimationFrame(animateScroll);
        }
      }

      /**
       * 立即更新时间轴进度（用于手动点击跳转）
       * 高亮当前时间对应的对话项并滚动到视图中心
       * @param {number} currentTime - 当前播放时间（秒）
       */
      function updateTimelineProgress(currentTime) {
        // 找到当前时间对应的时间轴项
        let activeIndex = -1;
        for (let i = meetingData.length - 1; i >= 0; i--) {
          if (currentTime >= meetingData[i].time) {
            activeIndex = i;
            break;
          }
        }

        // 立即更新对话内容的高亮（timeline-item）
        // Use timeline-${activeIndex} ID to find the correct element, not forEach index
        // because when speaker filter is active, DOM index != meetingData index
        document.querySelectorAll(".timeline-item").forEach((item) => {
          item.classList.remove("active");
        });

        if (activeIndex !== -1) {
          const activeItem = document.getElementById(`timeline-${activeIndex}`);
          if (activeItem) {
            activeItem.classList.add("active");
            // 手动点击跳转时总是滚动到目标位置（无论是否在播放）
            // 使用自定义滚动函数，只在容器内滚动，避免触发整个页面滚动
            if (isInitialized) {
              scrollTimelineToElement(activeItem, "center");
            }
          }
        }

        // 立即更新主题项的高亮（topic-item）- 只高亮，不滚动
        document.querySelectorAll(".topic-item").forEach((item) => {
          const itemStartTime = parseFloat(item.dataset.time);
          const itemEndTime = item.dataset.timeEnd ? parseFloat(item.dataset.timeEnd) : null;

          // Check if current time is within the item's time range
          let isActive = false;
          if (itemEndTime !== null) {
            // Use half-open interval [start, end) to avoid double highlighting at boundaries
            // When currentTime equals the boundary, only the next chapter will be highlighted
            isActive = currentTime >= itemStartTime && currentTime < itemEndTime;
          } else {
            // No time range: check if currentTime matches start time (with small tolerance)
            isActive = Math.abs(currentTime - itemStartTime) < 1;
          }

          if (isActive) {
            item.classList.add("active");
          } else {
            item.classList.remove("active");
          }
        });
      }

      /**
       * 渲染主题标签页
       * 在左侧主题区域显示所有主题的标签
       */
      function renderTopicTabs() {
        topicsTabs.innerHTML = "";
        Object.keys(topics).forEach((key) => {
          const topic = topics[key];

          const tab = document.createElement("button");
          tab.className = `topic-tab ${key === currentTopic ? "active" : ""}`;
          tab.dataset.topicId = key; // Add data attribute for easier selection

          // Set border color for active tab indicator
          if (key === currentTopic) {
            tab.style.borderBottomColor = topic.color;
          }

          // 创建颜色标识
          const colorBox = document.createElement("span");
          colorBox.className = "topic-tab-color";
          colorBox.style.backgroundColor = topic.color;

          tab.appendChild(colorBox);
          tab.appendChild(document.createTextNode(topic.name));

          tab.onclick = () => {
            currentTopic = key;
            renderTopicTabs();
            renderTopicContent();
            saveToStorage(); // Save current topic selection
          };
          topicsTabs.appendChild(tab);
        });

        // Scroll to active tab after rendering
        scrollToActiveTopicTab();
      }

      /**
       * Scroll the topics tabs container to make the active tab visible
       * Smart scroll: instant for long distances, smooth for short distances
       */
      function scrollToActiveTopicTab() {
        if (!currentTopic) return;

        // Find the active tab element
        const activeTab = topicsTabs.querySelector(`[data-topic-id="${currentTopic}"]`);
        if (!activeTab) return;

        // Get container and tab positions
        const container = topicsTabs;
        const containerRect = container.getBoundingClientRect();
        const tabRect = activeTab.getBoundingClientRect();

        // Calculate if tab is outside visible area
        const tabLeft = tabRect.left - containerRect.left + container.scrollLeft;
        const tabRight = tabLeft + tabRect.width;
        const visibleLeft = container.scrollLeft;
        const visibleRight = visibleLeft + containerRect.width;

        // Scroll to make tab visible with some padding
        const padding = 20;
        let targetScrollLeft = null;

        if (tabLeft < visibleLeft) {
          // Tab is to the left of visible area, scroll left
          targetScrollLeft = tabLeft - padding;
        } else if (tabRight > visibleRight) {
          // Tab is to the right of visible area, scroll right
          targetScrollLeft = tabRight - containerRect.width + padding;
        }

        if (targetScrollLeft !== null) {
          const currentScroll = container.scrollLeft;
          const distance = Math.abs(targetScrollLeft - currentScroll);

          // Use instant scroll for long distances (> 300px), smooth for short distances
          if (distance > 300) {
            container.scrollTo({
              left: targetScrollLeft,
              behavior: "instant",
            });
          } else {
            container.scrollTo({
              left: targetScrollLeft,
              behavior: "smooth",
            });
          }
        }
      }

      /**
       * 渲染当前选中主题的内容
       * 显示主题摘要（带说话人标识）和时间节点列表（带时间区间和说话人徽章）
       */
      function renderTopicContent() {
        const topic = topics[currentTopic];
        if (!topic) {
          topicsContent.innerHTML = '<div class="empty-state">暂无内容</div>';
          return;
        }

        // Check if topic has any content (summary or items)
        const hasSummary = topic.summaryItems && topic.summaryItems.text;
        const hasItems = topic.items && topic.items.length > 0;

        if (!hasSummary && !hasItems) {
          topicsContent.innerHTML = '<div class="empty-state">暂无内容</div>';
          return;
        }

        topicsContent.innerHTML = "";

        // 添加主题摘要（新格式：单个段落卡片）
        if (topic.summaryItems && topic.summaryItems.text) {
          // Add summary section title (use text from markdown)
          const summaryTitle = document.createElement("h4");
          const summaryTitleText = topic.summaryTitle || "要点总结"; // Fallback to default
          summaryTitle.innerHTML = `<span class="material-icons" style="font-size: 16px; vertical-align: middle; margin-right: 6px; color: #f59e0b;">lightbulb</span>${summaryTitleText}`;
          summaryTitle.style.cssText = "font-size: 14px; font-weight: 600; color: #444; margin-bottom: 10px; display: flex; align-items: center;";
          topicsContent.appendChild(summaryTitle);

          // Single summary card with full text
          const summaryDiv = document.createElement("div");
          summaryDiv.className = "topic-summary-item";

          // Speakers (if available)
          if (topic.summaryItems.speakers && topic.summaryItems.speakers.length > 0) {
            const speakersDiv = document.createElement("div");
            speakersDiv.className = "summary-item-speakers";
            speakersDiv.style.marginBottom = "10px";

            topic.summaryItems.speakers.forEach((speakerId) => {
              const speakerSpan = document.createElement("span");
              speakerSpan.className = "summary-speaker-tag";

              // Color dot
              const colorDot = document.createElement("span");
              colorDot.className = "summary-speaker-dot";
              const swatch = speakerColors[speakerId];
              if (swatch) {
                colorDot.style.backgroundColor = swatch.hex;
              }

              // Speaker name
              const speakerName = document.createElement("span");
              speakerName.textContent = getSpeakerName(speakerId);

              speakerSpan.appendChild(colorDot);
              speakerSpan.appendChild(speakerName);
              speakersDiv.appendChild(speakerSpan);
            });

            summaryDiv.appendChild(speakersDiv);
          }

          // Content - render as markdown (with speaker name replacement)
          const contentDiv = document.createElement("div");
          contentDiv.className = "summary-item-content";
          contentDiv.style.lineHeight = "1.7";

          // Text is already cleaned during parsing, no need to filter again
          // Replace speaker names and convert to HTML (includes time link conversion)
          contentDiv.innerHTML = markdownToHTML(topic.summaryItems.text);

          summaryDiv.appendChild(contentDiv);
          topicsContent.appendChild(summaryDiv);
        }

        // Add items section only if there are items
        if (hasItems) {
          // Add items section title (use text from markdown)
          const timePointsTitle = document.createElement("h4");
          const itemsTitleText = topic.itemsTitle || "关联对话"; // Fallback to default
          timePointsTitle.innerHTML = `<span class="material-icons" style="font-size: 16px; vertical-align: middle; margin-right: 6px; color: #10b981;">chat_bubble_outline</span>${itemsTitleText}`;
          timePointsTitle.style.cssText = "font-size: 14px; font-weight: 600; color: #444; margin: 18px 0 10px 0; display: flex; align-items: center;";
          topicsContent.appendChild(timePointsTitle);

          // 添加时间节点列表（新格式：时间区间 + 多个说话人徽章）
          topic.items.forEach((item) => {
            const div = document.createElement("div");
            div.className = "topic-item";
            // Add time information for highlighting
            div.dataset.time = item.time;
            if (item.timeEnd !== null && item.timeEnd > item.time) {
              div.dataset.timeEnd = item.timeEnd;
            }

            const timeDiv = document.createElement("div");
            timeDiv.className = "topic-time";

            } else {

            }
            timeDiv.appendChild(timeText);

            // Speaker badges
            if (item.speakers && item.speakers.length > 0) {

                if (swatch) {
                  badge.style.setProperty("--badge-bg", swatch.badge);
                  badge.style.setProperty("--badge-border", hexToRgba(swatch.hex, 0.35));
                }

                speakersDiv.appendChild(badge);
              });

              timeDiv.appendChild(speakersDiv);
            }

            // Text（支持说话人颜色标识）
            const textDiv = document.createElement("div");
            textDiv.className = "topic-text";
            textDiv.innerHTML = replaceSpeakerNames(item.text);

            div.appendChild(timeDiv);
            div.appendChild(textDiv);

            div.onclick = () => {
              seekTo(item.time, {
                autoplay: true,
                triggeredByUser: true,
              });
            };
            topicsContent.appendChild(div);
          });
