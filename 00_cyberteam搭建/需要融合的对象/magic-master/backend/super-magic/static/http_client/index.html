<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTTP API 客户端</title>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <div class="app-container">
        <!-- 左侧侧边栏 -->
        <div class="sidebar">
            <h1>HTTP API 客户端</h1>

            <!-- 连接配置（紧凑） -->
            <div class="connection-panel">
                <div class="form-group">
                    <label for="serverUrl">服务器地址:</label>
                    <input type="text" id="serverUrl" value="http://127.0.0.1:8002">
                </div>
                <div class="connection-buttons">
                    <button id="subscribeBtn" class="btn secondary">建立消息订阅</button>
                    <button id="sendInitBtn" class="btn secondary">发送初始化消息</button>
                </div>
            </div>

            <!-- 初始化配置（折叠） -->
            <div class="config-panel-compact">
                <div class="config-panel-header" id="configPanelToggle">
                    <span class="config-panel-title">初始化配置</span>
                    <span class="config-panel-arrow" id="configPanelArrow">▶</span>
                </div>
                <div class="config-panel-body" id="configPanelBody">
                    <div id="currentFileName" class="file-name-display"></div>
                    <textarea id="uploadConfigContent" class="config-textarea" readonly
                        placeholder="请上传配置文件，不提供默认配置。"></textarea>
                    <div class="form-group file-upload-group">
                        <label for="configFile">上传配置文件:</label>
                        <input type="file" id="configFile" accept=".json">
                    </div>
                </div>
            </div>

            <!-- 工作区文件树 -->
            <div class="filetree-panel">
                <div class="filetree-header">
                    <span class="filetree-title">工作区文件</span>
                    <div class="filetree-actions">
                        <button id="refreshTreeBtn" class="icon-btn" title="刷新">↻</button>
                        <button id="selectWorkspaceBtn" class="icon-btn" title="选择目录">📂</button>
                    </div>
                </div>
                <div id="filetreeContainer" class="filetree-container">
                    <div class="filetree-empty">点击 📂 选择项目根目录<br>（会自动进入 .workspace）</div>
                </div>
            </div>
        </div>

        <!-- 右侧主区域 -->
        <div class="resizer" id="sidebarResizer"></div>
        <div class="main-content">
            <div class="chat-container">
                <!-- 消息显示区域 -->
                <div id="messagesContainer" class="messages-container">
                    <div class="message-list" id="messageList"></div>
                </div>

                <div class="resizer-horizontal" id="inputResizer"></div>

                <!-- 消息输入区域 -->
                <div class="message-input-panel" id="messageInputPanel">
                    <div class="input-controls-row">
                        <!-- 高级模式开关 -->
                        <div class="advanced-mode-toggle">
                            <label class="toggle-switch-label">高级模式</label>
                            <label class="toggle-switch">
                                <input type="checkbox" id="advancedModeToggle">
                                <span class="toggle-switch-slider"></span>
                            </label>
                        </div>
                        
                        <!-- Agent模式选择 -->
                        <div class="mode-switch">
                            <select id="agentModeSelect" class="agent-mode-select">
                                <option value="magic">magic — 通用模式（默认）</option>
                                <option value="general">general — 通用模式（兼容）</option>
                                <option value="ppt">ppt — PPT 制作</option>
                                <option value="data_analysis">data_analysis — 数据分析</option>
                                <option value="summary">summary — 音频纪要</option>
                                <option value="summary-chat">summary-chat — 音频纪要聊天</option>
                                <option value="summary-video">summary-video — 视频分析</option>
                                <option value="design">design — 画布设计</option>
                                <option value="test">test — 工具测试</option>
                                <option value="skill">skill — Skill 模式</option>
                                <option value="crew-creator">crew-creator — Crew 管理</option>
                                <option value="skill-creator">skill-creator — Skill 创作</option>
                                <option value="magiclaw">magiclaw — Magic Claw（需传 agent_code）</option>
                            </select>
                        </div>

                        <!-- Agent Code（仅 magiclaw 模式显示） -->
                        <div class="model-config" id="agentCodeGroup" style="display:none">
                            <select id="agentCodeInput" class="model-id-input">
                                <option value="openclaw">openclaw</option>
                                <option value="magishock">magishock</option>
                            </select>
                        </div>

                        <!-- Model ID 配置 -->
                        <div class="model-config">
                            <input type="text" id="modelIdInput" class="model-id-input"
                                placeholder="Model ID (留空默认)">
                        </div>
                    </div>

                    <div class="input-and-actions">
                        <!-- 普通模式字段 -->
                        <div id="normalModeFields" class="input-area-wrapper">
                            <textarea id="messageInput" placeholder="请输入消息..."></textarea>
                        </div>

                        <!-- 高级模式字段（默认隐藏） -->
                        <div id="advancedModeFields" class="input-area-wrapper" style="display:none">
                            <textarea id="rawJsonInput" class="raw-json-textarea"
                                placeholder='粘贴完整消息 JSON，例如：{"prompt": "...", "agent_mode": "magic", "dynamic_config": {...}, ...}'></textarea>
                            <p class="advanced-mode-tip">发送消息时将自动刷新 message_id</p>
                        </div>

                        <div class="primary-actions">
                            <button id="sendBtn" class="btn primary send-btn">发送</button>
                            <span class="send-hint" id="sendHint"></span>
                        </div>
                    </div>

                    <div class="secondary-actions">
                        <button id="historyBtn" class="btn secondary small">历史消息</button>
                        <button id="loadExampleBtn" class="btn secondary small">加载示例</button>
                        <button id="continueBtn" class="btn secondary small">继续</button>
                        <button id="followUpBtn" class="btn secondary small">发送追问</button>
                        <button id="interruptBtn" class="btn danger small">中断任务</button>
                        <button id="clearChatBtn" class="btn secondary small">清除对话</button>
                    </div>

                    <!-- 历史消息下拉框 -->
                    <div id="messageHistoryDropdown" class="history-dropdown">
                        <!-- 历史消息项将通过JavaScript动态生成 -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 文件预览弹窗 -->
    <div id="filePreviewOverlay" class="file-preview-overlay" style="display:none">
        <div class="file-preview-dialog">
            <div class="file-preview-header">
                <span id="filePreviewName" class="file-preview-name"></span>
                <button id="filePreviewClose" class="file-preview-close">✕</button>
            </div>
            <pre id="filePreviewContent" class="file-preview-content"></pre>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
    <script src="js/client.js"></script>
</body>

</html>
