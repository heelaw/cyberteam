name: Build and push container image

on:
  workflow_call:
    inputs:
      imageName:
        description: 'Image name (see magicrew.yml)'
        required: true
        type: string
  workflow_dispatch:
    inputs:
      imageName:
        description: 'Image name (see magicrew.yml)'
        required: true
        type: string

jobs:
  build:
    permissions:
      contents: write
      packages: write
      id-token: write
      attestations: write
    name: Build and push image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Prepare
        id: prepare
        shell: python3 -u ./.github/workflows/prepare_image_build.py {0}
        run: |
          {
            "inputs": ${{ toJson(inputs) }},
            "vars": ${{ toJson(vars) }},
            "secrets": ${{ toJson(secrets) }},
            "github": ${{ toJson(github) }}
          }

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        if: steps.prepare.outputs.loginGHCR == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.github_token }}
      
      - name: Login to ECR
        if: steps.prepare.outputs.loginECR == 'true'
        uses: docker/login-action@v3
        with:
          registry: public.ecr.aws
          username: ${{ secrets.AWS_ACCESS_KEY_ID }}
          password: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Login to Docker Hub
        if: steps.prepare.outputs.loginDockerHub == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          platforms: ${{ steps.prepare.outputs.platforms }}
          context: ${{ steps.prepare.outputs.context }}
          pull: true
          push: true
          provenance: mode=max
          build-args: ${{ steps.prepare.outputs.buildArgs }}
          tags: ${{ steps.prepare.outputs.tags }}
