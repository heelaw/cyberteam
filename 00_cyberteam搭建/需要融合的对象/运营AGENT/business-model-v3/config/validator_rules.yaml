# 业务模型验证规则配置
# Business Model Validation Rules Configuration

# 数学关系验证规则
mathematical_consistency:
  - name: "LTV > CAC"
    expression: "ltv > cac"
    severity: "warning"
    message: "LTV应该大于CAC才能盈利"
    category: "单体经济"

  - name: "转化漏斗递减"
    expression: "funnel.is_decreasing()"
    severity: "error"
    message: "转化漏斗的转化率应该递减"
    category: "转化链路"

  - name: "收入公式平衡"
    expression: "revenue == customers * arpu"
    severity: "error"
    tolerance: 0.01
    message: "收入应该等于客户数乘以客单价"
    category: "财务"

  - name: "整体转化率计算"
    expression: "overall_conversion == product_of_funnel_rates"
    severity: "error"
    tolerance: 0.001
    message: "整体转化率应该等于各步骤转化率之积"
    category: "转化链路"

# 行业基准验证规则
industry_benchmarks:
  # O2O服务行业
  - name: "O2O CAC基准"
    industry: "o2o-service"
    metric: "CAC"
    min_value: 50
    max_value: 500
    currency: "USD"
    severity: "warning"
    message: "CAC超出O2O服务行业常见范围"

  - name: "O2O复购率基准"
    industry: "o2o-service"
    metric: "retention_rate_90d"
    min_value: 0.60
    max_value: 0.90
    severity: "warning"
    message: "90天留存率超出O2O服务行业常见范围"

  # SaaS行业
  - name: "SaaS毛利率基准"
    industry: "saas"
    metric: "gross_margin"
    min_value: 0.70
    max_value: 0.95
    severity: "warning"
    message: "毛利率超出SaaS行业常见范围"

  - name: "SaaS流失率基准"
    industry: "saas"
    metric: "monthly_churn_rate"
    min_value: 0.01
    max_value: 0.05
    severity: "warning"
    message: "月流失率超出SaaS行业常见范围"

  # 电商行业
  - name: "电商CAC基准"
    industry: "ecommerce"
    metric: "CAC"
    min_value: 20
    max_value: 150
    currency: "USD"
    severity: "info"
    message: "CAC在电商行业中的参考范围"

  - name: "电商复购率基准"
    industry: "ecommerce"
    metric: "repeat_purchase_rate"
    min_value: 0.30
    max_value: 0.50
    severity: "info"
    message: "复购率在电商行业中的参考范围"

# 一致性检查规则
consistency_checks:
  - name: "CAC一致性"
    pattern: "CAC"
    severity: "error"
    message: "CAC在不同位置的值不一致"
    allow_variance: 0.05  # 允许5%的差异

  - name: "LTV一致性"
    pattern: "LTV"
    severity: "error"
    message: "LTV在不同位置的值不一致"
    allow_variance: 0.05

  - name: "转化率一致性"
    pattern: "转化率|conversion"
    severity: "warning"
    message: "转化率在不同位置的值不一致"
    allow_variance: 0.10

  - name: "整体转化率计算一致性"
    check_type: "calculated_vs_stated"
    severity: "error"
    message: "声明的整体转化率与计算值不一致"
    tolerance: 0.001

# 完整性检查规则
completeness:
  required_sections:
    - "市场分析"
    - "市场机会"
    - "商业模式"
    - "转化路径"
    - "转化链路"
    - "收入公式"
    - "收入模式"
    - "运营指标"
    - "流量渠道"
    - "流量策略"

  required_metrics:
    - "CAC"
    - "LTV"
    - "转化率"
    - "客单价"
    - "ARPU"
    - "毛利率"

  recommended_sections:
    - "竞争优势"
    - "核心壁垒"
    - "护城河"
    - "增长策略"
    - "风险分析"
    - "破局点"
    - "行动计划"

# 合理性检查规则
sanity_checks:
  - name: "转化率范围检查"
    metric_types: ["rate", "conversion_rate"]
    min_value: 0
    max_value: 1
    severity: "error"
    message: "转化率应该在0-100%之间"

  - name: "百分比格式检查"
    pattern: r'\d+%'
    severity: "warning"
    message: "检查是否所有百分比都正确标记"

  - name: "货币格式检查"
    pattern: r'\$\s*\d+'
    severity: "info"
    message: "检查货币符号使用是否一致"

  - name: "日期格式检查"
    pattern: r'\d{4}[-年]\d{1,2}[-月]\d{1,2}'
    severity: "info"
    message: "检查日期格式是否一致"

# 业务逻辑验证
business_logic:
  - name: "回收周期合理性"
    check: "payback_period < 12"
    severity: "warning"
    message: "CAC回收周期通常应小于12个月"
    category: "单体经济"

  - name: "市场份额合理性"
    check: "market_share < 0.5"
    severity: "warning"
    message: "目标市场份额大于50%可能过于乐观"
    category: "市场"

  - name: "增长率合理性"
    check: "growth_rate < 10"
    severity: "warning"
    message: "年增长率超过1000%可能过于乐观"
    category: "增长"

  - name: "团队规模匹配"
    check: "team_size scales with revenue"
    severity: "info"
    message: "检查团队规模是否与收入目标匹配"
    category: "运营"

# 文档结构验证
document_structure:
  - name: "标题层级规范"
    check: "heading_levels_consecutive"
    severity: "warning"
    message: "标题层级应该连续，不应跳跃"

  - name: "表格一致性"
    check: "tables_have_headers"
    severity: "error"
    message: "所有表格应该有标题行"

  - name: "交叉引用有效"
    check: "all_links_valid"
    severity: "error"
    message: "文档中的交叉引用应该有效"
