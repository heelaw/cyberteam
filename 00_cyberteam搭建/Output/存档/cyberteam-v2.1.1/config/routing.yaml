# ============================================================================
# 路由优先级规则
# ============================================================================

routing_priority:
  # 优先级顺序: 内置Agent > 高优先级平台 > 中优先级平台
  builtin_first:
    - strategy-director
    - product-director
    - engineering-lead
    - qa-lead

  high_priority:
    - douyin
    - xiaohongshu
    - private_domain
    - taobao

  medium_priority:
    - kuaishou
    - wechat
    - bilibili
    - baidu_seo
    - jd
    - pinduoduo

  # 触发词权重
  trigger_weights:
    exact_match: 100
    partial_match: 50
    fuzzy_match: 20
    builtin_priority_boost: 10

# ============================================================================
# Agent协同链路
# ============================================================================

coordination_chains:
  # 种草-拔草链路
  seeding_to_conversion:
    - xiaohongshu  # 种草
    - douyin      # 短视频验证
    - taobao      # 淘宝拔草
    - jd          # 京东拔草
    - pinduoduo   # 拼多多拔草

  # 直播电商链路
  live_commerce:
    - douyin      # 抖音直播
    - kuaishou    # 快手直播
    - private_domain  # 引流私域
    - wechat      # 公众号沉淀

  # 私域运营链路
  private_domain_flow:
    - wechat      # 公众号获客
    - private_domain  # 私域沉淀
    - xiaohongshu  # 持续种草
    - taobao      # 电商转化

  # 内容矩阵链路
  content_matrix:
    - bilibili    # 中长视频深度内容
    - douyin      # 短视频引流
    - kuaishou    # 下沉市场
    - xiaohongshu # 种草转化
    - baidu_seo   # 搜索截流

# ============================================================================
# 分类统计
# ============================================================================

category_summary:
  builtin_strategy:
    - strategy-director
    display_name: 战略层
  builtin_product:
    - product-director
    display_name: 产品层
  builtin_engineering:
    - engineering-lead
    display_name: 工程层
  builtin_qa:
    - qa-lead
    display_name: 质量层
  builtin_operations:
    - operations-director
    display_name: 运营层
  short_video:
    - douyin
    - kuaishou
    display_name: 短视频
  social_media:
    - xiaohongshu
    display_name: 社交媒体
  video:
    - bilibili
    display_name: 视频平台
  content:
    - wechat
    display_name: 内容运营
  search:
    - baidu_seo
    display_name: 搜索引擎
  private_traffic:
    - private_domain
    display_name: 私域运营
  ecommerce:
    - taobao
    - jd
    - pinduoduo
    display_name: 电商运营

# ============================================================================
# 文件路径配置
# ============================================================================

paths:
  builtin_agents: agents/builtin/
  china_platforms_agents: agents/china-platforms/
  skills: skills/china-platforms/
  templates: templates/china-platforms/
  coordination: config/coordination/

# ============================================================================
