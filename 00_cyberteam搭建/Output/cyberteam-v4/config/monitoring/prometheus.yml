# Prometheus Configuration for CyberTeam V4

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'cyberteam-dev'
    environment: 'development'

# Alertmanager configuration
alerting:
  alertmanagers:
  - static_configs:
    - targets: []

# Rule files
rule_files:
  - '/etc/prometheus/alerts/*.yml'

# Scrape configurations
scrape_configs:
  # CyberTeam Application
  - job_name: 'cyberteam'
    static_configs:
      - targets: ['cyberteam:9090']
        labels:
          service: 'cyberteam-api'
          app: 'cyberteam'
    scrape_interval: 10s
    metrics_path: '/metrics'

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # cAdvisor (container metrics)
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']

  # Node Exporter (host metrics)
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  # PostgreSQL Exporter
  - job_name: 'postgres-exporter'
    static_configs:
      - targets: ['postgres-exporter:9187']
        labels:
          service: 'database'

  # Redis Exporter
  - job_name: 'redis-exporter'
    static_configs:
      - targets: ['redis-exporter:9121']
        labels:
          service: 'cache'
