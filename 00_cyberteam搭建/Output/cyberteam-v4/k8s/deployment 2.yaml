# CyberTeam V4 - Kubernetes Deployment Manifests

---
# Namespace
apiVersion: v1
kind: Namespace
metadata:
  name: cyberteam
  labels:
    name: cyberteam
    environment: production

---
# ConfigMap
apiVersion: v1
kind: ConfigMap
metadata:
  name: cyberteam-config
  namespace: cyberteam
data:
  ENV: "production"
  LOG_LEVEL: "INFO"
  PYTHONUNBUFFERED: "1"

---
# Secret (template - use kubectl create secret or external secret manager)
apiVersion: v1
kind: Secret
metadata:
  name: cyberteam-secret
  namespace: cyberteam
type: Opaque
stringData:
  SECRET_KEY: "change-me-in-production"
  DB_PASSWORD: "change-me"
  REDIS_PASSWORD: "change-me"

---
# Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cyberteam
  namespace: cyberteam
  labels:
    app: cyberteam
    version: v4
spec:
  replicas: 3
  selector:
    matchLabels:
      app: cyberteam
  template:
    metadata:
      labels:
        app: cyberteam
        version: v4
    spec:
      containers:
      - name: cyberteam
        image: ghcr.io/your-org/cyberteam:latest
        imagePullPolicy: Always
        ports:
        - name: http
          containerPort: 8000
          protocol: TCP
        - name: metrics
          containerPort: 9090
          protocol: TCP
        env:
        - name: ENV
          valueFrom:
            configMapKeyRef:
              name: cyberteam-config
              key: ENV
        - name: SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: cyberteam-secret
              key: SECRET_KEY
        - name: LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: cyberteam-config
              key: LOG_LEVEL
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /ready
            port: http
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        volumeMounts:
        - name: data
          mountPath: /app/data
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: cyberteam-pvc

---
# Service
apiVersion: v1
kind: Service
metadata:
  name: cyberteam
  namespace: cyberteam
  labels:
    app: cyberteam
spec:
  type: ClusterIP
  ports:
  - name: http
    port: 80
    targetPort: http
    protocol: TCP
  - name: metrics
    port: 9090
    targetPort: metrics
    protocol: TCP
  selector:
    app: cyberteam

---
# Ingress
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cyberteam
  namespace: cyberteam
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - cyberteam.example.com
    secretName: cyberteam-tls
  rules:
  - host: cyberteam.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: cyberteam
            port:
              number: 80

---
# PersistentVolumeClaim
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: cyberteam-pvc
  namespace: cyberteam
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: standard

---
# HorizontalPodAutoscaler
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: cyberteam-hpa
  namespace: cyberteam
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: cyberteam
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Percent
        value: 100
        periodSeconds: 30

---
# ServiceMonitor (for Prometheus)
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: cyberteam
  namespace: cyberteam
  labels:
    app: cyberteam
spec:
  selector:
    matchLabels:
      app: cyberteam
  endpoints:
  - port: metrics
    interval: 30s
    path: /metrics
