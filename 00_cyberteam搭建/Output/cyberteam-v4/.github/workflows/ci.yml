# CyberTeam V4 - Enhanced CI Pipeline
# Comprehensive continuous integration with testing, linting, security scanning, and quality checks

name: CI

on:
  push:
    branches: [main, develop, 'feature/**']
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '20'

jobs:
  # ============================================
  # Code Quality & Linting
  # ============================================
  lint-python:
    name: Lint Python Code
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install black ruff mypy pytest
          pip install -e ".[dev]"

      - name: Run Black (code formatting check)
        run: |
          black --check --diff CYBERTEAM/ cyberteam/ engine/ backend/

      - name: Run Ruff (linter)
        run: |
          ruff check CYBERTEAM/ cyberteam/ engine/ backend/

      - name: Run mypy (type checking)
        run: |
          mypy CYBERTEAM/ cyberteam/ --ignore-missing-imports || true

  # ============================================
  # Security Scanning
  # ============================================
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install security tools
        run: |
          python -m pip install --upgrade pip
          pip install bandit safety

      - name: Run Bandit (security linter)
        run: |
          bandit -r CYBERTEAM/ cyberteam/ engine/ backend/ -f json -o bandit-report.json || true
          bandit -r CYBERTEAM/ cyberteam/ engine/ backend/

      - name: Run Safety (dependency vulnerability check)
        run: |
          pip install -e .
          safety check --json > safety-report.json || true
          safety check || true

      - name: Check for secrets
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD

  # ============================================
  # Python Tests
  # ============================================
  test-python:
    name: Python Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11']
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests with pytest
        run: |
          pytest tests/ -v --tb=short --cov=CYBERTEAM --cov=cyberteam --cov-report=xml --cov-report=term-missing

      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: python
          name: codecov-${{ matrix.python-version }}
          fail_ci_if_error: false

  # ============================================
  # Backend Integration Tests
  # ============================================
  test-backend:
    name: Backend Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      db:
        image: sqlite:latest
        options: >-
          --health-cmd "sqlite3 --version"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install backend dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Run backend tests
        run: |
          cd backend
          pytest tests/ -v || echo "No backend tests found"

  # ============================================
  # Frontend Tests
  # ============================================
  test-frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install frontend dependencies (if any)
        run: |
          if [ -f "frontend/package.json" ]; then
            cd frontend && npm ci
          else
            echo "No package.json found - static HTML only"
          fi

      - name: Run frontend tests
        run: |
          if [ -f "frontend/package.json" ]; then
            cd frontend && npm test
          else
            echo "Static HTML - no tests to run"
          fi

  # ============================================
  # Docker Build Test
  # ============================================
  test-docker-build:
    name: Docker Build Test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: cyberteam:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          load: true

      - name: Test Docker image
        run: |
          docker run --rm cyberteam:latest python -c "import cyberteam; print('CyberTeam imported successfully')"

  # ============================================
  # Structure Validation
  # ============================================
  validate-structure:
    name: Validate Project Structure
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate directory structure
        run: |
          echo "Validating CyberTeam V4 structure..."

          # Check Layer 0: ENGINE
          required_dirs=(
            "ENGINE"
            "CYBERTEAM"
            "AGENTS"
            "SKILLS"
            "docs"
            "config"
          )

          for dir in "${required_dirs[@]}"; do
            if [ -d "$dir" ]; then
              echo "✓ $dir exists"
            else
              echo "✗ $dir missing"
              exit 1
            fi
          done

      - name: Validate Python imports
        run: |
          python -c "import CYBERTEAM; print('✓ CYBERTEAM imports')"
          python -c "import cyberteam; print('✓ cyberteam imports')"

  # ============================================
  # Build & Package
  # ============================================
  build:
    name: Build Package
    runs-on: ubuntu-latest
    needs: [lint-python, test-python, test-docker-build]
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build package
        run: |
          python -m build

      - name: Check package
        run: |
          twine check dist/*

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-package
          path: dist/
          retention-days: 7
