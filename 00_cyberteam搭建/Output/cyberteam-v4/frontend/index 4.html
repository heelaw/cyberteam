<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberTeam V4 控制台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
        }
        .header {
            background: rgba(0,0,0,0.3);
            padding: 20px 40px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            font-size: 24px;
            font-weight: bold;
            background: linear-gradient(90deg, #00d4ff, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .status-badge {
            background: rgba(0,255,136,0.2);
            color: #00ff88;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 14px;
            border: 1px solid rgba(0,255,136,0.3);
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 24px;
            margin-bottom: 40px;
        }
        .card {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 24px;
            border: 1px solid rgba(255,255,255,0.1);
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }
        .card-title {
            font-size: 14px;
            color: rgba(255,255,255,0.6);
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .card-value {
            font-size: 36px;
            font-weight: bold;
            background: linear-gradient(90deg, #00d4ff, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .card-sub {
            font-size: 14px;
            color: rgba(255,255,255,0.4);
            margin-top: 8px;
        }
        .section-title {
            font-size: 20px;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .agent-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 12px;
        }
        .agent-item {
            background: rgba(255,255,255,0.05);
            padding: 16px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .agent-name {
            font-weight: bold;
            margin-bottom: 4px;
        }
        .agent-type {
            font-size: 12px;
            color: rgba(255,255,255,0.5);
        }
        .expert-badge {
            background: rgba(124,58,237,0.3);
            color: #a78bfa;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
        }
        .dept-badge {
            background: rgba(0,212,255,0.3);
            color: #00d4ff;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
        }
        .task-form {
            background: rgba(255,255,255,0.05);
            padding: 24px;
            border-radius: 16px;
            margin-bottom: 40px;
        }
        .task-input {
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(0,0,0,0.3);
            color: #fff;
            font-size: 16px;
            margin-bottom: 16px;
        }
        .task-input:focus {
            outline: none;
            border-color: #00d4ff;
        }
        .btn {
            background: linear-gradient(90deg, #00d4ff, #7c3aed);
            color: #fff;
            border: none;
            padding: 12px 32px;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            transition: opacity 0.3s;
        }
        .btn:hover { opacity: 0.9; }
        .task-list {
            max-height: 400px;
            overflow-y: auto;
        }
        .task-item {
            background: rgba(255,255,255,0.05);
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .task-title { flex: 1; }
        .task-state {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
        }
        .state-pending { background: rgba(255,193,7,0.2); color: #ffc107; }
        .state-running { background: rgba(0,212,255,0.2); color: #00d4ff; }
        .state-completed { background: rgba(0,255,136,0.2); color: #00ff88; }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">⚡ CyberTeam V4</div>
        <div class="status-badge">● 服务运行中</div>
    </div>

    <div class="container">
        <!-- 统计卡片 -->
        <div class="grid">
            <div class="card">
                <div class="card-title">任务总数</div>
                <div class="card-value" id="totalTasks">-</div>
                <div class="card-sub">待处理: <span id="pendingTasks">-</span></div>
            </div>
            <div class="card">
                <div class="card-title">思维专家</div>
                <div class="card-value">14</div>
                <div class="card-sub">决策框架</div>
            </div>
            <div class="card">
                <div class="card-title">执行部门</div>
                <div class="card-value">6</div>
                <div class="card-sub">专业职能</div>
            </div>
            <div class="card">
                <div class="card-title">API 版本</div>
                <div class="card-value">V4.0</div>
                <div class="card-sub">REST API</div>
            </div>
        </div>

        <!-- 创建任务 -->
        <div class="task-form">
            <h3 class="section-title">创建新任务</h3>
            <input type="text" class="task-input" id="taskInput" placeholder="输入任务描述... (例如: 帮我分析用户增长策略)">
            <button class="btn" onclick="createTask()">提交任务</button>
        </div>

        <!-- Agent 列表 -->
        <h3 class="section-title">可用 Agent</h3>
        <div class="grid">
            <div class="card">
                <h4 style="margin-bottom:16px;color:#a78bfa;">🧠 思维专家 (14)</h4>
                <div class="agent-list" id="expertList"></div>
            </div>
            <div class="card">
                <h4 style="margin-bottom:16px;color:#00d4ff;">🏢 执行部门 (6)</h4>
                <div class="agent-list" id="deptList"></div>
            </div>
        </div>

        <!-- 任务列表 -->
        <h3 class="section-title">任务列表</h3>
        <div class="task-list" id="taskList"></div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8080';

        async function loadStats() {
            try {
                const res = await fetch(`${API_BASE}/api/tasks/stats`);
                const data = await res.json();
                document.getElementById('totalTasks').textContent = data.total || 0;
                document.getElementById('pendingTasks').textContent = data.by_state?.pending || 0;
            } catch(e) {
                document.getElementById('totalTasks').textContent = '?';
            }
        }

        async function loadAgents() {
            try {
                const res = await fetch(`${API_BASE}/api/agents`);
                const data = await res.json();

                const expertList = document.getElementById('expertList');
                const deptList = document.getElementById('deptList');

                data.agents.forEach(agent => {
                    const div = document.createElement('div');
                    div.className = 'agent-item';
                    div.innerHTML = `
                        <div class="agent-name">${agent.name}</div>
                        <div class="agent-type">
                            <span class="${agent.type === 'expert' ? 'expert-badge' : 'dept-badge'}">
                                ${agent.type === 'expert' ? '专家' : '部门'}
                            </span>
                        </div>
                    `;
                    if(agent.type === 'expert') {
                        expertList.appendChild(div);
                    } else {
                        deptList.appendChild(div);
                    }
                });
            } catch(e) {
                console.error('加载Agent失败:', e);
            }
        }

        async function loadTasks() {
            try {
                const res = await fetch(`${API_BASE}/api/tasks`);
                const data = await res.json();

                const taskList = document.getElementById('taskList');
                taskList.innerHTML = '';

                data.tasks.forEach(task => {
                    const div = document.createElement('div');
                    div.className = 'task-item';
                    div.innerHTML = `
                        <div class="task-title">${task.title || task.user_input}</div>
                        <span class="task-state state-${task.state}">${task.state}</span>
                    `;
                    taskList.appendChild(div);
                });
            } catch(e) {
                console.error('加载任务失败:', e);
            }
        }

        async function createTask() {
            const input = document.getElementById('taskInput');
            const text = input.value.trim();
            if(!text) return;

            try {
                await fetch(`${API_BASE}/api/tasks`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({user_input: text, priority: '中'})
                });
                input.value = '';
                loadTasks();
                loadStats();
            } catch(e) {
                alert('创建任务失败: ' + e.message);
            }
        }

        // 初始化
        loadStats();
        loadAgents();
        loadTasks();

        // 每5秒刷新
        setInterval(() => {
            loadStats();
            loadTasks();
        }, 5000);
    </script>
</body>
</html>
