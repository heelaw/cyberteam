<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TODO 应用</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <header class="app-header">
            <h1>📝 我的待办事项</h1>
            <div class="stats">
                <span class="stat-item">总计: <strong id="totalCount">0</strong></span>
                <span class="stat-item">待完成: <strong id="pendingCount">0</strong></span>
                <span class="stat-item">已完成: <strong id="completedCount">0</strong></span>
            </div>
        </header>

        <section class="add-todo-section">
            <form id="todoForm" class="todo-form">
                <input
                    type="text"
                    id="todoInput"
                    class="todo-input"
                    placeholder="添加新的待办事项..."
                    autocomplete="off"
                    required
                >
                <select id="prioritySelect" class="priority-select">
                    <option value="low">低优先级</option>
                    <option value="medium" selected>中优先级</option>
                    <option value="high">高优先级</option>
                </select>
                <button type="submit" class="btn-add">添加</button>
            </form>
        </section>

        <section class="filter-section">
            <div class="filter-buttons">
                <button class="filter-btn active" data-filter="all">全部</button>
                <button class="filter-btn" data-filter="pending">待完成</button>
                <button class="filter-btn" data-filter="completed">已完成</button>
            </div>
            <div class="sort-section">
                <select id="sortSelect" class="sort-select">
                    <option value="created">按创建时间</option>
                    <option value="priority">按优先级</option>
                    <option value="title">按标题</option>
                </select>
            </div>
        </section>

        <section class="todo-list-section">
            <ul id="todoList" class="todo-list">
                <!-- TODO items will be rendered here -->
            </ul>
            <div id="emptyState" class="empty-state">
                <div class="empty-icon">📋</div>
                <p>暂无待办事项</p>
                <small>添加一个新任务开始吧！</small>
            </div>
        </section>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
