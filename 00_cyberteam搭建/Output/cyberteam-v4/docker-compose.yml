# CyberTeam V4 - Docker Compose for Development
# Complete development environment with monitoring

version: '3.8'

services:
  # ============================================
  # CyberTeam Core Application
  # ============================================
  cyberteam:
    build:
      context: .
      dockerfile: Dockerfile
    image: cyberteam:dev
    container_name: cyberteam-app
    ports:
      - "8000:8000"
      - "9090:9090"
    environment:
      - ENV=development
      - LOG_LEVEL=DEBUG
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=sqlite:///./data/cyberteam.db
    volumes:
      - ./CYBERTEAM:/app/CYBERTEAM:ro
      - ./cyberteam:/app/cyberteam:ro
      - ./engine:/app/engine:ro
      - ./backend:/app/backend:ro
      - ./data:/app/data
      - ./config:/app/config:ro
    command: >
      sh -c "
        uvicorn cyberteam.api.main:app
        --host 0.0.0.0
        --port 8000
        --reload
        --log-level debug
      "
    depends_on:
      - redis
      - postgres
    networks:
      - cyberteam-net
    restart: unless-stopped

  # ============================================
  # PostgreSQL Database
  # ============================================
  postgres:
    image: postgres:15-alpine
    container_name: cyberteam-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=cyberteam
      - POSTGRES_USER=cyberteam
      - POSTGRES_PASSWORD=cyberteam_dev
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - cyberteam-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cyberteam"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # Redis Cache
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: cyberteam-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - cyberteam-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ============================================
  # Prometheus - Metrics Collection
  # ============================================
  prometheus:
    image: prom/prometheus:latest
    container_name: cyberteam-prometheus
    ports:
      - "9091:9090"
    volumes:
      - ./config/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
    networks:
      - cyberteam-net
    restart: unless-stopped

  # ============================================
  # Grafana - Visualization
  # ============================================
  grafana:
    image: grafana/grafana:latest
    container_name: cyberteam-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./config/monitoring/grafana-dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./config/monitoring/grafana-datasources:/etc/grafana/provisioning/datasources:ro
    networks:
      - cyberteam-net
    restart: unless-stopped
    depends_on:
      - prometheus

  # ============================================
  # Loki - Log Aggregation
  # ============================================
  loki:
    image: grafana/loki:latest
    container_name: cyberteam-loki
    ports:
      - "3100:3100"
    volumes:
      - ./config/monitoring/loki.yml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - cyberteam-net
    restart: unless-stopped

  # ============================================
  # Promtail - Log Collector
  # ============================================
  promtail:
    image: grafana/promtail:latest
    container_name: cyberteam-promtail
    volumes:
      - ./config/monitoring/promtail.yml:/etc/promtail/config.yml:ro
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    command: -config.file=/etc/promtail/config.yml
    networks:
      - cyberteam-net
    restart: unless-stopped
    depends_on:
      - loki

  # ============================================
  # pgAdmin - Database Management
  # ============================================
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: cyberteam-pgadmin
    ports:
      - "5050:80"
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@cyberteam.local
      - PGADMIN_DEFAULT_PASSWORD=admin
      - PGADMIN_CONFIG_SERVER_MODE=False
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    networks:
      - cyberteam-net
    restart: unless-stopped
    depends_on:
      - postgres

  # ============================================
  # Redis Commander - Redis Management
  # ============================================
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: cyberteam-redis-commander
    ports:
      - "8081:8081"
    environment:
      - REDIS_HOSTS=local:redis:6379
    networks:
      - cyberteam-net
    restart: unless-stopped
    depends_on:
      - redis

networks:
  cyberteam-net:
    name: cyberteam-network
    driver: bridge

volumes:
  postgres-data:
    name: cyberteam-postgres-data
  redis-data:
    name: cyberteam-redis-data
  prometheus-data:
    name: cyberteam-prometheus-data
  grafana-data:
    name: cyberteam-grafana-data
  loki-data:
    name: cyberteam-loki-data
  pgadmin-data:
    name: cyberteam-pgadmin-data
