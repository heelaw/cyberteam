## 项目目标

为贝壳找房App撰写毕业季推广文案，针对目标用户群体（大学生/刚毕业95后），在三个渠道（App Push、官方微博、大学城线下渠道）进行推广，以提升App打开率和用户转化。

---

## 核心卖点结论

| 优先级 | 卖点方向 | 具体卖点 | 驱动力类型 |
|--------|----------|----------|------------|
| P0 | 优惠活动 | 0元入住 | #1利益驱动 |
| P0 | 服务保障 | 真房源+0中介费 | #7恐惧驱动 |
| P1 | 情感共鸣 | 毕业季主题 | #4社交驱动 |
| P2 | 产品功能 | VR看房 | #9好奇心驱动 |
| P3 | 品牌背书 | 世界杯赞助 | #6荣誉驱动 |

---

## 渠道策略

| 渠道 | 策略重点 | 文案数量 |
|------|----------|----------|
| App Push | 利益前置、短平快、紧迫感 | 3+2版本 |
| 官方微博 | 情感叙事、话题互动、UGC征集 | 2+系列化 |
| 线下海报 | 视觉冲击、QR码导流 | 3版本 |

