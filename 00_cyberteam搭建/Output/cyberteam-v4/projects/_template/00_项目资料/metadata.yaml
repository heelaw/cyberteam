# 项目元数据

| 字段 | 说明 | 示例 |
|------|------|------|
| project_id | 项目唯一标识 | proj_20260326_001 |
| project_name | 项目名称 | 贝壳推广文案撰写 |
| project_type | 项目类型 | 案例分析/策略制定/危机处理/常规运营 |
| start_date | 开始日期 | 2026-03-26 |
| deadline | 截止日期 | 2026-03-26 |
| status | 项目状态 | active/completed/archived |
| owner | 项目负责人 | 运营总监 |
| participants | 参与Agent | 运营总监,用户运营专家,内容运营专家,活动运营专家 |
| related_agents | 涉及Agent | 营销总监,增长营销专家 |
| description | 项目描述 | 贝壳找房App针对95后毕业生群体的推广文案撰写 |

---

## 项目生命周期

```
启动 → 执行 → 归档
  │        │       │
  │        │       └─→ shared/knowledge_base/ (沉淀到知识库)
  │        │
  │        └─→ 每个Agent的决策/产出存入对应文件夹
  │
  └─→ 初始化时从 shared/templates/ 复制项目模板
```

---

## 路径规范

```
projects/{项目名称中文}/
├── 00_项目资料/              # 项目元数据
│   └── metadata.yaml         # 项目信息（必填）
├── 01_Agent会议纪要/          # Agent讨论与决策
│   ├── 总监决策/             # 运营/营销总监的判断和决策
│   ├── 专家讨论/             # 各专家的分析和讨论
│   └── 对话记录/             # Agent间的对话日志
├── 02_计划方案/              # 计划与方案
│   ├── 任务分解/             # 工作任务分解
│   ├── 执行计划/             # 执行步骤
│   └── 方案选项/             # 方案A/B/C
└── 03_最终输出/              # 最终产出
    ├── 文案产出/             # 所有文案物料
    ├── 分析报告/             # 市场/用户分析
    └── 汇总方案/             # 完整方案文档
```
