## 项目背景

- **业态**: 中式快餐/面点
- **主力产品**: 西北发面包子
- **面积**: 200平方米
- **位置**: 深圳海岸城
- **特点**: 强调馅料丰富、品种多，不局限于西北风味，但以发面包子为主

## 策划任务

1. 市场分析（前期准备）
2. 品牌定位与人群定位
3. 产品策略与产品定位
4. 产品思考：200平方门店能否撑起以包子为主的业态
5. 产品细化：馅料丰富、品种多的产品线规划

## 产出要求

- 市场分析报告
- 品牌定位报告
- 产品策略报告
- 产品线规划方案
- 完整品牌策划方案
