<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>项目 Playground - Playground v8</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #1a1a2e;
            --secondary: #16213e;
            --accent: #e94560;
            --success: #00d9a5;
            --warning: #ffc107;
            --text: #ffffff;
            --text-dim: rgba(255,255,255,0.6);
        }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--primary);
            color: var(--text);
            min-height: 100vh;
        }
        
        .header {
            background: linear-gradient(135deg, var(--secondary), var(--primary));
            padding: 20px 30px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .header h1 { 
            font-size: 24px; 
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .header .subtitle {
            color: var(--text-dim);
            font-size: 14px;
        }
        .badge {
            background: var(--accent);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            padding: 20px 30px;
        }
        .stat-card {
            background: var(--secondary);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .stat-card .value {
            font-size: 32px;
            font-weight: bold;
            color: var(--success);
        }
        .stat-card .label {
            color: var(--text-dim);
            font-size: 13px;
            margin-top: 5px;
        }
        
        .main-content {
            display: grid;
            grid-template-columns: 1fr 400px;
            gap: 20px;
            padding: 0 30px 30px;
            height: calc(100vh - 200px);
        }
        
        .left-panel {
            background: var(--secondary);
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .tabs {
            display: flex;
            background: rgba(0,0,0,0.2);
            padding: 10px 10px 0;
            overflow-x: auto;
        }
        .tab {
            padding: 10px 16px;
            cursor: pointer;
            border-radius: 8px 8px 0 0;
            font-size: 13px;
            color: var(--text-dim);
            transition: all 0.2s;
            white-space: nowrap;
        }
        .tab:hover { color: var(--text); }
        .tab.active {
            background: var(--secondary);
            color: var(--accent);
            font-weight: 600;
        }
        .tab-content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }
        
        .content-section h3 {
            color: var(--accent);
            margin-bottom: 15px;
            font-size: 16px;
        }
        .content-section h4 {
            color: var(--text);
            margin: 15px 0 10px;
            font-size: 14px;
        }
        
        .kpi-table {
            width: 100%;
            border-collapse: collapse;
            margin: 15px 0;
            font-size: 13px;
        }
        .kpi-table th, .kpi-table td {
            padding: 10px 12px;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .kpi-table th {
            background: rgba(0,0,0,0.2);
            color: var(--accent);
        }
        
        .funnel-container {
            margin: 20px 0;
            padding: 15px;
            background: rgba(0,0,0,0.2);
            border-radius: 8px;
        }
        .funnel-container h4 {
            color: var(--accent);
            margin-bottom: 15px;
        }
        .funnel-stage {
            display: flex;
            align-items: center;
            margin: 10px 0;
        }
        .funnel-label {
            width: 120px;
            font-size: 12px;
            color: var(--text-dim);
        }
        .funnel-bar {
            height: 20px;
            background: linear-gradient(90deg, var(--accent), #ff6b6b);
            border-radius: 4px;
            position: relative;
            transition: width 0.5s;
            min-width: 10px;
        }
        .funnel-value {
            margin-left: 15px;
            font-size: 12px;
            color: var(--text);
            min-width: 80px;
        }
        .funnel-result {
            margin-top: 15px;
            padding: 10px;
            background: rgba(0,217,165,0.1);
            border-radius: 6px;
            font-size: 13px;
            color: var(--success);
            text-align: center;
        }
        .funnel-total {
            margin-top: 20px;
            padding: 15px;
            background: rgba(233,69,96,0.2);
            border: 1px solid var(--accent);
            border-radius: 8px;
            display: flex;
            justify-content: space-around;
            font-size: 14px;
            font-weight: bold;
        }
        
        .formula-box {
            background: rgba(0,0,0,0.3);
            border-radius: 8px;
            padding: 15px;
            margin: 15px 0;
            font-family: 'Monaco', 'Menlo', monospace;
            font-size: 12px;
            line-height: 1.8;
            white-space: pre-wrap;
            color: var(--success);
            border: 1px solid rgba(0,217,165,0.2);
        }
        
        .right-panel {
            background: var(--secondary);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .chat-header {
            padding: 15px 20px;
            background: rgba(0,0,0,0.2);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .chat-header .dot {
            width: 10px;
            height: 10px;
            background: var(--success);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
        }
        .message {
            margin-bottom: 15px;
            animation: fadeIn 0.3s;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .message-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 5px;
        }
        .message-avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
        }
        .avatar-ceo { background: var(--accent); }
        .avatar-coo { background: #9c27b0; }
        .avatar-expert { background: #2196f3; }
        .avatar-risk { background: var(--warning); color: #000; }
        
        .message-name {
            font-size: 13px;
            font-weight: 600;
        }
        .message-time {
            font-size: 11px;
            color: var(--text-dim);
            margin-left: auto;
        }
        .message-content {
            background: rgba(255,255,255,0.05);
            padding: 12px 15px;
            border-radius: 12px;
            font-size: 13px;
            line-height: 1.6;
        }
        
        .doc-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-top: 15px;
        }
        .doc-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            padding: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .doc-card:hover {
            background: rgba(255,255,255,0.08);
            border-color: var(--accent);
        }
        .doc-card .doc-title {
            font-size: 12px;
            font-weight: 600;
            color: var(--accent);
            margin-bottom: 5px;
        }
        .doc-card .doc-speaker {
            font-size: 11px;
            color: var(--text-dim);
        }
        .doc-card .doc-summary {
            font-size: 11px;
            color: var(--text-dim);
            margin-top: 8px;
            line-height: 1.5;
        }
        .doc-card .doc-key {
            font-size: 11px;
            color: var(--success);
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: var(--secondary);
            border-radius: 16px;
            width: 90%;
            max-width: 900px;
            max-height: 85vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .modal-header {
            padding: 20px;
            background: rgba(0,0,0,0.2);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .modal-header h2 {
            font-size: 6px;
        }
        .modal-close {
            background: none;
            border: none;
            color: var(--text-dim);
            font-size: 24px;
            cursor: pointer;
        }
        .modal-body {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            font-size: 13px;
            line-height: 1.8;
        }
        
        .slider-group {
            background: rgba(0,0,0,0.2);
            border-radius: 8px;
            padding: 15px;
            margin: 15px 0;
        }
        .slider-group h4 {
            color: var(--accent);
            margin-bottom: 15px;
            font-size: 14px;
        }
        .sim-row {
            display: flex;
            align-items: center;
            margin: 10px 0;
        }
        .sim-label {
            width: 100px;
            font-size: 13px;
        }
        .sim-slider {
            flex: 1;
            -webkit-appearance: none;
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 3px;
            margin: 0 10px;
        }
        .sim-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 6px;
            height: 6px;
            background: var(--accent);
            border-radius: 50%;
            cursor: pointer;
        }
        .sim-value {
            width: 60px;
            text-align: right;
            font-size: 13px;
            font-weight: 600;
        }
        .result-box {
            background: rgba(0,217,165,0.1);
            border: 1px solid rgba(0,217,165,0.3);
            border-radius: 8px;
            padding: 15px;
            margin-top: 15px;
        }
        .result-box h4 {
            color: var(--success);
            margin-bottom: 10px;
        }
        .result-row {
            display: flex;
            justify-content: space-between;
            padding: 5px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .result-row:last-child {
            border-bottom: none;
            font-weight: 600;
            color: var(--success);
        }
        
        .timeline {
            margin: 20px 0;
        }
        .timeline-item {
            display: flex;
            margin-bottom: 15px;
        }
        .timeline-date {
            width: 80px;
            font-size: 12px;
            color: var(--accent);
            font-weight: 600;
        }
        .timeline-content {
            flex: 1;
            padding-left: 15px;
            border-left: 2px solid rgba(255,255,255,0.1);
        }
        .timeline-content h4 {
            font-size: 13px;
            margin-bottom: 5px;
        }
        .timeline-content p {
            font-size: 12px;
            color: var(--text-dim);
        }
        .timeline-content .status {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 10px;
            margin-top: 5px;
        }
        .status-done { background: rgba(0,217,165,0.2); color: var(--success); }
        .status-progress { background: rgba(255,193,7,0.2); color: var(--warning); }
        .status-pending { background: rgba(255,255,255,0.1); color: var(--text-dim); }
        
        .risk-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
        }
        .risk-table th, .risk-table td {
            padding: 8px 10px;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .risk-high { color: var(--accent); }
        .risk-medium { color: var(--warning); }
        
        .budget-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin: 15px 0;
        }
        .budget-item {
            background: rgba(0,0,0,0.2);
            border-radius: 8px;
            padding: 12px;
            text-align: center;
        }
        .budget-item .amount {
            font-size: 6px;
            font-weight: bold;
            color: var(--success);
        }
        .budget-item .channel {
            font-size: 12px;
            color: var(--text-dim);
        }
        .budget-item .percent {
            font-size: 11px;
            color: var(--accent);
        }
    </style>
</head>
<body>

        <h1>

    <div class="stats-grid">

    <div class="main-content">

                <div class="tab" onclick="switchTab(this, 'timeline')">📅 时间</div>
                <div class="tab" onclick="switchTab(this, 'risk')">⚠️ 风险</div>

        </div>

    <script>

        // HTML转义函数 - 防止XSS攻击
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function showDoc(id) {
            const d = docs[id];
            document.getElementById('modalTitle').textContent = d.title;
            document.getElementById('modalBody').innerHTML = `
                <h3 style="color: var(--accent); margin-bottom: 15px;">${escapeHtml(d.title)}</h3>
                <p style="color: var(--text-dim); margin-bottom: 15px;">发言人：${escapeHtml(d.speaker)}</p>
                <h4 style="color: var(--success); margin-bottom: 10px;">核心摘要</h4>
                <p style="line-height: 1.8; margin-bottom: 20px;">${escapeHtml(d.summary)}</p>
                <h4 style="color: var(--warning); margin-bottom: 10px;">关键决策</h4>
                <div style="background: rgba(255,193,7,0.1); padding: 15px; border-radius: 8px; border-left: 3px solid var(--warning);">
                    ${escapeHtml(d.key_decision)}
                </div>
            `;
            document.getElementById('modal').classList.add('active');
        }
        
        function closeModal() {
            document.getElementById('modal').classList.remove('active');
        }
        
        function updateSim() {
            // 获取滑块值
            var xhsExp = parseFloat(document.getElementById('xhsExposure').value);
            var xhsCTR = parseFloat(document.getElementById('xhsCTR').value) / 100;
            var xhsCVR = parseFloat(document.getElementById('xhsCVR').value) / 100;
            var dyExp = parseFloat(document.getElementById('dyExposure').value);
            var dyCTR = parseFloat(document.getElementById('dyCTR').value) / 100;
            var dyCVR = parseFloat(document.getElementById('dyCVR').value) / 100;
            var ecExp = parseFloat(document.getElementById('ecExposure').value);
            var ecCart = parseFloat(document.getElementById('ecCart').value) / 100;
            var ecCVR = parseFloat(document.getElementById('ecCVR').value) / 100;

            // 更新滑块显示值
            document.getElementById('xhsExposureVal').textContent = xhsExp;
            document.getElementById('xhsCTRVal').textContent = xhsCTR * 100 + '%';
            document.getElementById('xhsCVRVal').textContent = xhsCVR * 100 + '%';
            document.getElementById('dyExposureVal').textContent = dyExp;
            document.getElementById('dyCTRVal').textContent = dyCTR * 100 + '%';
            document.getElementById('dyCVRVal').textContent = dyCVR * 100 + '%';
            document.getElementById('ecExposureVal').textContent = ecExp;
            document.getElementById('ecCartVal').textContent = ecCart * 100 + '%';
            document.getElementById('ecCVRVal').textContent = ecCVR * 100 + '%';

            // 计算销量
            var xhsQty = xhsExp * 10000 * 0.45 * xhsCTR * 0.15 * xhsCVR;
            var dyQty = dyExp * 10000 * 0.6 * dyCTR * dyCVR;
            var ecQty = ecExp * 10000 * 0.15 * ecCart * ecCVR;
            var totalQty = xhsQty + dyQty + ecQty;

            // 更新模拟器结果
            document.getElementById('simXHSQty').textContent = '约' + Math.round(xhsQty).toLocaleString() + '台';
            document.getElementById('simDYQty').textContent = '约' + Math.round(dyQty).toLocaleString() + '台';
            document.getElementById('simECQty').textContent = '约' + Math.round(ecQty).toLocaleString() + '台';
            document.getElementById('simTotalQty').textContent = '约' + Math.round(totalQty).toLocaleString() + '台';
            document.getElementById('simTotalRevenue').textContent = '约' + Math.round(totalQty * 999 / 10000) + '万元';

            // 如果漏斗tab存在，更新漏斗结果（实时同步）
            var xhsFunnelResult = document.getElementById('xhsFunnelResult');
            var dyFunnelResult = document.getElementById('dyFunnelResult');
            var ecFunnelResult = document.getElementById('ecFunnelResult');
            if (xhsFunnelResult) {
                xhsFunnelResult.textContent = '预估：约' + Math.round(xhsQty).toLocaleString() + '台 | 营业额：约' + (xhsQty * 999 / 10000).toFixed(1) + '万元';
            }
            if (dyFunnelResult) {
                dyFunnelResult.textContent = '预估：约' + Math.round(dyQty).toLocaleString() + '台 | 营业额：约' + (dyQty * 999 / 10000).toFixed(1) + '万元';
            }
            if (ecFunnelResult) {
                ecFunnelResult.textContent = '预估：约' + Math.round(ecQty).toLocaleString() + '台 | 营业额：约' + (ecQty * 999 / 10000).toFixed(1) + '万元';
            }
        }

    </script>
