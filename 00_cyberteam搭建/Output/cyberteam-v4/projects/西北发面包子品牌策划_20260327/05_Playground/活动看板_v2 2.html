<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>西北发面包子品牌 - Playground v2</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #1a1a2e;
            --secondary: #16213e;
            --accent: #e94560;
            --success: #00d9a5;
            --warning: #ffc107;
            --text: #ffffff;
            --text-dim: rgba(255,255,255,0.6);
            --baozi-gold: #D4A853;
            --baozi-white: #F5F0E8;
            --baozi-red: #C53D43;
            --baozi-green: #4A7C59;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--primary);
            color: var(--text);
            min-height: 100vh;
        }

        .header {
            background: linear-gradient(135deg, var(--secondary), var(--primary));
            padding: 20px 30px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .header h1 {
            font-size: 24px;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .header .subtitle {
            color: var(--text-dim);
            font-size: 14px;
        }
        .badge {
            background: var(--baozi-gold);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            color: #1a1a2e;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            padding: 20px 30px;
        }
        .stat-card {
            background: var(--secondary);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .stat-card .value {
            font-size: 32px;
            font-weight: bold;
            color: var(--baozi-gold);
        }
        .stat-card .label {
            color: var(--text-dim);
            font-size: 13px;
            margin-top: 5px;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 400px;
            gap: 20px;
            padding: 0 30px 30px;
            height: calc(100vh - 200px);
        }

        .left-panel {
            background: var(--secondary);
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .tabs {
            display: flex;
            background: rgba(0,0,0,0.2);
            padding: 10px 10px 0;
            overflow-x: auto;
        }
        .tab {
            padding: 10px 16px;
            cursor: pointer;
            border-radius: 8px 8px 0 0;
            font-size: 13px;
            color: var(--text-dim);
            transition: all 0.2s;
            white-space: nowrap;
        }
        .tab:hover { color: var(--text); }
        .tab.active {
            background: var(--secondary);
            color: var(--baozi-gold);
            font-weight: 600;
        }
        .tab-content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .content-section h3 {
            color: var(--baozi-gold);
            margin-bottom: 15px;
            font-size: 16px;
        }
        .content-section h4 {
            color: var(--text);
            margin: 15px 0 10px;
            font-size: 14px;
        }

        .kpi-table {
            width: 100%;
            border-collapse: collapse;
            margin: 15px 0;
            font-size: 13px;
        }
        .kpi-table th, .kpi-table td {
            padding: 10px 12px;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .kpi-table th {
            background: rgba(0,0,0,0.2);
            color: var(--baozi-gold);
        }

        .funnel-container {
            margin: 20px 0;
            padding: 15px;
            background: rgba(0,0,0,0.2);
            border-radius: 8px;
        }
        .funnel-container h4 {
            color: var(--baozi-gold);
            margin-bottom: 15px;
        }
        .funnel-stage {
            display: flex;
            align-items: center;
            margin: 10px 0;
        }
        .funnel-label {
            width: 120px;
            font-size: 12px;
            color: var(--text-dim);
        }
        .funnel-bar {
            height: 20px;
            background: linear-gradient(90deg, var(--baozi-gold), #e8c170);
            border-radius: 4px;
            position: relative;
            transition: width 0.5s;
            min-width: 10px;
        }
        .funnel-value {
            margin-left: 15px;
            font-size: 12px;
            color: var(--text);
            min-width: 80px;
        }
        .funnel-result {
            margin-top: 15px;
            padding: 10px;
            background: rgba(212,168,83,0.1);
            border-radius: 6px;
            font-size: 13px;
            color: var(--baozi-gold);
            text-align: center;
        }
        .funnel-total {
            margin-top: 20px;
            padding: 15px;
            background: rgba(212,168,83,0.2);
            border: 1px solid var(--baozi-gold);
            border-radius: 8px;
            display: flex;
            justify-content: space-around;
            font-size: 14px;
            font-weight: bold;
        }

        .formula-box {
            background: rgba(0,0,0,0.3);
            border-radius: 8px;
            padding: 15px;
            margin: 15px 0;
            font-family: 'Monaco', 'Menlo', monospace;
            font-size: 12px;
            line-height: 1.8;
            white-space: pre-wrap;
            color: var(--baozi-gold);
            border: 1px solid rgba(212,168,83,0.2);
        }

        .right-panel {
            background: var(--secondary);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .chat-header {
            padding: 15px 20px;
            background: rgba(0,0,0,0.2);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .chat-header .dot {
            width: 10px;
            height: 10px;
            background: var(--success);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
        }
        .message {
            margin-bottom: 15px;
            animation: fadeIn 0.3s;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .message-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 5px;
        }
        .message-avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
        }
        .avatar-ceo { background: var(--accent); }
        .avatar-coo { background: #9c27b0; }
        .avatar-expert { background: #2196f3; }
        .avatar-risk { background: var(--warning); color: #000; }

        .message-name {
            font-size: 13px;
            font-weight: 600;
        }
        .message-time {
            font-size: 11px;
            color: var(--text-dim);
            margin-left: auto;
        }
        .message-content {
            background: rgba(255,255,255,0.05);
            padding: 12px 15px;
            border-radius: 12px;
            font-size: 13px;
            line-height: 1.6;
        }

        .doc-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-top: 15px;
        }
        .doc-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            padding: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .doc-card:hover {
            background: rgba(255,255,255,0.08);
            border-color: var(--baozi-gold);
        }
        .doc-card .doc-title {
            font-size: 12px;
            font-weight: 600;
            color: var(--baozi-gold);
            margin-bottom: 5px;
        }
        .doc-card .doc-speaker {
            font-size: 11px;
            color: var(--text-dim);
        }
        .doc-card .doc-summary {
            font-size: 11px;
            color: var(--text-dim);
            margin-top: 8px;
            line-height: 1.5;
        }
        .doc-card .doc-key {
            font-size: 11px;
            color: var(--success);
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: var(--secondary);
            border-radius: 16px;
            width: 90%;
            max-width: 900px;
            max-height: 85vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .modal-header {
            padding: 20px;
            background: rgba(0,0,0,0.2);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .modal-header h2 {
            font-size: 18px;
        }
        .modal-close {
            background: none;
            border: none;
            color: var(--text-dim);
            font-size: 24px;
            cursor: pointer;
        }
        .modal-body {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            font-size: 13px;
            line-height: 1.8;
        }

        .slider-group {
            background: rgba(0,0,0,0.2);
            border-radius: 8px;
            padding: 15px;
            margin: 15px 0;
        }
        .slider-group h4 {
            color: var(--baozi-gold);
            margin-bottom: 15px;
            font-size: 14px;
        }
        .sim-row {
            display: flex;
            align-items: center;
            margin: 10px 0;
        }
        .sim-label {
            width: 100px;
            font-size: 13px;
        }
        .sim-slider {
            flex: 1;
            -webkit-appearance: none;
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 3px;
            margin: 0 10px;
        }
        .sim-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            background: var(--baozi-gold);
            border-radius: 50%;
            cursor: pointer;
        }
        .sim-value {
            width: 60px;
            text-align: right;
            font-size: 13px;
            font-weight: 600;
        }
        .result-box {
            background: rgba(212,168,83,0.1);
            border: 1px solid rgba(212,168,83,0.3);
            border-radius: 8px;
            padding: 15px;
            margin-top: 15px;
        }
        .result-box h4 {
            color: var(--baozi-gold);
            margin-bottom: 10px;
        }
        .result-row {
            display: flex;
            justify-content: space-between;
            padding: 5px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .result-row:last-child {
            border-bottom: none;
            font-weight: 600;
            color: var(--baozi-gold);
        }

        .timeline {
            margin: 20px 0;
        }
        .timeline-item {
            display: flex;
            margin-bottom: 15px;
        }
        .timeline-date {
            width: 80px;
            font-size: 12px;
            color: var(--baozi-gold);
            font-weight: 600;
        }
        .timeline-content {
            flex: 1;
            padding-left: 15px;
            border-left: 2px solid rgba(255,255,255,0.1);
        }
        .timeline-content h4 {
            font-size: 13px;
            margin-bottom: 5px;
        }
        .timeline-content p {
            font-size: 12px;
            color: var(--text-dim);
        }
        .timeline-content .status {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 10px;
            margin-top: 5px;
        }
        .status-done { background: rgba(0,217,165,0.2); color: var(--success); }
        .status-progress { background: rgba(255,193,7,0.2); color: var(--warning); }
        .status-pending { background: rgba(255,255,255,0.1); color: var(--text-dim); }

        .risk-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
        }
        .risk-table th, .risk-table td {
            padding: 8px 10px;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .risk-high { color: var(--accent); }
        .risk-medium { color: var(--warning); }

        .budget-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin: 15px 0;
        }
        .budget-item {
            background: rgba(0,0,0,0.2);
            border-radius: 8px;
            padding: 12px;
            text-align: center;
        }
        .budget-item .amount {
            font-size: 18px;
            font-weight: bold;
            color: var(--baozi-gold);
        }
        .budget-item .channel {
            font-size: 12px;
            color: var(--text-dim);
        }
        .budget-item .percent {
            font-size: 11px;
            color: var(--baozi-gold);
        }

        .time-slot {
            display: flex;
            align-items: center;
            margin: 8px 0;
            padding: 10px;
            background: rgba(0,0,0,0.2);
            border-radius: 8px;
        }
        .time-slot-label {
            width: 100px;
            font-size: 12px;
            font-weight: 600;
            color: var(--baozi-gold);
        }
        .time-slot-bar {
            flex: 1;
            height: 16px;
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
            margin: 0 10px;
            overflow: hidden;
        }
        .time-slot-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--baozi-gold), var(--baozi-red));
            border-radius: 4px;
            transition: width 0.3s;
        }
        .time-slot-value {
            width: 80px;
            font-size: 12px;
            text-align: right;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>
            <span>🥟</span>
            西北发面包子品牌策划
            <span class="badge">Playground v2</span>
        </h1>
        <div class="subtitle">
            位置：深圳海岸城 | 面积：200㎡ | 座位：46座 |
            目标客单价：40-50元 | 月营收：28万+
        </div>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <div class="value">46座</div>
            <div class="label">推荐座位数</div>
        </div>
        <div class="stat-card">
            <div class="value">28万+</div>
            <div class="label">月营收预测</div>
        </div>
        <div class="stat-card">
            <div class="value">18款</div>
            <div class="label">SKU规划</div>
        </div>
        <div class="stat-card">
            <div class="value">8/10</div>
            <div class="label">方案评分</div>
        </div>
    </div>

    <div class="main-content">
        <div class="left-panel">
            <div class="tabs">
                <div class="tab active" onclick="switchTab(this, 'overview')">📊 概览</div>
                <div class="tab" onclick="switchTab(this, 'formula')">📐 公式</div>
                <div class="tab" onclick="switchTab(this, 'funnel')">📊 漏斗</div>
                <div class="tab" onclick="switchTab(this, 'timeline')">📅 时段</div>
                <div class="tab" onclick="switchTab(this, 'risk')">⚠️ 风险</div>
                <div class="tab" onclick="switchTab(this, 'budget')">💰 预算</div>
                <div class="tab" onclick="switchTab(this, 'simulator')">🧮 模拟</div>
            </div>
            <div class="tab-content" id="tabContent">
            </div>
        </div>

        <div class="right-panel">
            <div class="chat-header">
                <div class="dot"></div>
                <span>核心观点与决策</span>
            </div>
            <div class="chat-messages" id="chatMessages">
            </div>
        </div>
    </div>

    <div class="modal" id="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">文档详情</h2>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body" id="modalBody">
            </div>
        </div>
    </div>

    <script>
        const docs = {
            "doc1": {
                "title": "对话_01_CEO对齐",
                "speaker": "CEO + COO",
                "summary": "CEO与COO战略对齐：西北发面包子品牌策划，北极星指标月营收28万+，海岸城商圈面点品类空白（仅占10%），无强势品牌，风险偏好平衡型。",
                "key_decision": "目标：月营收28万+ | 座位：46座 | 定位：发面包子专门店"
            },
            "doc2": {
                "title": "对话_02_策略讨论",
                "speaker": "COO主持 + 3位专家",
                "summary": "专家多轮讨论，确定核心卖点：馅料实在、品种丰富、明档体验。核心人群25-40岁都市白领，午餐刚需。时段策略：早餐精简SKU外带、午餐全SKU堂食、下午茶场景延伸。",
                "key_decision": "卖点：馅料实在+品种多+明档 | 人群：25-40岁白领 | 场景：全时段运营"
            },
            "doc3": {
                "title": "对话_03_风险预案",
                "speaker": "COO主持 + 3位专家",
                "summary": "识别5大风险，最高优先级：翻台率不及预期(R2)、成本上涨(R4)。三层响应：第一层优化动线推外卖，第二层调整价格带，第三层收缩SKU聚焦爆款。",
                "key_decision": "预警：翻台<2次→推外卖 | 成本涨>20%→调整定价 | 客流不足→收缩SKU"
            },
            "doc4": {
                "title": "对话_04_CEO汇报",
                "speaker": "COO汇报 + CEO审批",
                "summary": "COO向CEO汇报完整方案：200平完全可行（46座），月营收28万+，投资回报12-18个月。CEO最终决策：批准执行，分层目标保守16.8万/正常28.3万/乐观42.1万。",
                "key_decision": "分层目标：保守16.8万/正常28.3万/乐观42.1万 | 盈亏平衡：25万/月"
            },
            "doc5": {
                "title": "CEO审核意见",
                "speaker": "CEO",
                "summary": "CEO审核四层对话：流程合规9分、讨论深度8分、思维注入8分、风险管控8分、产品策略9分、可落地性9分。综合评分8/10，批准执行。",
                "key_decision": "综合评分：8/10 | 批准执行 | 建议：补充VI设计、供应链锁定"
            },
            "doc6": {
                "title": "市场分析报告",
                "speaker": "市场分析专家",
                "summary": "海岸城面点品类仅占10%且无强势品牌，为最佳进入时机。差异化机会：西北风味+品质升级+明档体验。客流特征：早7-9早餐峰、午11-14午餐峰、晚17-21晚餐峰。",
                "key_decision": "时机：★★★★★极佳 | 空白：面点品类无强势品牌 | 差异化：西北风味+明档"
            },
            "doc7": {
                "title": "品牌定位报告",
                "speaker": "品牌定位专家",
                "summary": "品牌定位：发面包子专门店（非传统包子铺）。Slogan：一笼好包，馅满情足。人群：P0核心25-40岁白领、P1家庭消费者、P2年轻尝鲜族。场景：早餐外带+午餐堂食+下午茶延伸+晚餐稳定。",
                "key_decision": "定位：发面包子专门店 | Slogan：一笼好包，馅满情足 | 人群：白领午餐刚需"
            },
            "doc8": {
                "title": "产品策略报告",
                "speaker": "产品策略专家",
                "summary": "18个SKU金字塔结构：招牌款5款（鲜肉、牛肉、蟹黄、虾仁、羊肉）、经典款8款、季节款2-3款。价格带：引流款5-8元(15%)、主力款10-15元(55%)、价值款16-22元(25%)、形象款25-35元(5%)。",
                "key_decision": "18 SKU | 招牌5款+经典8款+季节款 | 价格带：5-35元 | 客单价：40-50元"
            }
        };

        function switchTab(tab, id) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');

            const content = document.getElementById('tabContent');
            let html = '';

            switch(id) {
                case 'overview':
                    html = `
                        <div class="content-section">
                            <h3>🎯 品牌核心策略</h3>

        // HTML转义函数 - 防止XSS攻击
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function showDoc(id) {
            const d = docs[id];
            document.getElementById('modalTitle').textContent = d.title;
            document.getElementById('modalBody').innerHTML = `
                <h3 style="color: var(--baozi-gold); margin-bottom: 15px;">${escapeHtml(d.title)}</h3>
                <p style="color: var(--text-dim); margin-bottom: 15px;">发言人：${escapeHtml(d.speaker)}</p>
                <h4 style="color: var(--success); margin-bottom: 10px;">核心摘要</h4>
                <p style="line-height: 1.8; margin-bottom: 20px;">${escapeHtml(d.summary)}</p>
                <h4 style="color: var(--warning); margin-bottom: 10px;">关键决策</h4>
                <div style="background: rgba(255,193,7,0.1); padding: 15px; border-radius: 8px; border-left: 3px solid var(--warning);">
                    ${escapeHtml(d.key_decision)}
                </div>
            `;
            document.getElementById('modal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
        }

        function updateSim() {
            var breakfast客人 = parseFloat(document.getElementById('breakfast客人').value);
            var breakfast转化 = parseFloat(document.getElementById('breakfast转化').value) / 100;
            var lunch客人 = parseFloat(document.getElementById('lunch客人').value);
            var lunch转化 = parseFloat(document.getElementById('lunch转化').value) / 100;
            var dinner客人 = parseFloat(document.getElementById('dinner客人').value);
            var dinner转化 = parseFloat(document.getElementById('dinner转化').value) / 100;

            document.getElementById('breakfast客人Val').textContent = breakfast客人;
            document.getElementById('breakfast转化Val').textContent = breakfast转化 * 100 + '%';
            document.getElementById('lunch客人Val').textContent = lunch客人;
            document.getElementById('lunch转化Val').textContent = lunch转化 * 100 + '%';
            document.getElementById('dinner客人Val').textContent = dinner客人;
            document.getElementById('dinner转化Val').textContent = dinner转化 * 100 + '%';

            var breakfastResult = breakfast客人 * breakfast转化 * 3 * 30 * 25;
            var lunchResult = lunch客人 * lunch转化 * 2.5 * 30 * 45;
            var dinnerResult = dinner客人 * dinner转化 * 1.8 * 30 * 50;
            var otherResult = 50000;
            var totalResult = breakfastResult + lunchResult + dinnerResult + otherResult;

            document.getElementById('simBreakfast').textContent = '约' + (breakfastResult/10000).toFixed(1) + '万/月';
            document.getElementById('simLunch').textContent = '约' + (lunchResult/10000).toFixed(1) + '万/月';
            document.getElementById('simDinner').textContent = '约' + (dinnerResult/10000).toFixed(1) + '万/月';
            document.getElementById('simOther').textContent = '约' + (otherResult/10000).toFixed(1) + '万/月';
            document.getElementById('simTotal').textContent = '约' + (totalResult/10000).toFixed(1) + '万/月';
            document.getElementById('simYear').textContent = '约' + (totalResult/10000*12).toFixed(0) + '万/年';

            var breakfastFunnelResult = document.getElementById('breakfastFunnelResult');
            var lunchFunnelResult = document.getElementById('lunchFunnelResult');
            var dinnerFunnelResult = document.getElementById('dinnerFunnelResult');
            if (breakfastFunnelResult) {
                breakfastFunnelResult.textContent = '早餐营收：约' + (breakfastResult/10000).toFixed(1) + '万元/月';
            }
            if (lunchFunnelResult) {
                lunchFunnelResult.textContent = '午餐营收：约' + (lunchResult/10000).toFixed(1) + '万元/月';
            }
            if (dinnerFunnelResult) {
                dinnerFunnelResult.textContent = '晚餐营收：约' + (dinnerResult/10000).toFixed(1) + '万元/月';
            }
        }
