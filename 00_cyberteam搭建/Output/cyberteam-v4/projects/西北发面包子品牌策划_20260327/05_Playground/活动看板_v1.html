<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>西北发面包子品牌 - Playground v1</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #1a1a2e;
            --secondary: #16213e;
            --accent: #e94560;
            --success: #00d9a5;
            --warning: #ffc107;
            --text: #ffffff;
            --text-dim: rgba(255,255,255,0.6);
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--primary);
            color: var(--text);
            min-height: 100vh;
        }

        .header {
            background: linear-gradient(135deg, var(--secondary), var(--primary));
            padding: 20px 30px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .header h1 {
            font-size: 24px;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .header .subtitle { color: var(--text-dim); font-size: 14px; }
        .badge {
            background: var(--accent);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            padding: 20px 30px;
        }
        .stat-card {
            background: var(--secondary);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .stat-card .value { font-size: 32px; font-weight: bold; color: var(--success); }
        .stat-card .label { color: var(--text-dim); font-size: 13px; margin-top: 5px; }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 400px;
            gap: 20px;
            padding: 0 30px 30px;
            height: calc(100vh - 200px);
        }

        .left-panel {
            background: var(--secondary);
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .tabs {
            display: flex;
            background: rgba(0,0,0,0.2);
            padding: 10px 10px 0;
            overflow-x: auto;
        }
        .tab {
            padding: 10px 16px;
            cursor: pointer;
            border-radius: 8px 8px 0 0;
            font-size: 13px;
            color: var(--text-dim);
            transition: all 0.2s;
            white-space: nowrap;
        }
        .tab:hover { color: var(--text); }
        .tab.active { background: var(--secondary); color: var(--accent); font-weight: 600; }
        .tab-content { flex: 1; overflow-y: auto; padding: 20px; }

        .right-panel {
            background: var(--secondary);
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .chat-header {
            padding: 15px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            font-weight: 600;
        }
        .chat-messages { flex: 1; overflow-y: auto; padding: 15px 20px; }

        .message { margin-bottom: 15px; }
        .message-header { display: flex; align-items: center; gap: 10px; margin-bottom: 5px; }
        .message-avatar {
            width: 28px; height: 28px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 12px; font-weight: bold;
        }
        .avatar-ceo { background: var(--accent); }
        .avatar-coo { background: #4a90d9; }
        .avatar-expert { background: var(--success); color: var(--primary); }
        .avatar-risk { background: var(--warning); color: var(--primary); }
        .message-name { font-size: 13px; font-weight: 600; }
        .message-time { font-size: 11px; color: var(--text-dim); }
        .message-content { font-size: 13px; line-height: 1.6; color: var(--text-dim); padding-left: 38px; }

        .content-section h3 { color: var(--accent); margin-bottom: 15px; font-size: 16px; }
        .content-section h4 { color: var(--text); margin: 15px 0 10px; font-size: 14px; }

        .kpi-table { width: 100%; border-collapse: collapse; margin: 15px 0; font-size: 13px; }
        .kpi-table th, .kpi-table td {
            padding: 10px 12px; text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .kpi-table th { background: rgba(0,0,0,0.2); color: var(--accent); }

        .funnel-container { margin: 20px 0; padding: 15px; background: rgba(0,0,0,0.2); border-radius: 8px; }
        .funnel-container h4 { color: var(--accent); margin-bottom: 15px; }
        .funnel-stage { display: flex; align-items: center; margin: 10px 0; }
        .funnel-label { width: 100px; font-size: 12px; color: var(--text-dim); }
        .funnel-bar { height: 20px; background: var(--accent); border-radius: 3px; transition: width 0.3s; }
        .funnel-value { margin-left: 10px; font-size: 12px; color: var(--text); }
        .funnel-result { margin-top: 10px; padding: 10px; background: rgba(0,217,165,0.1); border-radius: 5px; font-size: 12px; color: var(--success); }

        .risk-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .risk-card { background: rgba(0,0,0,0.2); padding: 12px; border-radius: 8px; border-left: 3px solid var(--warning); }
        .risk-card.critical { border-left-color: var(--accent); }
        .risk-card .risk-title { font-size: 12px; font-weight: 600; margin-bottom: 5px; }
        .risk-card .risk-desc { font-size: 11px; color: var(--text-dim); }

        .budget-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .budget-label { color: var(--text-dim); font-size: 13px; }
        .budget-value { font-weight: 600; font-size: 13px; }

        .doc-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .doc-card {
            background: rgba(0,0,0,0.2); padding: 12px; border-radius: 8px;
            cursor: pointer; transition: all 0.2s;
        }
        .doc-card:hover { background: rgba(255,255,255,0.05); }
        .doc-title { font-size: 12px; font-weight: 600; color: var(--accent); margin-bottom: 5px; }
        .doc-speaker { font-size: 10px; color: var(--text-dim); margin-bottom: 5px; }
        .doc-summary { font-size: 11px; color: var(--text-dim); line-height: 1.5; }
        .doc-key { font-size: 10px; color: var(--success); margin-top: 5px; }

        .simulator { background: rgba(0,0,0,0.2); padding: 15px; border-radius: 8px; margin-top: 15px; }
        .sim-slider { width: 100%; margin: 10px 0; }
        .sim-result { margin-top: 15px; padding: 10px; background: rgba(0,217,165,0.1); border-radius: 5px; }

        .modal {
            display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8); z-index: 1000;
            align-items: center; justify-content: center;
        }
        .modal.show { display: flex; }
        .modal-content {
            background: var(--secondary); border-radius: 12px;
            max-width: 600px; width: 90%; max-height: 80vh; overflow-y: auto;
            padding: 30px;
        }
        .modal-close {
            position: absolute; top: 20px; right: 20px;
            background: none; border: none; color: var(--text-dim);
            font-size: 24px; cursor: pointer;
        }
        .btn { padding: 8px 16px; border-radius: 6px; border: none; cursor: pointer; font-size: 13px; }
        .btn-primary { background: var(--accent); color: white; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🥟 <span id="projectName">西北发面包子品牌</span> <span class="badge">Playground v1</span></h1>
        <div class="subtitle">深圳海岸城 | 200m² | 中式面点 | CyberTeam V4 策划方案</div>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <div class="value" id="statRevenue">¥10,000</div>
            <div class="label">目标日均营收</div>
        </div>
        <div class="stat-card">
            <div class="value" id="statGuestPrice">¥30</div>
            <div class="label">目标客单价</div>
        </div>
        <div class="stat-card">
            <div class="value" id="statTurnover">3.5次</div>
            <div class="label">目标翻台率</div>
        </div>
        <div class="stat-card">
            <div class="value" id="statRepurchase">40%+</div>
            <div class="label">目标复购率</div>
        </div>
    </div>

    <div class="main-content">
        <div class="left-panel">
            <div class="tabs">
                <div class="tab active" onclick="switchTab(this, 'overview')">📊 概览</div>
                <div class="tab" onclick="switchTab(this, 'formula')">📐 公式</div>
                <div class="tab" onclick="switchTab(this, 'funnel')">📉 漏斗</div>
                <div class="tab" onclick="switchTab(this, 'time')">⏰ 时段</div>
                <div class="tab" onclick="switchTab(this, 'risk')">⚠️ 风险</div>
                <div class="tab" onclick="switchTab(this, 'budget')">💰 预算</div>
                <div class="tab" onclick="switchTab(this, 'simulator')">🧮 模拟</div>
            </div>
            <div class="tab-content" id="tabContent"></div>
        </div>

        <div class="right-panel">
            <div class="chat-header">💬 Agent 对话</div>
            <div class="chat-messages" id="chatMessages"></div>
        </div>
    </div>

    <div class="modal" id="docModal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeModal()">×</button>
            <h2 id="modalTitle"></h2>
            <div id="modalBody" style="margin-top: 20px;"></div>
        </div>
    </div>

    <script>
        // 项目数据
        const projectData = {
            name: "西北发面包子品牌",
            location: "深圳海岸城",
            area: "200m²",
            target: {
                dailyRevenue: 10000,
                guestPrice: 30,
                turnover: 3.5,
                repurchase: 0.4
            },
            funnel: {
                passby: 2000,      // 路过人数/天
                entry: 200,        // 入店人数
                ordering: 150,      // 点餐人数
                checkout: 130      // 成交人数
            },
            timeSlots: {
                breakfast: { hours: '7-9', passby: 800, entryRate: 0.08, avgSpend: 20 },
                lunch: { hours: '11-14', passby: 600, entryRate: 0.15, avgSpend: 35 },
                dinner: { hours: '17-21', passby: 600, entryRate: 0.12, avgSpend: 40 }
            },
            budget: {
               装修: 300000,
               设备: 150000,
               首批原料: 50000,
               营销推广: 80000,
               流动资金: 100000,
                total: 680000
            },
            risks: [
                { level: 'critical', title: 'R1: 客流不足', desc: '海岸城早高峰竞争激烈' },
                { level: 'high', title: 'R2: 翻台率低', desc: '座位利用率不足' },
                { level: 'medium', title: 'R3: 复购率低', desc: '产品缺乏差异化' },
                { level: 'medium', title: 'R4: 成本超支', desc: '装修/原料成本' }
            ]
        };

        // 文档内容
        const docs = {
            doc1: {
                title: '市场分析报告',
                speaker: '市场分析专家',
                summary: '海岸城商圈呈现"哑铃型"结构，面点主食类业态仅占10%，且无强势品牌。面点主食类业态占比仅10%，且无强势品牌，市场存在显著空白。',
                key: '面点主食仅占10%市场 | 无强势品牌 | 品类升级窗口期'
            },
            doc2: {
                title: '品牌定位报告',
                speaker: '品牌策略专家',
                summary: '核心定位：城市中产的"早餐救星"。主打"现场制作、馅料丰富、品种多样"。差异化：品质感+烟火气+情感连接。',
                key: '定位：城市中产早餐 | 核心：品质+丰富+现场'
            },
            doc3: {
                title: '产品策略报告',
                speaker: '产品策略专家',
                summary: '200平可支撑以包子为主的业态。主力SKU：发面包子12种+饮品4种+小菜4种。定价：客单价25-35元。核心卖点：皮薄馅大、现包现蒸。',
                key: '12种包子+4饮+4菜 | 客单价25-35元'
            },
            doc4: {
                title: '完整策划方案',
                speaker: 'CyberTeam V4',
                summary: '西北发面包子品牌完整策划方案。位置深圳海岸城，面积200m²，定位城市中产早餐。核心策略：明档现包+品种丰富+情感连接。',
                key: '开业时间：待定 | 营销：试吃+会员'
            }
        };

        function switchTab(tab, tabName) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            renderTab(tabName);
        }

        function renderTab(name) {
            const content = document.getElementById('tabContent');
            let html = '';

            switch(name) {
                case 'overview':
                    html = `
                        <div class="content-section">
                            <h3>📊 项目概览</h3>
                            <table class="kpi-table">
                                <tr><th>维度</th><th>内容</th></tr>
                                <tr><td>业态</td><td>中式面点/发面包子</td></tr>
                                <tr><td>面积</td><td>200m²（40-50座位）</td></tr>
                                <tr><td>位置</td><td>深圳海岸城商圈</td></tr>
                                <tr><td>定位</td><td>城市中产早餐/午餐</td></tr>
                                <tr><td>特色</td><td>现场制作、馅料丰富、品种多</td></tr>
                            </table>

                            <h4>🥟 主力产品线</h4>
                            <table class="kpi-table">
                                <tr><th>品类</th><th>SKU数</th><th>定价区间</th></tr>
                                <tr><td>发面包子</td><td>12种</td><td>8-15元/个</td></tr>
                                <tr><td>饮品</td><td>4种</td><td>5-10元</td></tr>
                                <tr><td>小菜</td><td>4种</td><td>3-8元</td></tr>
                            </table>
                            <p style="color: var(--text-dim); font-size: 12px; margin-top: 10px;">
                                * 目标客单价：25-35元 | 毛利率：65-70%
                            </p>
                        </div>
                    `;
                    break;

                case 'formula':
                    html = `
                        <div class="content-section">
                            <h3>📐 核心公式</h3>

                            <h4>🥟 营收公式</h4>
                            <div style="background: rgba(0,0,0,0.2); padding: 15px; border-radius: 8px; margin: 15px 0; font-family: monospace;">
                                日营收 = 客流 × 入店率 × 成交率 × 客单价 × 翻台率
                            </div>

                            <h4>📊 漏斗参数</h4>
                            <table class="kpi-table">
                                <tr><th>阶段</th><th>数值</th><th>转化率</th></tr>
                                <tr><td>路过客流</td><td>2000人/天</td><td>基准</td></tr>
                                <tr><td>入店</td><td>200人</td><td>10%</td></tr>
                                <tr><td>点餐</td><td>150人</td><td>75%</td></tr>
                                <tr><td>成交</td><td>130人</td><td>87%</td></tr>
                            </table>

                            <h4>⏰ 时段分解</h4>
                            <table class="kpi-table">
                                <tr><th>时段</th><th>路过</th><th>入店率</th><th>客单价</th></tr>
                                <tr><td>早餐(7-9)</td><td>800人</td><td>8%</td><td>¥20</td></tr>
                                <tr><td>午餐(11-14)</td><td>600人</td><td>15%</td><td>¥35</td></tr>
                                <tr><td>晚餐(17-21)</td><td>600人</td><td>12%</td><td>¥40</td></tr>
                            </table>
                        </div>
                    `;
                    break;

                case 'funnel':
                    html = `
                        <div class="content-section">
                            <h3>📉 客流漏斗（与模拟器一致）</h3>

                            <div class="funnel-container">
                                <h4>🥟 整体漏斗</h4>
                                <div class="funnel-stage">
                                    <span class="funnel-label">路过客流</span>
                                    <div class="funnel-bar" style="width: 100%;"></div>
                                    <span class="funnel-value" id="funnelPassby">2000人</span>
                                </div>
                                <div class="funnel-stage">
                                    <span class="funnel-label">入店(10%)</span>
                                    <div class="funnel-bar" style="width: 50%;"></div>
                                    <span class="funnel-value" id="funnelEntry">200人</span>
                                </div>
                                <div class="funnel-stage">
                                    <span class="funnel-label">点餐(75%)</span>
                                    <div class="funnel-bar" style="width: 37.5%;"></div>
                                    <span class="funnel-value" id="funnelOrder">150人</span>
                                </div>
                                <div class="funnel-stage">
                                    <span class="funnel-label">成交(87%)</span>
                                    <div class="funnel-bar" style="width: 32.6%; background: var(--success);"></div>
                                    <span class="funnel-value" style="color: var(--success);" id="funnelCheckout">130人</span>
                                </div>
                                <div class="funnel-result" id="funnelResult">
                                    预估日成交：130人 | 日营收：约¥3,900
                                </div>
                            </div>

                            <h4>⏰ 时段漏斗</h4>
                            <div class="funnel-container">
                                <h4>🌅 早餐(7-9点)</h4>
                                <div class="funnel-stage"><span class="funnel-label">路过</span><div class="funnel-bar" style="width: 100%;"></div><span class="funnel-value">800人</span></div>
                                <div class="funnel-stage"><span class="funnel-label">入店(8%)</span><div class="funnel-bar" style="width: 40%;"></div><span class="funnel-value">64人</span></div>
                                <div class="funnel-stage"><span class="funnel-label">成交</span><div class="funnel-bar" style="width: 30%; background: var(--success);"></div><span class="funnel-value" style="color: var(--success);">48人</span></div>
                                <div class="funnel-result">早餐营收：约¥960</div>
                            </div>
                            <div class="funnel-container">
                                <h4>☀️ 午餐(11-14点)</h4>
                                <div class="funnel-stage"><span class="funnel-label">路过</span><div class="funnel-bar" style="width: 100%;"></div><span class="funnel-value">600人</span></div>
                                <div class="funnel-stage"><span class="funnel-label">入店(15%)</span><div class="funnel-bar" style="width: 60%;"></div><span class="funnel-value">90人</span></div>
                                <div class="funnel-stage"><span class="funnel-label">成交</span><div class="funnel-bar" style="width: 45%; background: var(--success);"></div><span class="funnel-value" style="color: var(--success);">72人</span></div>
                                <div class="funnel-result">午餐营收：约¥2,520</div>
                            </div>
                        </div>
                    `;
                    break;

                case 'time':
                    html = `
                        <div class="content-section">
                            <h3>⏰ 时段分析</h3>

                            <table class="kpi-table">
                                <tr><th>时段</th><th>时间</th><th>路过</th><th>入店率</th><th>入店</th><th>客单价</th><th>营收</th></tr>
                                <tr><td>🌅 早餐</td><td>7-9点</td><td>800</td><td>8%</td><td>64</td><td>¥20</td><td>¥1,280</td></tr>
                                <tr><td>☀️ 午餐</td><td>11-14点</td><td>600</td><td>15%</td><td>90</td><td>¥35</td><td>¥3,150</td></tr>
                                <tr><td>🌙 晚餐</td><td>17-21点</td><td>600</td><td>12%</td><td>72</td><td>¥40</td><td>¥2,880</td></tr>
                            </table>

                            <h4>📊 时段占比</h4>
                            <div style="background: rgba(0,0,0,0.2); padding: 15px; border-radius: 8px;">
                                <p>早餐：19% | 午餐：47% | 晚餐：34%</p>
                                <p style="color: var(--text-dim); margin-top: 10px; font-size: 12px;">
                                    * 午餐是核心时段，占比近50%
                                </p>
                            </div>
                        </div>
                    `;
                    break;

                case 'risk':
                    html = `
                        <div class="content-section">
                            <h3>⚠️ 风险预案</h3>

                            <div class="risk-grid">
                                <div class="risk-card critical">
                                    <div class="risk-title">🔴 R1: 客流不足</div>
                                    <div class="risk-desc">早高峰竞争激烈，面点选择多。应对：加大早餐促销，强化"现包"差异化</div>
                                </div>
                                <div class="risk-card critical">
                                    <div class="risk-title">🔴 R2: 翻台率低</div>
                                    <div class="risk-desc">200平面积若翻台不足3次，营收难达标。应对：优化动线、限时用餐、快餐化设计</div>
                                </div>
                                <div class="risk-card">
                                    <div class="risk-title">🟡 R3: 复购率低</div>
                                    <div class="risk-desc">产品缺乏差异化难有复购。应对：会员体系、每周新品、口碑运营</div>
                                </div>
                                <div class="risk-card">
                                    <div class="risk-title">🟡 R4: 成本超支</div>

                            <h4 style="margin-top: 20px;">三层响应机制</h4>

                case 'budget':

        function updateSim() {
            // 早餐
            const bfPassby = parseFloat(document.getElementById('bfPassby').value);
            const bfEntry = parseFloat(document.getElementById('bfEntry').value) / 100;
            const bfSpend = parseFloat(document.getElementById('bfSpend').value);
            document.getElementById('bfPassbyVal').textContent = bfPassby;
            document.getElementById('bfEntryVal').textContent = (bfEntry * 100) + '%';
            document.getElementById('bfSpendVal').textContent = '¥' + bfSpend;
            const bfRevenue = bfPassby * bfEntry * 0.75 * 0.87 * bfSpend;
            document.getElementById('simBFRevenue').textContent = '¥' + Math.round(bfRevenue).toLocaleString();

            // 午餐
            const luPassby = parseFloat(document.getElementById('luPassby').value);
            const luEntry = parseFloat(document.getElementById('luEntry').value) / 100;
            const luSpend = parseFloat(document.getElementById('luSpend').value);
            document.getElementById('luPassbyVal').textContent = luPassby;
            document.getElementById('luEntryVal').textContent = (luEntry * 100) + '%';
            document.getElementById('luSpendVal').textContent = '¥' + luSpend;
            const luRevenue = luPassby * luEntry * 0.75 * 0.87 * luSpend;
            document.getElementById('simLURevenue').textContent = '¥' + Math.round(luRevenue).toLocaleString();

            // 晚餐估算（基于午餐的80%）
            const diRevenue = luRevenue * 0.8;
            document.getElementById('simDIRevenue').textContent = '¥' + Math.round(diRevenue).toLocaleString();

            // 总计
            const total = bfRevenue + luRevenue + diRevenue;
            document.getElementById('simTotalRevenue').textContent = '¥' + Math.round(total).toLocaleString();

            // 更新漏斗图（如果存在）
            const funnelResult = document.getElementById('funnelResult');
            if (funnelResult) {
                const totalCustomers = Math.round(luPassby * luEntry * 0.75 * 0.87);
                funnelResult.textContent = '预估日成交：' + totalCustomers + '人 | 日营收：约¥' + Math.round(total).toLocaleString();
            }
        }

        function renderChat() {

                {speaker: '市场专家', avatar: '市', class: 'avatar-expert', content: '海岸城面点主食业态仅占10%，无强势品牌，市场空白明显。但早高峰竞争激烈，需差异化定位。', time: '09:30'},

                {speaker: 'COO', avatar: 'O', class: 'avatar-coo', content: '共识：明档现包+品种丰富+情感连接。核心卖点：皮薄馅大、现包现蒸、馅料丰富。', time: '10:30'},
                {speaker: '风险专家', avatar: '风', class: 'avatar-risk', content: '最高风险：客流不足(R1)和翻台率低(R2)。三层响应：第一层追加促销，第二层特价套餐，第三层重新定位。', time: '11:00'},

            container.innerHTML = messages.map(m => `
                <div class="message">
                    <div class="message-header">
                        <div class="message-avatar ${m.class}">${m.avatar}</div>
                        <span class="message-name">${m.speaker}</span>
                        <span class="message-time">${m.time}</span>
                    </div>
                    <div class="message-content">${m.content}</div>
                </div>
            `).join('');

            // 文档卡片
            container.innerHTML += `
                <div style="margin-top: 20px; padding-top: 15px; border-top: 1px solid rgba(255,255,255,0.1);">
                    <div style="font-size: 12px; color: var(--text-dim); margin-bottom: 10px;">📄 核心文档（点击查看）</div>
                    <div class="doc-grid">
                        ${Object.entries(docs).map(([id, doc]) => `
                            <div class="doc-card" onclick="showDoc('${id}')">
                                <div class="doc-title">${doc.title}</div>
                                <div class="doc-speaker">${doc.speaker}</div>
                                <div class="doc-summary">${doc.summary}</div>
                                <div class="doc-key">${doc.key}</div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        // HTML转义函数 - 防止XSS攻击
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function showDoc(id) {
            const d = docs[id];
            document.getElementById('modalTitle').textContent = d.title;
            document.getElementById('modalBody').innerHTML = `
                <p style="color: var(--text-dim); margin-bottom: 15px;">发言人：${escapeHtml(d.speaker)}</p>
                <h4 style="color: var(--success); margin-bottom: 10px;">核心摘要</h4>
                <p style="line-height: 1.8; margin-bottom: 20px;">${escapeHtml(d.summary)}</p>
                <h4 style="color: var(--warning); margin-bottom: 10px;">关键信息</h4>
                <div style="background: rgba(255,193,7,0.1); padding: 15px; border-radius: 8px; border-left: 3px solid var(--warning);">
                    ${escapeHtml(d.key)}
                </div>
            `;
            document.getElementById('docModal').classList.add('show');
        }

        function closeModal() {
            document.getElementById('docModal').classList.remove('show');
        }

        function init() {
            switchTab(document.querySelector('.tab'), 'overview');
            renderChat();
        }

        init();
    </script>
