# 项目描述
description: |
  绿联NAS Dxp2800清明节促销文案项目，主题「念在从前，存向未来——绿联NAS清明守护计划」。
  借助清明节祭祖、缅怀先人的情感场景，打造"家庭数据保险箱"的品牌定位，
  通过小红书+抖音双渠道实现品牌曝光与销售转化。

# 项目背景
background: |
  清明节是祭祖、缅怀先人的特殊时刻，用户对"珍贵回忆"和"数据丢失"的情感敏感度显著提升。
  绿联NAS Dxp2800作为"家庭数据保险箱"，与清明节"守护记忆"的核心诉求高度契合。
  项目机遇：清明假期用户有充足时间整理数字资产，家庭团聚场景激发"留住回忆"的情感需求。

# 核心策略
core_strategy:
  brand_positioning: 「念在从前，存向未来——绿联NAS清明守护计划」
  core_theme: 念在从前，存向未来
  emotional_keywords:
    - 思念
    - 团圆
    - 追忆
    - 珍惜
  differentiation:
    - 安全：数据私有化，不上云不泄露
    - 传承：家庭照片、影像的代际传递
    - 便捷：小白也能轻松上手
    - 归属：设备跟着家走，不跟平台绑定

# 渠道策略
channels:
  - name: 小红书
    strategy: 真实体验种草型
    content_mix:
      真实用户故事: 40%
      场景化教程: 30%
      限时福利帖: 20%
      产品测评: 10%
  - name: 抖音
    strategy: 视觉冲击剧情型
    content_mix:
      剧情类短视频: 40%
      场景演示: 30%
      KOL合作: 20%
      直播带货: 10%

