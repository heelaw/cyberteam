# 风险预案
risk_management:
  risks:
    - type: 技术风险
      description: 服务器崩溃
      probability: 低
      impact: 高
      mitigation: 提前扩容，CDN加速，备用服务器
    - type: 库存风险
      description: 限量名额被秒光
      probability: 高
      impact: 中
      mitigation: 提前说明规则，准备等价替代券
    - type: 舆论风险
      description: 负面评论/投诉
      probability: 中
      impact: 高
      mitigation: 公关话术，客服7x24在线
    - type: 刷单风险
      description: 黄牛/刷单
      probability: 中
      impact: 中
      mitigation: 实名认证+限购1台+风控拦截
    - type: 物流风险
      description: 清明假期物流延迟
      probability: 高
      impact: 中
      mitigation: 提前备货，承诺30天发货
  alert_levels:
    - level: 红色预警
      trigger: 负面舆情爆发/服务器宕机
      response_time: 1小时内
    - level: 黄色预警
      trigger: 库存告急/转化率异常
      response_time: 4小时内
    - level: 绿色
      trigger: 正常活动进行
      response_time: 日常监测

