# SaaS订阅模式框架
# Software-as-a-Service Subscription Business Model Framework

name: "SaaS订阅模式"
english_name: "SaaS Subscription Model"
version: "1.0"
description: "基于订阅的软件服务模式，关注MRR、ARR、Churn等指标"

applicable_scenarios:
  - 企业级软件服务
  - 云平台服务
  - 生产力工具
  - 在线服务平台

typical_examples:
  - "Salesforce (CRM)"
  - "Slack (团队协作)"
  - "Zoom (视频会议)"

required_modules:
  - id: "metrics.saa_s"
    description: "SaaS核心指标（MRR/ARR/Churn）"
    priority: 1

  - id: "unit-economics.ltv_cac"
    description: "单体经济模型"
    priority: 1

  - id: "cohort-analysis"
    description: "队列分析"
    priority: 1

optional_modules:
  - id: "enterprise-sales"
    description: "企业销售流程"
    when: "有企业客户"

  - id: "freemium-analysis"
    description: "免费增值模式分析"
    when: "有免费版"

key_metrics:
  acquisition:
    - metric: "CAC"
      benchmark: "$50-500"
    - metric: "trial_to_paid_rate"
      benchmark: "10-30%"

  revenue:
    - metric: "ARPU"
      benchmark: "$50-500/月"
    - metric: "ARPA"
      benchmark: "$500-5000/月"

  retention:
    - metric: "logo_retention"
      benchmark: "90-95%"
    - metric: "revenue_retention"
      benchmark: "100-120% (含增购)"
    - metric: "churn_rate"
      benchmark: "<5% (月度)"

standard_funnel_steps:
  - step: 1
    name: "网站访问"
    typical_rate: 1.0

  - step: 2
    name: "注册"
    typical_rate: 0.02-0.10

  - step: 3
    name: "激活"
    typical_rate: 0.30-0.60

  - step: 4
    name: "试用/演示"
    typical_rate: 0.20-0.50

  - step: 5
    name: "付费转化"
    typical_rate: 0.10-0.30

cost_structure:
  variable_costs:
    - item: "服务器成本"
      range: "5-15% of revenue"
    - item: "支付手续费"
      range: "2-3% of transaction"

  fixed_costs:
    - item: "研发"
      range: "20-40% of revenue"
    - item: "销售与营销"
      range: "20-40% of revenue"
    - item: "G&A"
      range: "10-20% of revenue"

  profit_margins:
    - metric: "毛利率"
      range: "70-90%"
    - metric: "净利率"
      range: "-10-20% (早期可能负)"

common_risks:
  - risk: "高流失率"
    impact: "极高"
    mitigation: "产品优化、客户成功、年度合约"

  - risk: "获客成本过高"
    impact: "高"
    mitigation: "产品驱动增长、客户推荐"

growth_strategies:
  - strategy: "产品驱动增长 (PLG)"
    kpis: ["病毒系数", "免费转付费率"]

  - strategy: "企业市场扩张"
    kpis: ["企业客户数", "合同价值"]

  - strategy: "国际市场拓展"
    kpis: ["国际收入占比", "本地化覆盖率"]
